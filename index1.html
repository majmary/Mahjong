                    }
                }
            });
        }

        // SoundEngine extracted to js/sound.js

        // Initialize game
        function startGame() {
            // Create players
            const positions = ['E', 'S', 'W', 'N'];
            const names = ['Player', 'Bot', 'Bot', 'Bot'];
            
            // Shuffle to randomize positions
            const shuffledPositions = shuffle([...positions]);
            
            // Pick 3 unique bot personalities randomly each game
            const botNames = Object.keys(BOT_PERSONALITIES);
            const shuffledBotNames = shuffle([...botNames]).slice(0, 3);

            gameState.players = names.map((name, idx) => {
                const isHuman = name === 'Player';
                const botName = isHuman ? null : shuffledBotNames.shift();
                return {
                    name: isHuman ? name : botName,
                    position: shuffledPositions[idx],
                    tiles: [],
                    isHuman: isHuman,
                    exposedSets: [],
                    personality: isHuman ? null : BOT_PERSONALITIES[botName] || null,
                    lockedPattern: null, // used by Katie
                };
            });

            // Sort players by position order (E, S, W, N for display purposes)
            const positionOrder = { 'E': 0, 'S': 1, 'W': 2, 'N': 3 };
            gameState.players.sort((a, b) => positionOrder[a.position] - positionOrder[b.position]);

            // Set current dealer to East
            gameState.currentDealer = gameState.players.find(p => p.position === 'E');

            // Create and shuffle tiles
            const tiles = createTileSet();
            gameState.wall = shuffle(tiles);

            // Build wall (152 tiles = 38 per player = 19 stacks per player)
            gameState.phase = 'ready_to_deal';
        }

        // Combined start and deal function
        // ========================================
        // HAND PATTERN ANALYZER
        // ========================================
        
        // 2025 NMJL Hands Data
        // Card data is loaded externally via card-loader.js + data/card-YYYY.js
        // Pattern engine extracted to js/patterns.js
        // (SUITS, DRAGON_MAP, JOKER, parsePattern, fillGroup, evaluatePattern,
        //  candidatesForTile, filterFillsForLockedGroups, evaluateBestMatch, etc.)

        // ========================================
        // IMPROVED BOT INTELLIGENCE
        // Charleston, Draw/Discard, and Calling Logic
        // ========================================
        
        function decideCharlestonDiscard(hand, numToDiscard = 3, player = null) {
            // CRITICAL: Remove all jokers from consideration - they can NEVER be discarded
            const handWithoutJokers = hand.filter(t => t !== 'J');
            
            if (handWithoutJokers.length < numToDiscard) {
                throw new Error('Cannot discard - not enough non-joker tiles!');
            }
            
            // Get top 5 matches to base decision on (personality-aware)
            const evaluation = personalityEval(player, hand, 5);
            
            if (!evaluation.topMatches || evaluation.topMatches.length === 0) {
                // No good matches - just discard random non-joker tiles
                return handWithoutJokers.slice(0, numToDiscard);
            }
            
            // STRATEGY: Protect tiles used in the #1 (best) hand
            // But only protect the EXACT COUNT needed, not all tiles of that type
            const bestMatch = evaluation.topMatches[0];
            const protectedTileCounts = new Map(); // tile -> count needed
            
            // Count how many of each tile the best match actually uses
            if (bestMatch.result && bestMatch.result.groups) {
                bestMatch.result.groups.forEach(group => {
                    group.matchedTiles.forEach(tile => {
                        if (tile !== '?' && tile !== 'J') {
                            protectedTileCounts.set(tile, (protectedTileCounts.get(tile) || 0) + 1);
                        }
                    });
                });
            }
            
            // Separate tiles into protected and non-protected based on COUNT
            const protected = [];
            const nonProtected = [];
            const handCounts = new Map();
            
            // Count what we have
            handWithoutJokers.forEach(tile => {
                handCounts.set(tile, (handCounts.get(tile) || 0) + 1);
            });
            
            // Allocate tiles: protect exact count needed, rest are non-protected
            handWithoutJokers.forEach(tile => {
                const neededCount = protectedTileCounts.get(tile) || 0;
                const currentProtectedCount = protected.filter(t => t === tile).length;
                
                if (currentProtectedCount < neededCount) {
                    protected.push(tile);
                } else {
                    nonProtected.push(tile);
                }
            });
            
            // Calculate value of each tile based on ALL top matches
            const tileValues = calculateTileValues(hand, evaluation.topMatches);
            
            // KEY DECISION POINT:
            // Can we discard without breaking the priority hand?
            if (nonProtected.length >= numToDiscard) {
                // YES - Commit to priority hand, only discard from non-protected tiles
                const tileInfo = nonProtected.map(tile => ({
                    tile,
                    value: tileValues.get(tile) || 0,
                    count: handWithoutJokers.filter(t => t === tile).length
                }));
                
                tileInfo.sort((a, b) => {
                    if (a.value !== b.value) return a.value - b.value;
                    return b.count - a.count;
                });
                
                return pickTilesToDiscard(tileInfo, numToDiscard, handWithoutJokers);
                
            } else {
                // NO - Must break priority hand, so treat ALL top 5 hands equally
                // Recalculate which tiles to protect based on ALL top hands, not just #1
                const allHandsProtectedCounts = new Map();
                
                evaluation.topMatches.forEach(match => {
                    if (match.result && match.result.groups) {
                        match.result.groups.forEach(group => {
                            group.matchedTiles.forEach(tile => {
                                if (tile !== '?' && tile !== 'J') {
                                    const current = allHandsProtectedCounts.get(tile) || 0;
                                    allHandsProtectedCounts.set(tile, Math.max(current, 1));
                                }
                            });
                        });
                    }
                });
                
                // Use equal-weight scoring across all top hands
                const tileInfo = handWithoutJokers.map(tile => ({
                    tile,
                    value: tileValues.get(tile) || 0,
                    count: handWithoutJokers.filter(t => t === tile).length,
                    usedInAnyTopHand: allHandsProtectedCounts.has(tile)
                }));
                
                // Sort: prioritize keeping tiles used in any top hand, then by value
                tileInfo.sort((a, b) => {
                    // Prefer keeping tiles used in top hands
                    if (a.usedInAnyTopHand && !b.usedInAnyTopHand) return 1;
                    if (!a.usedInAnyTopHand && b.usedInAnyTopHand) return -1;
                    // Then by value
                    if (a.value !== b.value) return a.value - b.value;
                    return b.count - a.count;
                });
                
                return pickTilesToDiscard(tileInfo, numToDiscard, handWithoutJokers);
            }
        }
        
        // Helper function to pick tiles to discard from sorted tileInfo
        function pickTilesToDiscard(tileInfo, numToDiscard, handWithoutJokers) {
            const toDiscard = [];
            const tileCounts = new Map();
            handWithoutJokers.forEach(t => tileCounts.set(t, (tileCounts.get(t) || 0) + 1));
            
            for (let i = 0; i < tileInfo.length && toDiscard.length < numToDiscard; i++) {
                const tile = tileInfo[i].tile;
                const alreadyDiscarded = toDiscard.filter(t => t === tile).length;
                const totalAvailable = tileCounts.get(tile);
                
                if (alreadyDiscarded < totalAvailable) {
                    toDiscard.push(tile);
                }
            }
            
            return toDiscard;
        }
        
        // Get detailed reasoning for Charleston discard decision
        function explainCharlestonDiscard(hand, toDiscard) {
            const evaluation = evaluateBestMatch(hand, 5);
            const tileValues = calculateTileValues(hand, evaluation.topMatches);
            
            // Count tiles needed for best match
            const bestMatch = evaluation.topMatches[0];
            const protectedTileCounts = new Map();
            
            if (bestMatch && bestMatch.result && bestMatch.result.groups) {
                bestMatch.result.groups.forEach(group => {
                    group.matchedTiles.forEach(tile => {
                        if (tile !== '?' && tile !== 'J') {
                            protectedTileCounts.set(tile, (protectedTileCounts.get(tile) || 0) + 1);
                        }
                    });
                });
            }
            
            // Calculate non-protected tiles (extras beyond what best hand needs)
            const handWithoutJokers = hand.filter(t => t !== 'J');
            const handCounts = new Map();
            handWithoutJokers.forEach(t => handCounts.set(t, (handCounts.get(t) || 0) + 1));
            
            let nonProtectedCount = 0;
            handCounts.forEach((count, tile) => {
                const needed = protectedTileCounts.get(tile) || 0;
                if (count > needed) {
                    nonProtectedCount += (count - needed);
                }
            });
            
            // Determine strategy mode
            const strategyMode = nonProtectedCount >= 3 ? 'PRIORITY' : 'ALL_HANDS';
            
            const explanation = {
                topMatches: evaluation.topMatches.map(m => ({
                    section: m.pattern.Section,
                    handNum: m.pattern['hand number'],
                    score: Math.round(m.score),
                    fillVariant: m.fillVariant,
                    totalFills: m.totalFillsForPattern
                })),
                bestMatchPattern: bestMatch ? `${bestMatch.pattern.Section} - Hand ${bestMatch.pattern['hand number']}` : 'None',
                strategyMode: strategyMode,
                strategyExplanation: strategyMode === 'PRIORITY' 
                    ? `Enough non-priority tiles to discard - committing to best hand`
                    : `Must break best hand - treating all top ${evaluation.topMatches.length} hands equally`,
                tileAnalysis: [],
                discardedTiles: toDiscard,
                reasoning: []
            };
            
            // Analyze each tile
            const uniqueTiles = [...new Set(hand)];
            const jokers = uniqueTiles.filter(t => t === 'J');
            const nonJokers = uniqueTiles.filter(t => t !== 'J');
            
            // Add jokers (always kept)
            jokers.forEach(tile => {
                const count = hand.filter(t => t === tile).length;
                explanation.tileAnalysis.push({
                    tile,
                    value: 999999,
                    count,
                    neededByBest: 0,
                    excess: 0,
                    isDiscarded: false,
                    discardCount: 0,
                    status: 'KEEP (JOKER)',
                    isJoker: true,
                    isProtected: false
                });
            });
            
            // Analyze non-joker tiles
            nonJokers.forEach(tile => {
                const value = tileValues.get(tile) || 0;
                const count = hand.filter(t => t === tile).length;
                const neededByBest = protectedTileCounts.get(tile) || 0;
                const excess = Math.max(0, count - neededByBest);
                const isDiscarded = toDiscard.includes(tile);
                const discardCount = toDiscard.filter(t => t === tile).length;
                
                let isProtected = false;
                if (strategyMode === 'PRIORITY') {
                    // In priority mode, only the exact count needed is protected
                    isProtected = neededByBest > 0 && discardCount < (count - neededByBest);
                }
                
                let status;
                if (isDiscarded && excess > 0 && discardCount <= excess) {
                    status = `DISCARD ${discardCount}/${count} (extras)`;
                } else if (isDiscarded && isProtected) {
                    status = `DISCARD ${discardCount}/${count} ⚠️ (Breaking best hand!)`;
                } else if (isDiscarded) {
                    status = `DISCARD ${discardCount}/${count}`;
                } else if (neededByBest > 0 && strategyMode === 'PRIORITY') {
                    status = `KEEP (Best Hand: ${neededByBest}/${count})`;
                } else {
                    status = 'KEEP';
                }
                
                explanation.tileAnalysis.push({
                    tile,
                    value: Math.round(value),
                    count,
                    neededByBest,
                    excess,
                    isDiscarded,
                    discardCount,
                    status,
                    isJoker: false,
                    isProtected
                });
            });
            
            // Sort: jokers first, then by whether needed by best hand (in priority mode), then by value
            explanation.tileAnalysis.sort((a, b) => {
                if (a.isJoker && !b.isJoker) return -1;
                if (!a.isJoker && b.isJoker) return 1;
                if (strategyMode === 'PRIORITY') {
                    if (a.neededByBest > 0 && b.neededByBest === 0) return -1;
                    if (a.neededByBest === 0 && b.neededByBest > 0) return 1;
                }
                return a.value - b.value;
            });
            
            return explanation;
        }
        
        // ========================================
        // END PATTERN ANALYZER
        // ========================================

        // ========================================
        // DRAW/DISCARD PHASE DECISION FUNCTION
        // ========================================

        /**
         * Decide which tile to discard during draw/discard phase
         * Unlike Charleston, jokers CAN be discarded here
         * Returns the tile value to discard (e.g., 'J', '2B', 'N')
         *
         * Uses PRIORITY vs ALL_HANDS strategy:
         * - PRIORITY: Strong best match - protect tiles needed for it
         * - ALL_HANDS: Weak best match - maximize flexibility across all top 5
         */
        function decideDrawDiscardDiscard(hand, lockedGroups = [], player = null) {
            if (hand.length < 1) {
                throw new Error(`Empty hand passed to decideDrawDiscardDiscard`);
            }

            // Joker handling
            const jokerCount = hand.filter(t => t === 'J').length;

            // Step 1: pick the best target hand pattern (personality-aware)
            const evaluation = personalityEval(player, hand, 5, lockedGroups);
            const bestMatch = evaluation.bestMatch;
            const jokerValue = calculateJokerValue(hand, evaluation, jokerCount);

            // Martin / Rachel flex mode: while wall is deep, discard to maximize hand coverage
            const p = player && player.personality ? player.personality : null;
            const wallCount = gameState.wall.length;
            if (p && p.handLockMode === 'flex' && wallCount > p.flexLockThreshold) {
                const flexEval = personalityEval(player, hand, 15, lockedGroups);
                if (flexEval.topMatches && flexEval.topMatches.length > 0) {
                    return decideFlexibilityDiscard(hand, flexEval.topMatches);
                }
            }

            // Step 2: if no useful target, fall back to cross-hand scoring
            if (!bestMatch || !bestMatch.result || !bestMatch.result.groups) {
                const tileValues = calculateTileValues(hand, evaluation.topMatches);
                const tileCounts = new Map();
                hand.forEach(t => tileCounts.set(t, (tileCounts.get(t) || 0) + 1));
                let lowestValue = Infinity, tileToDiscard = hand[0];
                tileCounts.forEach((count, tile) => {
                    const value = tile === 'J' ? jokerValue : (tileValues.get(tile) || 0) - (count > 1 ? 0.5 : 0);
                    if (value < lowestValue) { lowestValue = value; tileToDiscard = tile; }
                });
                return tileToDiscard;
            }

            // Step 3: get ALL fills for the best pattern, filtered for locked groups
            const allFills = filterFillsForLockedGroups(
                evaluatePattern(hand, bestMatch.pattern.code), lockedGroups);

            // Step 4: score each fill the same way evaluateBestMatch does
            const scoredFills = allFills.map(fill => {
                const enhanced = jokerCount > 0 ? useJokersForScoring(fill, jokerCount) : fill;
                const score = (enhanced.totalFilled * 10)
                    - (enhanced.p1Missing * 5 + enhanced.p2Missing * 5
                       + enhanced.p3Missing * 1 + enhanced.p4Missing * 1
                       + (enhanced.singleMissing || 0) * 4);
                return { fill: enhanced, score: Math.max(0, score) };
            }).sort((a, b) => b.score - a.score);

            // Step 5: for each tile type, calculate:
            //   - maxUsed: the most copies any fill uses of this tile
            //   - weightedScore: sum of fill scores for fills that use at least one copy
            const tileMaxUsed    = new Map();  // tile → max copies used in any single fill
            const tileWeightedScore = new Map(); // tile → sum of scores of fills that use it

            hand.forEach(t => {
                if (!tileMaxUsed.has(t)) { tileMaxUsed.set(t, 0); tileWeightedScore.set(t, 0); }
            });

            scoredFills.forEach(({ fill, score }) => {
                const usedInFill = new Map();
                fill.groups.forEach(group => {
                    group.matchedTiles.forEach(t => {
                        if (t !== '?' && t !== 'J') {
                            usedInFill.set(t, (usedInFill.get(t) || 0) + 1);
                        }
                    });
                });
                usedInFill.forEach((used, tile) => {
                    tileMaxUsed.set(tile, Math.max(tileMaxUsed.get(tile) || 0, used));
                    tileWeightedScore.set(tile, (tileWeightedScore.get(tile) || 0) + score);
                });
            });

            // Step 5b: score tiles against all backup hands that tie the top hand on tilesFilled.
            // topMatches[1] anchors at 40%; lower-scoring hands scale proportionally by ratio.
            const backupTileMaxUsed       = new Map();
            const backupTileWeightedScore = new Map();
            hand.forEach(t => {
                if (!backupTileMaxUsed.has(t)) { backupTileMaxUsed.set(t, 0); backupTileWeightedScore.set(t, 0); }
            });

            const anchorMatch = evaluation.topMatches && evaluation.topMatches[1];
            if (anchorMatch) {
                const anchorScore    = anchorMatch.score || 1;
                const topFilled      = bestMatch.tilesFilled;

                evaluation.topMatches.slice(1).forEach(backupMatch => {
                    if (backupMatch.tilesFilled < topFilled) return;

                    const weight = 0.4 * (backupMatch.score / anchorScore);

                    const backupFills = filterFillsForLockedGroups(
                        evaluatePattern(hand, backupMatch.pattern.code), lockedGroups);
                    const backupScoredFills = backupFills.map(fill => {
                        const enhanced = jokerCount > 0 ? useJokersForScoring(fill, jokerCount) : fill;
                        const score = (enhanced.totalFilled * 10)
                            - (enhanced.p1Missing * 5 + enhanced.p2Missing * 5
                               + enhanced.p3Missing * 1 + enhanced.p4Missing * 1
                               + (enhanced.singleMissing || 0) * 4);
                        return { fill: enhanced, score: Math.max(0, score) };
                    }).sort((a, b) => b.score - a.score);

                    backupScoredFills.forEach(({ fill, score }) => {
                        const usedInFill = new Map();
                        fill.groups.forEach(group => {
                            group.matchedTiles.forEach(t => {
                                if (t !== '?' && t !== 'J') {
                                    usedInFill.set(t, (usedInFill.get(t) || 0) + 1);
                                }
                            });
                        });
                        usedInFill.forEach((used, tile) => {
                            backupTileMaxUsed.set(tile, Math.max(backupTileMaxUsed.get(tile) || 0, used));
                            backupTileWeightedScore.set(tile,
                                (backupTileWeightedScore.get(tile) || 0) + score * weight);
                        });
                    });
                });
            }

            // Step 6: score every tile in hand and pick the lowest
            const tileCounts = new Map();
            hand.forEach(t => tileCounts.set(t, (tileCounts.get(t) || 0) + 1));

            let lowestValue = Infinity;
            let tileToDiscard = hand[0];

            tileCounts.forEach((count, tile) => {
                if (tile === 'J') {
                    if (jokerValue < lowestValue) { lowestValue = jokerValue; tileToDiscard = tile; }
                    return;
                }

                const maxUsed   = tileMaxUsed.get(tile) || 0;
                const wScore    = tileWeightedScore.get(tile) || 0;
                const excess    = count - maxUsed;

                let primaryValue;
                if (maxUsed === 0) {
                    primaryValue = 0;
                } else if (excess > 0 && count > 1) {
                    primaryValue = (wScore * maxUsed + wScore * 0.1 * excess) / count;
                } else {
                    primaryValue = wScore;
                }

                const bMaxUsed = backupTileMaxUsed.get(tile) || 0;
                const bWScore  = backupTileWeightedScore.get(tile) || 0;
                const bExcess  = count - bMaxUsed;
                let backupValue;
                if (bMaxUsed === 0) {
                    backupValue = 0;
                } else if (bExcess > 0 && count > 1) {
                    backupValue = (bWScore * bMaxUsed + bWScore * 0.1 * bExcess) / count;
                } else {
                    backupValue = bWScore;
                }

                const value = primaryValue + 0.4 * backupValue;

                if (value < lowestValue) { lowestValue = value; tileToDiscard = tile; }
            });

            return tileToDiscard;
        }

        function createJokerFreeView(matchResult) {
            if (!matchResult || !matchResult.groups) return matchResult;
            const jokerFreeGroups = matchResult.groups.map(group => {
                const matchedTiles = group.matchedTiles || [];
                return { ...group, matchedTiles: matchedTiles.map(tile => tile === 'J' ? '?' : tile) };
            });
            return { ...matchResult, groups: jokerFreeGroups };
        }

        /**
         * Calculate the strategic value of keeping a joker.
         *
         * A joker should only be discardable if NONE of the top-scoring patterns
         * have any jokerable group with empty slots. Checks all topMatches, not
         * just bestMatch, so a joker is protected whenever ANY viable hand needs it.
         *
         * Jokers can only be used in groups with 3+ repeated identical tiles.
         */
        function calculateJokerValue(hand, evaluation, jokerCount) {
            if (jokerCount === 0) return 0;

            const topMatches = evaluation.topMatches;
            if (!topMatches || topMatches.length === 0) {
                // No good matches at all — keep joker for flexibility
                return 300;
            }

            // Check every top match: if ANY of them has a jokerable group with empty slots,
            // the joker is valuable and must be kept.
            for (const match of topMatches) {
                if (!match.result || !match.result.groups) continue;

                for (const group of match.result.groups) {
                    const matchedTiles = group.matchedTiles || [];
                    // Count only natural tiles as filled (not jokers already sitting in slots)
                    const filledCount = matchedTiles.filter(t => t !== '?' && t !== 'J').length;
                    const totalCount  = matchedTiles.length;
                    const emptySlots  = totalCount - filledCount;

                    if (emptySlots === 0) continue; // group is already complete

                    const tiles = group.tiles || [];
                    const isJokerable = totalCount >= 3 && allIdentical(tiles);

                    if (isJokerable) {
                        // At least one top hand has a jokerable group that still needs tiles
                        return 500; // Keep the joker
                    }
                }
            }

            // No top match can use a joker — safe to discard
            return 5;
        }

        // ========================================
        // BOT CALLING LOGIC
        // ========================================
        
        /**
         * Get total count of a tile type in the set
         */
        function getTileCount(tile) {
            if (tile === 'F') return 8; // 8 flowers
            if (tile === 'J') return 8; // 8 jokers
            return 4; // Everything else: 4 of each
        }
        
        /**
         * Calculate how many of a specific tile are available
         * Returns: { total, inHand, exposed, discarded, available, needed }
         */
        function calculateTileAvailability(tile, hand, exposedTiles = [], discardedTiles = []) {
            const total = getTileCount(tile);
            const inHand = hand.filter(t => t === tile).length;
            const exposed = exposedTiles.filter(t => t === tile).length;
            const discarded = discardedTiles.filter(t => t === tile).length;
            const available = total - inHand - exposed - discarded;
            
            return { total, inHand, exposed, discarded, available };
        }
        
        /**
         * Check if hand completion is feasible given available tiles
         * Returns: { possible: boolean, reason: string, groupsAnalysis: [] }
         */
        function checkHandFeasibility(hand, targetMatch, exposedTiles = [], discardedTiles = []) {
            if (!targetMatch.result || !targetMatch.result.groups) {
                return { possible: false, reason: 'No valid match result', groupsAnalysis: [] };
            }
            
            const groupsAnalysis = [];
            let overallFeasible = true;
            let feasibilityReason = '';
            
            // Count jokers in hand
            const jokersInHand = hand.filter(t => t === 'J').length;
            let jokersNeeded = 0;
            
            targetMatch.result.groups.forEach((group, idx) => {
                const matchedTiles = group.matchedTiles || [];
                const missing = matchedTiles.filter(t => t === '?');
                const missingCount = missing.length;
                
                if (missingCount === 0) {
                    groupsAnalysis.push({
                        groupIdx: idx,
                        pattern: group.raw,
                        status: 'complete',
                        feasible: true
                    });
                    return;
                }
                
                // For each missing position, check if it's fillable
                const uniqueMissingTiles = new Set();
                matchedTiles.forEach((tile, tileIdx) => {
                    if (tile === '?') {
                        // Determine what tile could fill this position
                        const groupTile = group.tiles[tileIdx];
                        // For now, we'll mark as unknown - we'd need to run candidate logic
                        uniqueMissingTiles.add(groupTile);
                    }
                });
                
                // Check if group can use jokers (3+ identical tiles)
                const canUseJokers = (group.tiles.length >= 3) && allIdentical(group.tiles);
                
                // Simplified: if missing tiles > available non-joker tiles, might need jokers
                if (missingCount > 0 && !canUseJokers) {
                    // This group cannot use jokers and has missing tiles
                    // Check if those specific tiles are available
                    groupsAnalysis.push({
                        groupIdx: idx,
                        pattern: group.raw,
                        status: `${missingCount} missing, no joker substitution allowed`,
                        feasible: true, // Optimistic for now
                        canUseJokers: false
                    });
                } else if (canUseJokers && missingCount > 0) {
                    jokersNeeded += missingCount;
                    groupsAnalysis.push({
                        groupIdx: idx,
                        pattern: group.raw,
                        status: `${missingCount} missing, can use jokers`,
                        feasible: true,
                        canUseJokers: true
                    });
                }
            });
            
            // Check if we have enough jokers
            if (jokersNeeded > jokersInHand) {
                overallFeasible = false;
                feasibilityReason = `Need ${jokersNeeded} jokers but only have ${jokersInHand}`;
            }
            
            return {
                possible: overallFeasible,
                reason: feasibilityReason || 'Hand appears feasible',
                groupsAnalysis,
                jokersNeeded,
                jokersAvailable: jokersInHand
            };
        }
        
        /**
         * Decide if bot should call a discarded tile
         * Returns: { shouldCall: boolean, reason: string, tilesForExposure: array, improvementScore: number }
         */
        /**
         * Score a fill result using the same formula as evaluateBestMatch.
         * Applies closed-hand 0.7 multiplier if isClosed is true.
         * Returns a rounded whole number.
         */
        function scoreFill(fillResult, isClosed) {
            const raw = (fillResult.totalFilled * 10)
                      - (fillResult.p1Missing * 5
                       + fillResult.p2Missing * 5
                       + fillResult.p3Missing * 1
                       + fillResult.p4Missing * 1
                       + (fillResult.singleMissing || 0) * 4);
            return Math.round(isClosed ? raw * 0.7 : raw);
        }

        /**
         * Decide if bot should call a discarded tile.
         * Returns: { shouldCall: boolean, reason: string, tilesForExposure: array, improvementScore: number }
         *
         * Logic:
         *  1. Quick exits (joker discard, no patterns found)
         *  2. Find eligible hands: all patterns whose rounded score ties the top rounded score
         *  3. Mahjong override: if any eligible hand (open or closed) reaches 14 tiles with this call → call
         *  4. Filter to open hands only
         *  5. For each eligible open hand, evaluate all fills:
         *       - Score each fill, keep only those matching the top rounded score
         *       - Find incomplete groups that are 3+ identical tiles and contain the discarded tile
         *       - Check the exposure size exactly matches the group size in the fill
         *       - Check we can form the complete exposure right now (naturals in hand + called tile + jokers)
         *  6. Feasibility check on the rest of the fill after locking that exposure:
         *       - For each remaining incomplete group, count live tiles (not exposed, not discarded)
         *       - Joker budget = jokers in hand + 1, shared across all groups
         *       - If any group can't be completed → fill is not feasible
         *  7. If any fill passed steps 5 & 6 → call; otherwise → no call
         */
        function shouldBotCallTile(hand, discardedTile, exposedTiles = [], discardedTiles = [], lockedGroups = [], playerName = "Unknown", player = null) {

            const DEBUG_CALLING = false;

            if (DEBUG_CALLING) {
                console.log('=== CALLING DECISION DEBUG ===');
                console.log('Player:', playerName);
                console.log('Discarded tile:', discardedTile);
                console.log('Hand:', hand.join(', '));
                console.log('Locked groups:', JSON.stringify(lockedGroups));
            }

            // ── Step 1: Quick exits ──
            if (discardedTile === 'J') {
                return { shouldCall: false, reason: 'Cannot call jokers', tilesForExposure: [], details: {} };
            }

            const jokersInHand = hand.filter(t => t === 'J').length;

            // ── Personality: Cathy misses a call outright 1 in 10 times ──
            const p = player && player.personality ? player.personality : null;
            if (p && p.missCallRate && Math.random() < p.missCallRate) {
                console.log(`${playerName} misses a call opportunity!`);
                return { shouldCall: false, reason: 'Cathy missed it', tilesForExposure: [], details: {} };
            }

            // ── Personality: Martin/Rachel flex mode — call if tile advances ANY top-5 hand ──
            const wallCount = gameState.wall.length;
            const isFlexMode = p && p.handLockMode === 'flex' && wallCount > p.flexLockThreshold;

            // ── Step 2: Find eligible hands (personality-aware scoring) ──
            const evaluation = personalityEval(player, hand, 50, lockedGroups);

            if (!evaluation.topMatches || evaluation.topMatches.length === 0) {
                return { shouldCall: false, reason: 'No viable patterns found', tilesForExposure: [], details: {} };
            }

            // In flex mode, consider any of the top matches (not just the top scorer)
            const topRoundedScore = isFlexMode
                ? Math.round(evaluation.topMatches[Math.min(4, evaluation.topMatches.length - 1)].score)
                : Math.round(evaluation.topMatches[0].score);

            if (DEBUG_CALLING) console.log('Top rounded score:', topRoundedScore);

            // Eligible = all patterns whose rounded score matches the top
            const eligibleMatches = evaluation.topMatches.filter(m => Math.round(m.score) === topRoundedScore);

            if (DEBUG_CALLING) console.log('Eligible hands:', eligibleMatches.map(m => `${m.pattern.Section} Hand ${m.pattern['hand number']} (${Math.round(m.score)})`));

            // ── Step 3: Mahjong override ──
            // If calling this tile would complete any eligible hand to 14 tiles, call immediately.
            for (const match of eligibleMatches) {
                if (match.tilesFilled >= 13) {
                    const fills = evaluatePattern([...hand, discardedTile], match.pattern.code);
                    if (fills && fills.length > 0) {
                        const topFill = fills[0];
                        if (topFill.totalFilled === 14) {
                            if (DEBUG_CALLING) console.log('✓ MAHJONG CALL via', match.pattern.Section, 'Hand', match.pattern['hand number']);
                            return {
                                shouldCall: true,
                                reason: `MAHJONG! Completes ${match.pattern.Section} Hand ${match.pattern['hand number']}`,
                                tilesForExposure: [],
                                improvementScore: 999,
                                handName: `${match.pattern.Section} Hand ${match.pattern['hand number']}`,
                                details: { isMahjong: true }
                            };
                        }
                    }
                }
            }

            // ── Step 4: Filter to open hands only ──
            const openEligible = eligibleMatches.filter(m => m.pattern.status !== 'closed');

            if (openEligible.length === 0) {
                if (DEBUG_CALLING) console.log('→ NO CALL: All eligible hands are closed');
                return { shouldCall: false, reason: 'All top-scoring hands are closed', tilesForExposure: [], details: {} };
            }

            if (DEBUG_CALLING) console.log('Open eligible hands:', openEligible.map(m => `${m.pattern.Section} Hand ${m.pattern['hand number']}`));

            // ── Steps 5 & 6: Evaluate fills for each open eligible hand ──
            for (const match of openEligible) {
                if (DEBUG_CALLING) console.log(`\n── Evaluating ${match.pattern.Section} Hand ${match.pattern['hand number']} ──`);

                let fills;
                try {
                    fills = evaluatePattern(hand, match.pattern.code);
                } catch(e) {
                    if (DEBUG_CALLING) console.log('  evaluatePattern error:', e.message);
                    continue;
                }

                if (!fills || fills.length === 0) {
                    if (DEBUG_CALLING) console.log('  No fills found');
                    continue;
                }

                // Apply jokers and score each fill, keep only those at the top rounded score
                const scoredFills = fills.map(f => {
                    const enhanced = jokersInHand > 0 ? useJokersForScoring(f, jokersInHand) : f;
                    return { fill: enhanced, score: scoreFill(enhanced, false) };
                }).filter(sf => sf.score === topRoundedScore);

                if (DEBUG_CALLING) console.log(`  Fills at top score (${topRoundedScore}):`, scoredFills.length);

                for (const { fill } of scoredFills) {
                    // Work with joker-free view to see true tile needs
                    const jokerFreeGroups = createJokerFreeView(fill).groups;

                    for (let groupIdx = 0; groupIdx < jokerFreeGroups.length; groupIdx++) {
                        const group = jokerFreeGroups[groupIdx];
                        const groupTiles = group.tiles || [];
                        const matchedTiles = group.matchedTiles || [];
                        const groupSize = groupTiles.length;
                        const missingSlots = matchedTiles.filter(t => t === '?').length;

                        // Skip complete groups
                        if (missingSlots === 0) continue;

                        // Must be 3+ tiles
                        if (groupSize < 3) continue;

                        // Must be all identical tiles (pung/kong/quint only, no sequences)
                        const VARIABLE_TOKENS = new Set(['Q', 'R', 'X', 'Y', 'V', 'M']);
                        const isIdenticalGroup = groupTiles.every(t => VARIABLE_TOKENS.has(t) || t === groupTiles[0]);
                        if (!isIdenticalGroup) continue;

                        // The discarded tile must appear in the matched tiles of this group
                        const tileAppearsInGroup = matchedTiles.some(t => t === discardedTile);
                        if (!tileAppearsInGroup) continue;

                        // Count naturals of this tile type already in hand
                        const naturalsInHand = hand.filter(t => t === discardedTile).length;

                        // Exposure must be exactly groupSize tiles:
                        //   naturalsInHand (from hand) + 1 (called tile) + jokers (to fill gaps)
                        const naturalSlotsNeeded = groupSize - 1; // -1 for the called tile itself
                        const jokerSlotsNeeded = naturalSlotsNeeded - naturalsInHand;

                        if (DEBUG_CALLING) console.log(`  Group ${groupIdx}: size=${groupSize}, naturalsInHand=${naturalsInHand}, jokerSlotsNeeded=${jokerSlotsNeeded}`);

                        // Can't form this exposure if we need more jokers than we have
                        if (jokerSlotsNeeded > jokersInHand) {
                            if (DEBUG_CALLING) console.log('    → SKIP: not enough jokers to form exposure');
                            continue;
                        }

                        // Guard: naturals in hand shouldn't exceed slots needed
                        if (jokerSlotsNeeded < 0) {
                            if (DEBUG_CALLING) console.log('    → SKIP: too many naturals for group size');
                            continue;
                        }

                        // ── Step 6: Feasibility of the rest of the fill ──
                        const jokersUsedInExposure = jokerSlotsNeeded;
                        let jokerBudget = (jokersInHand + 1) - jokersUsedInExposure;

                        let fillIsFeasible = true;

                        for (let otherIdx = 0; otherIdx < jokerFreeGroups.length; otherIdx++) {
                            if (otherIdx === groupIdx) continue;

                            const otherGroup = jokerFreeGroups[otherIdx];
                            const otherGroupTiles = otherGroup.tiles || [];
                            const otherMatched = otherGroup.matchedTiles || [];
                            const otherMissingSlots = otherMatched.filter(t => t === '?').length;

                            if (otherMissingSlots === 0) continue;

                            const knownTile = otherMatched.find(t => t !== '?') || null;

                            const otherIsIdentical = otherGroupTiles.every(t => VARIABLE_TOKENS.has(t) || t === otherGroupTiles[0]);
                            const otherCanUseJokers = (otherGroupTiles.length >= 3) && otherIsIdentical;

                            if (!knownTile) continue; // can't determine tile type — optimistic skip

                            const liveCount = calculateTileAvailability(knownTile, hand, exposedTiles, discardedTiles).available;
                            const naturalsStillNeeded = otherMissingSlots;

                            if (liveCount >= naturalsStillNeeded) {
                                // Enough natural tiles available
                            } else if (otherCanUseJokers) {
                                const jokersNeededHere = naturalsStillNeeded - liveCount;
                                if (jokersNeededHere <= jokerBudget) {
                                    jokerBudget -= jokersNeededHere;
                                } else {
                                    fillIsFeasible = false;
                                    break;
                                }
                            } else {
                                fillIsFeasible = false;
                                break;
                            }
                        }

                        if (!fillIsFeasible) {
                            if (DEBUG_CALLING) console.log('    → SKIP: fill not feasible after this call');
                            continue;
                        }

                        // ── All checks passed — build tilesForExposure and return call ──
                        const tilesForExposure = [];
                        for (let i = 0; i < naturalsInHand; i++) tilesForExposure.push(discardedTile);
                        for (let i = 0; i < jokersUsedInExposure; i++) tilesForExposure.push('J');

                        const handName = `${match.pattern.Section} Hand ${match.pattern['hand number']}`;
                        if (DEBUG_CALLING) console.log(`✓ CALL: ${handName}, exposing [${tilesForExposure.concat(discardedTile).join(' ')}]`);

                        return {
                            shouldCall: true,
                            reason: `Advances ${handName} (score ${topRoundedScore}): group completable, fill feasible`,
                            tilesForExposure,
                            improvementScore: topRoundedScore,
                            handName,
                            groupPattern: group.raw,
                            priority: group.priority,
                            details: {
                                targetHand: handName,
                                groupIdx,
                                jokersUsedInExposure,
                                jokerBudgetRemaining: jokerBudget
                            }
                        };
                    }
                }
            }

            // ── No qualifying fill found across any eligible open hand ──
            if (DEBUG_CALLING) console.log('→ NO CALL: no fill passed all checks');
            return {
                shouldCall: false,
                reason: `No fill in any top-scoring open hand is advanced by calling ${discardedTile}`,
                tilesForExposure: [],
                details: { topRoundedScore, eligibleCount: openEligible.length }
            };
        }
        // Calculate value of each tile based on how many top hands use it
        function calculateTileValues(hand, topMatches) {
            const tileValues = new Map();
            
            // Initialize all tiles with 0 value
            hand.forEach(tile => {
                if (!tileValues.has(tile)) {
                    tileValues.set(tile, 0);
                }
            });
            
            // Add value from each top match
            topMatches.forEach(match => {
                if (!match.result || !match.result.groups) return;
                
                match.result.groups.forEach(group => {
                    group.matchedTiles.forEach(matchedTile => {
                        if (matchedTile !== '?' && matchedTile !== 'J') {
                            const currentValue = tileValues.get(matchedTile) || 0;
                            tileValues.set(matchedTile, currentValue + match.score);
                        }
                    });
                });
            });
            
            return tileValues;
        }
        
        // Smart bot tile selection for Charleston
        function smartBotSelectTilesToPass(player, count = 3) {
            // Use improved Charleston intelligence
            try {
                const tilesToDiscard = decideCharlestonDiscard(player.tiles, count, player);
                
                // Convert tiles to indices
                const indicesToPass = [];
                const usedIndices = new Set();
                
                tilesToDiscard.forEach(tileToPass => {
                    const tileIdx = player.tiles.findIndex((t, idx) => 
                        t === tileToPass && !usedIndices.has(idx)
                    );
                    if (tileIdx !== -1) {
                        indicesToPass.push(tileIdx);
                        usedIndices.add(tileIdx);
                    }
                });
                
                return indicesToPass;
            } catch (err) {
                console.error('Charleston improved logic error:', err);
                // Fall back to random selection
                const selectableTiles = [];
                player.tiles.forEach((tile, idx) => {
                    if (tile !== 'J') {
                        selectableTiles.push(idx);
                    }
                });
                const shuffled = shuffle([...selectableTiles]);
                return shuffled.slice(0, Math.min(count, selectableTiles.length));
            }
        }

        /**
         * Deal the next round: keep same players and personalities, rotate wind positions
         * clockwise (S→E, W→S, N→W, E→N), preserve scores, reset round state.
         * options.redeal = true: re-deal same hand (−10% human penalty), no rotation, no hand increment
         * Wall game (isDraw): no rotation, no hand increment
         * Normal: rotate winds, increment currentHand
         */
        function dealNextRound(options = {}) {
            // Restore game layout
            const gameLayoutDiv = document.querySelector('.game-layout');
            if (gameLayoutDiv) gameLayoutDiv.style.display = 'grid';
            document.getElementById('bottomBar').style.display = '';

            if (paymentOverlay) paymentOverlay.remove();
            const winningOverlay = document.getElementById('winningOverlay');
            if (winningOverlay) winningOverlay.remove();

            const wasRedeal = options.redeal === true;
            const wasWallGame = gameState.isDraw; // isDraw still true at this point for wall games

            if (wasRedeal) {
                // Apply 10% penalty to human player
                const human = gameState.players.find(p => p.isHuman);
                if (human) {
                    const penalty = Math.max(1, Math.floor(gameState.scores[human.position] * 0.1));
                    gameState.scores[human.position] = Math.max(0, gameState.scores[human.position] - penalty);
                }
                // No wind rotation, no hand increment
            } else if (wasWallGame) {
                // Replay same hand — no rotation, no increment
            } else {
                // Normal advance: rotate winds and increment hand counter
                const rotateMap = { 'E': 'N', 'S': 'E', 'W': 'S', 'N': 'W' };
                gameState.players.forEach(p => { p.position = rotateMap[p.position]; });
                const positionOrder = { 'E': 0, 'S': 1, 'W': 2, 'N': 3 };
                gameState.players.sort((a, b) => positionOrder[a.position] - positionOrder[b.position]);
                gameState.currentHand++;
            }

            gameState.players.forEach(p => { p.tiles = []; p.exposedSets = []; p.lockedPattern = null; });

        // ========================================
        // FIREWORKS ANIMATION
        // ========================================
        function launchFireworks(canvas) {
            const ctx = canvas.getContext('2d');
            const particles = [];
            const colors = ['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#f1c40f','#1abc9c','#e67e22'];
            let animId;

            function spawnBurst(x, y) {
                const count = 60 + Math.floor(Math.random() * 40);
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.2;
                    const speed = 2 + Math.random() * 5;
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        alpha: 1,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        radius: 2 + Math.random() * 3
                    });
                }
            }

            // Launch bursts at intervals
            let burstCount = 0;
            const burstInterval = setInterval(() => {
                const x = canvas.width * (0.2 + Math.random() * 0.6);
                const y = canvas.height * (0.1 + Math.random() * 0.5);
                spawnBurst(x, y);
                burstCount++;
                if (burstCount >= 12) clearInterval(burstInterval);
            }, 400);

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // gravity
                    p.alpha -= 0.012;
                    if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                if (particles.length > 0 || burstCount < 12) {
                    animId = requestAnimationFrame(draw);
                } else {
                    canvas.remove();
                }
            }
            draw();
        }

        // Update wall display
        // ── Bottom bar — always present during gameplay, content depends on state ──
        // ========================================
        // HINT SYSTEM
        // ========================================

        function openHint() {
            const human = gameState.players.find(p => p.isHuman);
            if (!human) return;

            let hints;
            if (gameState.phase === 'charleston') {
                hints = generateCharlestonHints(human.tiles);
            } else if (gameState.phase === 'playing') {
                hints = generatePlayingHints(human);
            } else {
                hints = [{ title: 'Hint', text: 'Hints are available during Charleston and gameplay.', sub: '' }];
            }

            const content = document.getElementById('hintContent');
            content.innerHTML = '';
            hints.forEach(hint => {
                const card = document.createElement('div');
                card.className = 'hint-card';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'hint-card-title';
                titleDiv.textContent = hint.title;
                card.appendChild(titleDiv);

                // Support either a pre-built DOM element or plain text
                if (hint.domEl) {
                    hint.domEl.className = 'hint-card-text';
                    card.appendChild(hint.domEl);
                } else {
                    const textDiv = document.createElement('div');
                    textDiv.className = 'hint-card-text';
                    textDiv.textContent = hint.text || '';
                    card.appendChild(textDiv);
                }

                if (hint.sub) {
                    const subDiv = document.createElement('div');
                    subDiv.className = 'hint-card-sub';
                    subDiv.textContent = hint.sub;
                    card.appendChild(subDiv);
                }

                content.appendChild(card);
            });

            document.getElementById('hintOverlay').classList.add('open');
        }

        function closeHint(e) {
            // Close only if clicking the backdrop, not the box itself
            if (e.target === document.getElementById('hintOverlay')) {
                document.getElementById('hintOverlay').classList.remove('open');
            }
        }

        function closeHintDirect() {
            document.getElementById('hintOverlay').classList.remove('open');
        }

        /**
         * Generate up to 2 Charleston hints:
         * - If a sequence or cluster is found: show the stronger one + top section not already covered
         * - If neither: show top 2 sections
         */
        function generateCharlestonHints(tiles) {
            const seqHint     = detectNamedSequence(tiles);
            const clusterHint = detectTileCluster(tiles);
            const sections    = detectTopSections(tiles);

            // Pick the stronger of sequence vs cluster
            // Sequences need strength >= 2; clusters need >= 5 to be worth surfacing over sections
            const seqStrength     = (seqHint     && seqHint.strength     >= 2) ? seqHint.strength     : 0;
            const clusterStrength = (clusterHint && clusterHint.strength >= 5) ? clusterHint.strength : 0;

            const specific = seqStrength >= clusterStrength && seqStrength > 0 ? seqHint
                           : clusterStrength > 0                               ? clusterHint
                           : null;

            if (specific) {
                // Find the section keyword that the specific hint already covers
                const SECTION_KEYWORDS = ['2468', '13579', '369', '2025', 'Winds', 'Consecutive', 'Any Like', 'Singles'];
                const coveredKey = SECTION_KEYWORDS.find(kw =>
                    (specific.title + ' ' + specific.text + ' ' + (specific.sub || '')).toLowerCase().includes(kw.toLowerCase())
                );

                // Pick the first top section not already covered
                const secondHint = sections.find(s => {
                    if (!coveredKey) return true;
                    return !(s.title + ' ' + s.text + ' ' + (s.sub || '')).toLowerCase().includes(coveredKey.toLowerCase());
                });

                return secondHint ? [specific, secondHint] : [specific];
            }

            // No specific hint — return top 2 sections
            return sections.slice(0, 2).length > 0
                ? sections.slice(0, 2)
                : [{ title: 'Hint', text: 'Keep an open mind — your hand is still taking shape.', sub: '' }];
        }

        /**
         * Detect named sequences: consecutive runs, 2025, NEWS, 135/357/579, 369
         * Returns { title, text, sub, strength } where strength = tiles already present
         */
        function detectNamedSequence(tiles) {
            const suits = ['B', 'C', 'D'];
            const suitName = { B: 'Bam', C: 'Crack', D: 'Dot' };
            let best = null;

            // ── NEWS (winds) ──
            const winds = ['N', 'E', 'W', 'S'];
            const windCount = winds.filter(w => tiles.includes(w)).length;
            if (windCount >= 2) {
                const have = winds.filter(w => tiles.includes(w)).join(', ');
                const missing = winds.filter(w => !tiles.includes(w));
                const text = windCount === 4
                    ? `You have all four winds (NEWS) — look at Winds & Dragons hands!`
                    : `You have ${windCount} of 4 winds (${have}). Missing: ${missing.join(', ')}. NEWS hands could work.`;
                const candidate = { title: 'Winds Sequence', text, sub: 'NEWS hands appear in Winds & Dragons and 13579 sections.', strength: windCount };
                if (!best || candidate.strength > best.strength) best = candidate;
            }

            // ── 2025 (needs: 2, 0=WD, 2, 5 across suits) ──
            const twos = tiles.filter(t => t[0] === '2' && ['B','C','D'].includes(t[1])).length;
            const fives = tiles.filter(t => t[0] === '5' && ['B','C','D'].includes(t[1])).length;
            const hasWD = tiles.includes('WD');
            const score2025 = Math.min(twos, 2) + Math.min(fives, 1) + (hasWD ? 1 : 0);
            if (score2025 >= 2) {
                const missing2025 = [];
                if (twos < 2) missing2025.push(`${2 - twos} more 2`);
                if (!hasWD) missing2025.push('White Dragon (0)');
                if (fives < 1) missing2025.push('a 5');
                const text = score2025 >= 4
                    ? `You have all the key tiles for a 2025 hand — 2s, White Dragon, and 5s!`
                    : `You have ${score2025} of 4 key tiles for a 2025 hand (2, 0, 2, 5). Missing: ${missing2025.join(', ')}.`;
                const candidate = { title: '2025 Sequence', text, sub: 'The 2025 section has several strong hands built around these tiles.', strength: score2025 };
                if (!best || candidate.strength > best.strength) best = candidate;
            }

            // ── 369 sequences ──
            suits.forEach(suit => {
                const has3 = tiles.filter(t => t === `3${suit}`).length;
                const has6 = tiles.filter(t => t === `6${suit}`).length;
                const has9 = tiles.filter(t => t === `9${suit}`).length;
                const count369 = (has3 > 0 ? 1 : 0) + (has6 > 0 ? 1 : 0) + (has9 > 0 ? 1 : 0);
                if (count369 >= 2) {
                    const have = [has3 && `3`, has6 && `6`, has9 && `9`].filter(Boolean).join(', ');
                    const missing = [!has3 && `3`, !has6 && `6`, !has9 && `9`].filter(Boolean).join(', ');
                    const text = count369 === 3
                        ? `You have 3, 6, and 9 of ${suitName[suit]} — a complete 369 sequence!`
                        : `You have ${have} of ${suitName[suit]} toward a 369 sequence. Missing: ${missing}.`;
                    // Strength = total tiles + bonus for each value held as a pung/kong
                    // (3+ copies is specifically valuable since 369 hands use pungs/kongs)
                    const tileCount = has3 + has6 + has9;
                    const pungBonus = (has3 >= 3 ? 1 : 0) + (has6 >= 3 ? 1 : 0) + (has9 >= 3 ? 1 : 0);
                    const candidate = { title: '369 Sequence', text, sub: 'The 369 section has several strong hands using 3s, 6s, and 9s.', strength: tileCount + pungBonus };
                    if (!best || candidate.strength > best.strength) best = candidate;
                }
            });

            // ── 13579 named sub-sequences: 135, 357, 579 ──
            const oddSeqs = [
                { nums: [1,3,5], label: '135' },
                { nums: [3,5,7], label: '357' },
                { nums: [5,7,9], label: '579' },
                { nums: [1,3,5,7,9], label: '13579' },
            ];
            suits.forEach(suit => {
                oddSeqs.forEach(seq => {
                    const count = seq.nums.filter(n => tiles.some(t => t === `${n}${suit}`)).length;
                    if (count >= 2) {
                        const have = seq.nums.filter(n => tiles.some(t => t === `${n}${suit}`)).join(', ');
                        const missing = seq.nums.filter(n => !tiles.some(t => t === `${n}${suit}`)).join(', ');
                        const text = count === seq.nums.length
                            ? `You have a complete ${seq.label} sequence in ${suitName[suit]}!`
                            : `You have ${have} of ${suitName[suit]} toward a ${seq.label} sequence. Missing: ${missing}.`;
                        const candidate = { title: `${seq.label} Sequence`, text, sub: 'The 13579 section has hands built around odd number runs.', strength: count };
                        if (!best || candidate.strength > best.strength) best = candidate;
                    }
                });
            });

            // ── 2468 named sub-sequences: 24, 46, 68, 246, 468, 2468 ──
            const evenSeqs = [
                { nums: [2,4,6,8], label: '2468' },
                { nums: [2,4,6], label: '246' },
                { nums: [4,6,8], label: '468' },
            ];
            suits.forEach(suit => {
                evenSeqs.forEach(seq => {
                    const count = seq.nums.filter(n => tiles.some(t => t === `${n}${suit}`)).length;
                    if (count >= 2) {
                        const have = seq.nums.filter(n => tiles.some(t => t === `${n}${suit}`)).join(', ');
                        const missing = seq.nums.filter(n => !tiles.some(t => t === `${n}${suit}`)).join(', ');
                        const text = count === seq.nums.length
                            ? `You have a complete ${seq.label} sequence in ${suitName[suit]}!`
                            : `You have ${have} of ${suitName[suit]} toward a ${seq.label} sequence. Missing: ${missing}.`;
                        const candidate = { title: `${seq.label} Sequence`, text, sub: 'The 2468 section has many strong hands built around even numbers.', strength: count };
                        if (!best || candidate.strength > best.strength) best = candidate;
                    }
                });
            });

            // ── Consecutive runs — find the longest contiguous run per suit ──
            // Strength scales aggressively: 3-tile=4, 4-tile=6, 5-tile=9, 6+=12
            // so a solid run always outranks a loose cluster of the same count
            suits.forEach(suit => {
                // Find all numbers present in this suit (unique)
                const present = new Set();
                tiles.forEach(t => { if (t.length === 2 && t[1] === suit) present.add(+t[0]); });

                // Slide a window to find the longest contiguous run
                let longestRun = [];
                let currentRun = [];
                for (let n = 1; n <= 9; n++) {
                    if (present.has(n)) {
                        currentRun.push(n);
                        if (currentRun.length > longestRun.length) longestRun = [...currentRun];
                    } else {
                        currentRun = [];
                    }
                }

                if (longestRun.length >= 2) {
                    const runLen = longestRun.length;
                    const runStr = longestRun.join('-');
                    // Strength: 2=2, 3=4, 4=6, 5=9, 6+=12 — exponential reward for longer runs
                    const strengthMap = [0, 0, 2, 4, 6, 9, 12, 12, 12, 12];
                    const strength = strengthMap[Math.min(runLen, 9)];

                    let text;
                    if (runLen >= 5) {
                        text = `You have a ${runLen}-tile run of ${runStr} in ${suitName[suit]} — this is a very strong start for a Consecutive Runs hand!`;
                    } else if (runLen === 4) {
                        text = `You have a 4-tile run of ${runStr} in ${suitName[suit]} — strong Consecutive Runs potential.`;
                    } else if (runLen === 3) {
                        text = `You have a complete 3-tile run of ${runStr} in ${suitName[suit]}.`;
                    } else {
                        const missing = [];
                        for (let n = longestRun[0]; n <= longestRun[longestRun.length-1]+1; n++) {
                            if (!present.has(n)) missing.push(n);
                        }
                        text = `You have ${runStr} in ${suitName[suit]} — one more tile could complete a run.`;
                    }

                    const candidate = {
                        title: 'Consecutive Run',
                        text,
                        sub: 'The Consecutive Runs section has many hands built on runs of 3 or more tiles in one suit.',
                        strength
                    };
                    if (!best || candidate.strength > best.strength) best = candidate;
                }
            });

            return best;
        }

        /**
         * Detect strong tile clusters (evens, odds, 369s, winds+dragons)
         * Returns { title, text, sub, strength }
         */
        function detectTileCluster(tiles) {
            const suits = ['B', 'C', 'D'];
            const suitName = { B: 'Bam', C: 'Crack', D: 'Dot' };
            let best = null;

            const tryCandidate = (c) => { if (!best || c.strength > best.strength) best = c; };

            // Even numbers (2,4,6,8) — only noteworthy with 7+
            const evens = tiles.filter(t => t.length === 2 && suits.includes(t[1]) && [2,4,6,8].includes(+t[0]));
            if (evens.length >= 7) {
                const suitCounts = {};
                evens.forEach(t => { suitCounts[t[1]] = (suitCounts[t[1]] || 0) + 1; });
                const suitDesc = Object.entries(suitCounts).map(([s,c]) => `${c} ${suitName[s]}`).join(', ');
                tryCandidate({ title: 'Even Numbers', text: `You have ${evens.length} even-numbered tiles (${suitDesc}) — 2468 hands could suit you well.`, sub: 'The 2468 section has the most variety of even-number hands.', strength: evens.length });
            }

            // Odd numbers (1,3,5,7,9) — only noteworthy with 7+
            const odds = tiles.filter(t => t.length === 2 && suits.includes(t[1]) && [1,3,5,7,9].includes(+t[0]));
            if (odds.length >= 7) {
                const suitCounts = {};
                odds.forEach(t => { suitCounts[t[1]] = (suitCounts[t[1]] || 0) + 1; });
                const suitDesc = Object.entries(suitCounts).map(([s,c]) => `${c} ${suitName[s]}`).join(', ');
                tryCandidate({ title: 'Odd Numbers', text: `You have ${odds.length} odd-numbered tiles (${suitDesc}) — 13579 hands could suit you well.`, sub: 'The 13579 section has many hands built around odd runs.', strength: odds.length });
            }

            // 369 family across suits
            const family369 = tiles.filter(t => t.length === 2 && suits.includes(t[1]) && [3,6,9].includes(+t[0]));
            if (family369.length >= 3) {
                tryCandidate({ title: '369 Family', text: `You have ${family369.length} tiles from the 3/6/9 family across your suits — explore the 369 section.`, sub: 'The 369 section uses combinations of 3s, 6s, and 9s in 2 or 3 suits.', strength: family369.length });
            }

            // Any Like Numbers: 3+ tiles of the same number across different suits
            for (let n = 1; n <= 9; n++) {
                const matching = tiles.filter(t => t.length === 2 && suits.includes(t[1]) && +t[0] === n);
                if (matching.length >= 3) {
                    const suitDesc = matching.map(t => suitName[t[1]]).join(', ');
                    tryCandidate({ title: 'Any Like Numbers', text: `You have ${matching.length} ${n}s (${suitDesc}) — "Any Like Numbers" hands use the same number across suits.`, sub: 'Any Like Numbers hands use 3 or 4 of the same number in different suits.', strength: matching.length + 0.5, section: 'Any Like Numbers' });
                }
            }

            // Winds + Dragons
            const specialTiles = tiles.filter(t => ['N','E','W','S','GD','RD','WD'].includes(t));
            if (specialTiles.length >= 3) {
                const names = specialTiles.map(t => {
                    if (t === 'GD') return 'Green Dragon';
                    if (t === 'RD') return 'Red Dragon';
                    if (t === 'WD') return 'White Dragon';
                    return t === 'N' ? 'North' : t === 'E' ? 'East' : t === 'W' ? 'West' : 'South';
                });
                tryCandidate({ title: 'Winds & Dragons', text: `You have ${specialTiles.length} wind and dragon tiles (${names.slice(0,3).join(', ')}${names.length > 3 ? '…' : ''}) — Winds & Dragons hands could be a good fit.`, sub: 'The Winds & Dragons section uses combinations of winds (N/E/W/S) and dragons.', strength: specialTiles.length });
            }

            return best;
        }

        /**
         * Return top 2 section hints from evaluateBestMatch, sorted by score.
         */
        function detectTopSections(tiles) {
            try {
                const ev = evaluateBestMatch(tiles, 20);
                if (!ev.topMatches || ev.topMatches.length === 0) {
                    return [{ title: 'Hint', text: 'Keep an open mind — your hand is still taking shape.', sub: '', strength: 0 }];
                }
                // Sum scores per section
                const sectionScores = {};
                const sectionBestMatch = {};
                ev.topMatches.forEach(m => {
                    const sec = m.pattern.Section || 'Other';
                    sectionScores[sec] = (sectionScores[sec] || 0) + m.score;
                    if (!sectionBestMatch[sec] || m.score > sectionBestMatch[sec].score) {
                        sectionBestMatch[sec] = m;
                    }
                });

                const ranked = Object.entries(sectionScores)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 2);

                return ranked.map(([sec]) => {
                    const best = sectionBestMatch[sec];
                    const tilesNeeded = best ? best.tilesNeeded : '?';
                    return {
                        title: sec,
                        text: `Your hand fits the "${sec}" section well. Your closest hand there needs ${tilesNeeded} more tile${tilesNeeded !== 1 ? 's' : ''}.`,
                        sub: 'Focus on collecting tiles that fit this section during the Charleston.',
                        strength: 0,
                        section: sec,
                    };
                });
            } catch(e) {
                return [{ title: 'Hint', text: 'Keep an open mind — your hand is still taking shape.', sub: '', strength: 0 }];
            }
        }

        /**
         * Render a pattern description array into a container element with colors.
         * description is an array of { text, color, bold } parts.
         */
        function renderPatternDescription(container, pattern) {
            const section = pattern.Section || '';
            const sectionSpan = document.createElement('span');
            sectionSpan.style.cssText = 'font-weight:700;margin-right:4px;';
            sectionSpan.textContent = section + ':';
            container.appendChild(sectionSpan);

            if (pattern.description && Array.isArray(pattern.description)) {
                pattern.description.forEach(part => {
                    const s = document.createElement('span');
                    s.textContent = part.text;
                    if (part.color === 'red') s.style.cssText = 'color:#d32f2f;font-weight:700;';
                    else if (part.color === 'green') s.style.cssText = 'color:#2e7d32;font-weight:700;';
                    else if (part.color === 'navy' || part.color === 'blue') s.style.cssText = 'color:#0D47A1;font-weight:700;';
                    else if (part.bold) s.style.fontWeight = '700';
                    container.appendChild(s);
                });
            } else {
                container.appendChild(document.createTextNode(pattern.description || pattern.code || ''));
            }
        }

        /**
         * Generate playing phase hints: one offensive card + one defensive card.
         * Returns array of { title, textEl (DOM element), sub } hint objects for openHint to render.
         */
        function generatePlayingHints(human) {
            const hints = [];

            // ── OFFENSIVE: top 2 hands ──
            const lockedGroups = (human.exposedSets || [])
                .map(resolveExposureToLockedTiles)
                .filter(g => g !== null);
            const fullHand = [...human.tiles, ...lockedGroups.flat()];
            const ev = evaluateBestMatch(fullHand, 5, lockedGroups);

            if (ev.topMatches && ev.topMatches.length > 0) {
                const offEl = document.createElement('div');
                offEl.style.lineHeight = '1.7';

                const top = ev.topMatches.slice(0, 2);
                top.forEach((m, i) => {
                    const row = document.createElement('div');
                    row.style.marginBottom = i === 0 && top.length > 1 ? '6px' : '0';

                    const label = document.createElement('span');
                    label.style.cssText = 'font-size:11px;color:#888;margin-right:4px;';
                    label.textContent = i === 0 ? '①' : '②';
                    row.appendChild(label);

                    renderPatternDescription(row, m.pattern);

                    const needed = document.createElement('span');
                    needed.style.cssText = 'margin-left:6px;font-size:12px;color:#555;white-space:nowrap;';
                    if (m.tilesNeeded === 0) {
                        needed.textContent = '✓ Complete!';
                        needed.style.color = '#2e7d32';
                        needed.style.fontWeight = '700';
                    } else if (m.tilesNeeded === 1) {
                        needed.textContent = '— 1 tile away!';
                        needed.style.color = '#e65100';
                        needed.style.fontWeight = '700';
                    } else {
                        needed.textContent = `— ${m.tilesNeeded} tiles needed`;
                    }
                    row.appendChild(needed);
                    offEl.appendChild(row);
                });

                hints.push({ title: 'Your Best Hands', domEl: offEl, sub: 'Focus on collecting tiles that fit these hands.' });
            }

            // ── DEFENSIVE ──
            const defHint = generateDefensiveHint(human);
            if (defHint) hints.push(defHint);

            return hints;
        }

        /**
         * Generate one defensive hint.
         * Priority: 1) bots with 2 exposures (try to name hand), 2) bots with 1 exposure (neighbor warning),
         * 3) discard pool analysis, 4) flower fallback
         */
        function generateDefensiveHint(human) {
            const bots = gameState.players.filter(p => !p.isHuman && p.exposedSets && p.exposedSets.length > 0);

            // Collect all exposed tiles for context
            const allExposed = [];
            gameState.players.forEach(p => {
                if (p.exposedSets) p.exposedSets.forEach(set => allExposed.push(...set.tiles));
            });

            // ── Priority 1 & 2: bots with exposures ──
            // Sort: bots with 2+ exposures first
            const sortedBots = [...bots].sort((a, b) => b.exposedSets.length - a.exposedSets.length);

            for (const bot of sortedBots) {
                const exposureCount = bot.exposedSets.length;
                const botLockedGroups = (bot.exposedSets || [])
                    .map(resolveExposureToLockedTiles)
                    .filter(g => g !== null);
                const allBotTiles = bot.exposedSets.flatMap(s => s.tiles);

                if (exposureCount >= 2) {
                    // Find all open hands consistent with the locked exposures
                    const botEv = evaluateBestMatch(allBotTiles, 20, botLockedGroups);
                    const candidates = (botEv.topMatches || [])
                        .filter(m => m.pattern.status !== 'closed');

                    if (candidates.length > 0) {
                        const descEl = document.createElement('div');
                        descEl.style.lineHeight = '1.6';

                        const warningLine = document.createElement('div');
                        warningLine.style.marginBottom = '5px';
                        warningLine.textContent = candidates.length === 1
                            ? `${bot.name} has ${exposureCount} exposures and is targeting:`
                            : `${bot.name} has ${exposureCount} exposures and could be targeting:`;
                        descEl.appendChild(warningLine);

                        candidates.forEach(m => {
                            const handLine = document.createElement('div');
                            handLine.style.marginBottom = '3px';
                            renderPatternDescription(handLine, m.pattern);
                            descEl.appendChild(handLine);
                        });

                        return { title: `⚠️ Watch ${bot.name}`, domEl: descEl, sub: null };
                    }
                }

                if (exposureCount >= 1) {
                    // Generic neighbor hint for single exposure
                    const exposure = bot.exposedSets[0];
                    const naturalTiles = exposure.tiles.filter(t => t !== 'J');
                    if (naturalTiles.length === 0) continue;

                    // Find the dominant tile in the exposure
                    const tileCounts = {};
                    naturalTiles.forEach(t => { tileCounts[t] = (tileCounts[t] || 0) + 1; });
                    const dominantTile = Object.entries(tileCounts).sort((a,b) => b[1]-a[1])[0][0];
                    const d = getTileDisplay(dominantTile);

                    // Build neighbor tiles to avoid
                    const suits = ['B','C','D'];
                    const avoidTiles = new Set();
                    const num = parseInt(dominantTile);
                    const suit = dominantTile.slice(-1);

                    if (!isNaN(num) && suits.includes(suit)) {
                        // Same suit neighbors ±1 and ±2
                        [-2,-1,1,2].forEach(offset => {
                            const n = num + offset;
                            if (n >= 1 && n <= 9) avoidTiles.add(`${n}${suit}`);
                        });
                        // Same number other suits
                        suits.filter(s => s !== suit).forEach(s => avoidTiles.add(`${num}${s}`));
                    } else {
                        // Wind/dragon: same tile type is already exposed, warn about same-suit numbers if dragon
                        if (['GD','RD','WD'].includes(dominantTile)) {
                            avoidTiles.add('GD'); avoidTiles.add('RD'); avoidTiles.add('WD');
                        }
                    }

                    // Remove tiles already in the exposure
                    naturalTiles.forEach(t => avoidTiles.delete(t));

                    const descEl = document.createElement('div');
                    descEl.style.lineHeight = '1.6';

                    const countText = `${tileCounts[dominantTile]}`;
                    const exposureDesc = `${d.number || dominantTile} ${d.label} × ${countText}`;

                    const line1 = document.createElement('div');
                    line1.style.marginBottom = '5px';
                    line1.textContent = `${bot.name} has ${exposureDesc} exposed.`;
                    descEl.appendChild(line1);

                    if (avoidTiles.size > 0) {
                        const line2 = document.createElement('div');
                        line2.style.color = '#c62828';
                        line2.style.fontWeight = '600';
                        const avoidList = [...avoidTiles].slice(0, 5).map(t => {
                            const td = getTileDisplay(t);
                            return td.number && td.label ? `${td.number} ${td.label}` : t;
                        }).join(', ');
                        line2.textContent = `Consider avoiding: ${avoidList}`;
                        descEl.appendChild(line2);
                    }

                    return { title: `⚠️ Watch ${bot.name}`, domEl: descEl, sub: null };
                }
            }

            // ── Priority 3: Discard pool analysis ──
            if (gameState.discardPool && gameState.discardPool.length >= 6) {
                const pool = gameState.discardPool;
                const suits = ['B','C','D'];
                const suitName = { B: 'Bam', C: 'Crack', D: 'Dot' };

                // Count odds vs evens per suit, and overall suit totals
                const suitCounts = { B: 0, C: 0, D: 0 };
                const oddCounts  = { B: 0, C: 0, D: 0 };
                const evenCounts = { B: 0, C: 0, D: 0 };

                pool.forEach(t => {
                    const suit = t.slice(-1);
                    const num = parseInt(t);
                    if (suits.includes(suit) && !isNaN(num)) {
                        suitCounts[suit]++;
                        if (num % 2 === 0) evenCounts[suit]++;
                        else oddCounts[suit]++;
                    }
                });

                // Find the most-discarded pattern
                let bestMsg = null;
                let bestCount = 4; // minimum threshold to mention

                suits.forEach(suit => {
                    if (oddCounts[suit] >= bestCount) {
                        bestCount = oddCounts[suit];
                        bestMsg = `Many odd ${suitName[suit]} tiles have already been discarded — odd ${suitName[suit]} tiles may be relatively safe to throw.`;
                    }
                    if (evenCounts[suit] >= bestCount) {
                        bestCount = evenCounts[suit];
                        bestMsg = `Many even ${suitName[suit]} tiles have already been discarded — even ${suitName[suit]} tiles may be relatively safe to throw.`;
                    }
                    if (suitCounts[suit] >= bestCount + 2) {
                        bestCount = suitCounts[suit];
                        bestMsg = `A lot of ${suitName[suit]} tiles have been discarded — ${suitName[suit]} tiles are less likely to be dangerous to throw right now.`;
                    }
                });

                if (bestMsg) {
                    const el = document.createElement('div');
                    el.textContent = bestMsg;
                    return { title: '🗑️ Discard Pile', domEl: el, sub: 'Based on what\'s already been thrown.' };
                }
            }

            // ── Priority 4: Flower fallback ──
            const el = document.createElement('div');
            el.textContent = 'Flowers appear in many hands across the card — hold onto them if you can, they\'re rarely a safe discard early on.';
            return { title: '💐 General Tip', domEl: el, sub: null };
        }

        function updateBottomBar() {
            const bar = document.getElementById('bottomBar');
            if (!bar) return;
            bar.innerHTML = '';

            // Show during charleston AND playing phase
            if (gameState.phase !== 'playing' && gameState.phase !== 'charleston') {
                bar.classList.remove('active');
                return;
            }
            bar.classList.add('active');

            // Helper to append the hint button to the bar
            const addHintBtn = () => {
                const hintBtn = document.createElement('button');
                hintBtn.textContent = '💡 Hint';
                hintBtn.style.background = '#7b5ea7';
                hintBtn.onclick = openHint;
                bar.appendChild(hintBtn);
            };

            // Row break for portrait two-row layout (invisible in landscape due to flex-wrap:nowrap)
            const addRowBreak = () => {
                const br = document.createElement('div');
                br.className = 'bar-row-break';
                bar.appendChild(br);
            };

            // ── Charleston phase: hint is already next to the pass button in the hand area ──
            if (gameState.phase === 'charleston') {
                bar.classList.remove('active');
                return;
            }

            const humanPlayer = gameState.players.find(p => p.isHuman);

            // ── State 0: Bot just called a tile — show announcement during 2500ms window ──
            const action = gameState.lastPlayerAction;
            const botJustCalled = action &&
                action.type === 'called' &&
                action.discardedTile === null && // hasn't discarded yet
                gameState.players.find(p => p.name === action.player && !p.isHuman);

            if (botJustCalled) {
                bar.style.borderTopColor = '#f57f17';
                bar.style.background = 'rgba(255, 248, 225, 0.97)';

                const icon = document.createElement('span');
                icon.textContent = '🎯';
                icon.style.fontSize = '16px';
                bar.appendChild(icon);

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.style.color = '#e65100';
                label.style.fontWeight = '700';

                const cd = getTileDisplay(action.calledTile);
                const calledDesc = cd.number ? `${cd.number} ${cd.label}` : cd.label;
                label.textContent = `${action.player} called the ${calledDesc}!`;
                bar.appendChild(label);

                // Show the exposure tiles from that player
                const caller = gameState.players.find(p => p.name === action.player);
                if (caller && caller.exposedSets && caller.exposedSets.length > 0) {
                    const lastExposure = caller.exposedSets[caller.exposedSets.length - 1];
                    const expWrap = document.createElement('div');
                    expWrap.style.cssText = 'display:flex;gap:3px;align-items:center;flex-shrink:0;';
                    lastExposure.tiles.forEach(tile => {
                        const tileEl = renderTile(tile, false, false, { isJoker: tile === 'J' });
                        tileEl.style.width = '26px';
                        tileEl.style.height = '34px';
                        tileEl.style.margin = '0';
                        const numDiv = tileEl.querySelector('.tile-number');
                        const lblDiv = tileEl.querySelector('.tile-label');
                        if (numDiv) numDiv.style.fontSize = '14px';
                        if (lblDiv) lblDiv.style.fontSize = '7px';
                        expWrap.appendChild(tileEl);
                    });
                    bar.appendChild(expWrap);
                }

                return; // Don't show other states while bot announcement is up
            }

            // Reset bar styling for other states
            bar.style.borderTopColor = '';
            bar.style.background = '';

            // ── State 1: Discard notification (a tile is on the table to call/pass) ──
            if (gameState.callingWindowOpen && gameState.lastDiscardedTile) {
                const isOwnDiscard = (gameState.currentTurn === humanPlayer);
                const isJoker = (gameState.lastDiscardedTile === 'J');
                const canCall = !isOwnDiscard && !isJoker;

                // Describe the action
                let labelText = 'Tile Discarded';
                if (gameState.lastPlayerAction && gameState.lastPlayerAction.discardedTile === gameState.lastDiscardedTile) {
                    const action = gameState.lastPlayerAction;
                    const dd = getTileDisplay(action.discardedTile);
                    const discardedDesc = dd.number ? `${dd.number} ${dd.label}` : dd.label;
                    if (action.type === 'called') {
                        const cd = getTileDisplay(action.calledTile);
                        const calledDesc = cd.number ? `${cd.number} ${cd.label}` : cd.label;
                        labelText = `${action.player} called ${calledDesc}, discarded ${discardedDesc}`;
                    } else if (action.type === 'joker_exchange') {
                        const jd = getTileDisplay(action.jokerTile);
                        const jokerDesc = jd.number ? `${jd.number} ${jd.label}` : jd.label;
                        labelText = `${action.player} claimed joker with ${jokerDesc}, discarded ${discardedDesc}`;
                    } else {
                        labelText = `${action.player} discarded ${discardedDesc}`;
                    }
                }

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = labelText;
                bar.appendChild(label);

                // The discarded tile
                const tileWrap = document.createElement('div');
                tileWrap.className = 'bar-tile';
                const tileEl = renderTile(gameState.lastDiscardedTile, false, false, { isJoker });
                tileEl.style.margin = '0';
                tileWrap.appendChild(tileEl);
                bar.appendChild(tileWrap);

                // Pass button
                const passBtn = document.createElement('button');
                passBtn.textContent = 'Pass';
                passBtn.style.background = 'var(--color-text-secondary)';
                passBtn.onclick = handlePass;
                bar.appendChild(passBtn);

                // Call button
                const callBtn = document.createElement('button');
                callBtn.textContent = 'Call';
                callBtn.style.background = 'var(--color-success)';
                callBtn.disabled = !canCall;
                if (!canCall) { callBtn.style.opacity = '0.4'; callBtn.style.cursor = 'not-allowed'; }
                callBtn.onclick = handleCall;
                bar.appendChild(callBtn);

                addRowBreak();

                // Declare Mahjong button
                const mjBtn = document.createElement('button');
                mjBtn.textContent = 'Declare Mahjong';
                mjBtn.style.background = '#4caf50';
                mjBtn.disabled = isOwnDiscard || isJoker;
                if (isOwnDiscard || isJoker) { mjBtn.style.opacity = '0.4'; mjBtn.style.cursor = 'not-allowed'; }
                mjBtn.onclick = handleCallForMahjong;
                bar.appendChild(mjBtn);

                addHintBtn();

            // ── State 2: Human player's turn — show action buttons ──
            } else if (gameState.currentTurn === humanPlayer && !gameState.callDialogOpen) {
                const discardBtn = document.createElement('button');
                discardBtn.textContent = gameState.selectedTileIndex !== null
                    ? 'Discard Selected' : 'Select a tile to discard';
                discardBtn.disabled = gameState.selectedTileIndex === null;
                discardBtn.onclick = confirmDiscard;
                bar.appendChild(discardBtn);

                addRowBreak();

                const jokerBtn = document.createElement('button');
                jokerBtn.textContent = 'Exchange Joker';
                jokerBtn.style.background = '#ff9800';
                jokerBtn.onclick = attemptJokerExchangeWithSelectedTile;
                bar.appendChild(jokerBtn);

                const mjBtn2 = document.createElement('button');
                mjBtn2.textContent = 'Declare Mahjong';
                mjBtn2.style.background = '#4caf50';
                mjBtn2.onclick = openMahjongDialog;
                bar.appendChild(mjBtn2);

                addHintBtn();

            // ── State 3: Bot's turn — idle label ──
            } else if (!gameState.callDialogOpen) {
                const idle = document.createElement('div');
                idle.className = 'bar-idle';
                const whose = gameState.currentTurn ? `${gameState.currentTurn.name}'s turn…` : 'Waiting…';
                idle.textContent = whose;
                bar.appendChild(idle);

                addHintBtn();
            }
        }

        function updateWalls() {
            // Find human player to determine wall mapping
            const humanPlayer = gameState.players.find(p => p.isHuman);
            if (!humanPlayer) return;
            
            // Map wall positions to screen
            const getWallScreenPosition = (actualWind) => {
                const humanWind = humanPlayer.position;
                const windOrder = ['E', 'S', 'W', 'N'];
                const humanIndex = windOrder.indexOf(humanWind);
                const wallIndex = windOrder.indexOf(actualWind);
                
                let relativePos = (wallIndex - humanIndex + 4) % 4;
                const wallPositions = ['wallSouth', 'wallEast', 'wallNorth', 'wallWest'];
                return wallPositions[relativePos];
            };
            
            // Clear all walls first
            ['wallSouth', 'wallNorth', 'wallEast', 'wallWest'].forEach(wallId => {
                document.getElementById(wallId).innerHTML = '';
            });
            
            if (gameState.phase === 'playing') {
                // During playing phase: show stacks based on remaining wall tiles
                // Drawing order: North → West → South → East
                const tilesRemaining = gameState.wall.length;
                const stacksRemaining = Math.ceil(tilesRemaining / 2);
                
                // Distribute stacks across walls in drawing order
                const stacksPerWall = {
                    'N': Math.min(19, stacksRemaining),
                    'W': Math.min(19, Math.max(0, stacksRemaining - 19)),
                    'S': Math.min(19, Math.max(0, stacksRemaining - 38)),
                    'E': Math.max(0, stacksRemaining - 57)
                };
                
                // Render each wall
                ['E', 'S', 'W', 'N'].forEach(wind => {
                    const screenWallId = getWallScreenPosition(wind);
                    const wall = document.getElementById(screenWallId);
                    const stacksToShow = stacksPerWall[wind];
                    
                    for (let i = 0; i < 19; i++) {
                        const stack = document.createElement('div');
                        stack.className = 'wall-stack';
                        
                        // Mark as empty if beyond the number of stacks to show
                        if (i >= stacksToShow) {
                            stack.classList.add('empty');
                        }
                        
                        wall.appendChild(stack);
                    }
                });
                
            } else if (gameState.phase === 'dealt' || gameState.phase === 'charleston') {
                // During dealing/charleston: show walls as before (based on dealing)
                const tilesDealt = gameState.tilesDealt || 0;
                const stacksDealt = Math.ceil(tilesDealt / 2);
                const diceRoll = gameState.diceRoll || 0;
                
                const eastScreenWall = getWallScreenPosition('E');
                const northScreenWall = getWallScreenPosition('N');
                
                // East's wall: diceRoll stacks remain (toward corner with North)
                const eastStacksRemaining = diceRoll;
                const eastStacksAvailable = 19 - eastStacksRemaining;
                const eastStacksDealt = Math.min(eastStacksAvailable, stacksDealt);
                
                // North's wall: gets dealt after East's wall depleted
                const northStacksDealt = Math.max(0, stacksDealt - eastStacksDealt);
                
                // Render each wall based on SCREEN position
                ['wallSouth', 'wallNorth', 'wallEast', 'wallWest'].forEach((screenWallId) => {
                    const wall = document.getElementById(screenWallId);
                    
                    for (let i = 0; i < 19; i++) {
                        const stack = document.createElement('div');
                        stack.className = 'wall-stack';
                        
                        if (screenWallId === eastScreenWall) {
                            // East's wall: DEALT (empty) stacks toward the corner with North
                            let showEmptyAtEnd = false;
                            
                            if (screenWallId === 'wallSouth' && northScreenWall === 'wallWest') showEmptyAtEnd = false;
                            else if (screenWallId === 'wallSouth' && northScreenWall === 'wallEast') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallNorth' && northScreenWall === 'wallWest') showEmptyAtEnd = false;
                            else if (screenWallId === 'wallNorth' && northScreenWall === 'wallEast') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallEast' && northScreenWall === 'wallNorth') showEmptyAtEnd = false;
                            else if (screenWallId === 'wallEast' && northScreenWall === 'wallSouth') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallWest' && northScreenWall === 'wallNorth') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallWest' && northScreenWall === 'wallSouth') showEmptyAtEnd = false;
                            
                            if (showEmptyAtEnd) {
                                if (i >= (19 - eastStacksDealt)) {
                                    stack.classList.add('empty');
                                }
                            } else {
                                if (i < eastStacksDealt) {
                                    stack.classList.add('empty');
                                }
                            }
                            
                        } else if (screenWallId === northScreenWall) {
                            // North's wall: DEALT (empty) stacks toward the corner with East
                            let showEmptyAtStart = false;
                            
                            if (screenWallId === 'wallSouth' && eastScreenWall === 'wallWest') showEmptyAtStart = true;
                            else if (screenWallId === 'wallSouth' && eastScreenWall === 'wallEast') showEmptyAtStart = false;
                            else if (screenWallId === 'wallNorth' && eastScreenWall === 'wallWest') showEmptyAtStart = true;
                            else if (screenWallId === 'wallNorth' && eastScreenWall === 'wallEast') showEmptyAtStart = false;
                            else if (screenWallId === 'wallEast' && eastScreenWall === 'wallNorth') showEmptyAtStart = true;
                            else if (screenWallId === 'wallEast' && eastScreenWall === 'wallSouth') showEmptyAtStart = false;
                            else if (screenWallId === 'wallWest' && eastScreenWall === 'wallNorth') showEmptyAtStart = false;
                            else if (screenWallId === 'wallWest' && eastScreenWall === 'wallSouth') showEmptyAtStart = true;
                            
                            if (showEmptyAtStart) {
                                if (i < northStacksDealt) {
                                    stack.classList.add('empty');
                                }
                            } else {
                                if (i >= (19 - northStacksDealt)) {
                                    stack.classList.add('empty');
                                }
                            }
                        }
                        
                        wall.appendChild(stack);
                    }
                });
            } else {
                // Before dealing: show all walls full
                ['wallSouth', 'wallNorth', 'wallEast', 'wallWest'].forEach(wallId => {
                    const wall = document.getElementById(wallId);
                    for (let i = 0; i < 19; i++) {
                        const stack = document.createElement('div');
                        stack.className = 'wall-stack';
                        wall.appendChild(stack);
                    }
                });
            }
        }

        // ── View helpers ──────────────────────────────────────────────────────

        function showLanding() {
            document.getElementById('cardPickerView').style.display = 'none';
            document.getElementById('gameView').style.display = 'none';
            document.getElementById('landingView').style.display = 'flex';
        }

        function showCardPicker() {
            document.getElementById('landingView').style.display = 'none';
            document.getElementById('cardPickerView').style.display = 'flex';

            // Populate the card list dynamically from the registry
            const list = document.getElementById('cardPickerList');
            list.innerHTML = '';
            getAvailableCards().forEach(card => {
                const btn = document.createElement('button');
                btn.className = 'start-btn';
                btn.style.cssText = 'font-size:16px; padding:14px 24px;';
                btn.textContent = card.label;
                btn.onclick = () => launchGame(card.year);
                list.appendChild(btn);
            });
        }

        function returnToHome() {
            document.getElementById('cornerMenuDropdown').classList.remove('open');
            if (gameState.phase !== 'setup' && !gameState.gameOver) {
                if (!confirm('Return to home? Current game will be lost.')) return;
            }
            // Exit fullscreen if active
            if (document.exitFullscreen && document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            } else if (document.webkitExitFullscreen && document.webkitFullscreenElement) {
                document.webkitExitFullscreen();
            }
            document.getElementById('gameView').style.display = 'none';
            document.getElementById('landingView').style.display = 'flex';
        }

        function launchGame(year) {
            // Load the requested card year (defaults to current if not specified)
            loadCard(year || null, function() {
                document.getElementById('landingView').style.display = 'none';
                document.getElementById('cardPickerView').style.display = 'none';
                document.getElementById('gameView').style.display = 'flex';
                startNewGame();
            });
        }

        function toggleFullscreen() {
            document.getElementById('cornerMenuDropdown').classList.remove('open');
            const el = document.documentElement;
            const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
            if (isFullscreen) {
                if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            } else {
                if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            }
        }

        function toggleCornerMenu() {
            const dropdown = document.getElementById('cornerMenuDropdown');
            dropdown.classList.toggle('open');
        }

        // Close menu if clicking outside it
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('cornerMenu');
            if (menu && !menu.contains(e.target)) {
                document.getElementById('cornerMenuDropdown').classList.remove('open');
            }
        });

        function confirmResetScores() {
            document.getElementById('cornerMenuDropdown').classList.remove('open');
            if (confirm('Reset all scores to 100? This cannot be undone.')) {
                resetScores();
                updateDisplay();
            }
        }

        function confirmNewGame() {
            document.getElementById('cornerMenuDropdown').classList.remove('open');

            // If game is already over, just show end-of-round overlay (don't double-dialog)
            if (gameState.gameOver) {
                startNewGame();
                return;
            }

            // Build a choice dialog: re-deal (penalty) vs full reset
            const humanPlayer = gameState.players.find(p => p.isHuman);
            const humanScore = humanPlayer ? gameState.scores[humanPlayer.position] : 100;
            const penalty = humanScore < 10 ? 1 : Math.floor(humanScore * 0.1);

            // Remove any existing dialog
            const existingDlg = document.getElementById('newGameChoiceDialog');
            if (existingDlg) existingDlg.remove();

            const dlgOverlay = document.createElement('div');
            dlgOverlay.id = 'newGameChoiceDialog';
            dlgOverlay.style.cssText = `
                position:fixed; top:0; left:0; width:100%; height:100%;
                background:rgba(0,0,0,0.6); display:flex; align-items:center;
                justify-content:center; z-index:20000;
            `;

            const dlg = document.createElement('div');
            dlg.style.cssText = `
                background:white; border-radius:10px; padding:28px 32px;
                max-width:420px; width:90%; text-align:center;
                box-shadow:0 8px 32px rgba(0,0,0,0.3);
            `;

            const title = document.createElement('h2');
            title.style.cssText = 'color:#2c5f2d; margin:0 0 8px;';
            title.textContent = 'Start a New Game?';
            dlg.appendChild(title);

            const sub = document.createElement('p');
            sub.style.cssText = 'color:#555; font-size:14px; margin:0 0 20px;';
            sub.textContent = 'Choose how you\'d like to proceed:';
            dlg.appendChild(sub);

            const reDealBtn = document.createElement('button');
            reDealBtn.style.cssText = `
                display:block; width:100%; background:#2c5f2d; color:white;
                padding:13px; font-size:15px; border-radius:6px; cursor:pointer;
                border:none; margin-bottom:10px;
            `;
            reDealBtn.innerHTML = `🀄 Re-deal this hand <span style="font-size:12px; opacity:0.85;">(−${penalty} pts penalty for you)</span>`;
            reDealBtn.onclick = () => {
                dlgOverlay.remove();
                dealNextRound({ redeal: true });
            };
            dlg.appendChild(reDealBtn);

            const resetBtn = document.createElement('button');
            resetBtn.style.cssText = `
                display:block; width:100%; background:#888; color:white;
                padding:13px; font-size:15px; border-radius:6px; cursor:pointer;
                border:none; margin-bottom:10px;
            `;
            resetBtn.textContent = '🆕 Start New Game (reset scores to 100)';
            resetBtn.onclick = () => { dlgOverlay.remove(); resetScores(); startNewGame(); };
            dlg.appendChild(resetBtn);

            const cancelBtn = document.createElement('button');
            cancelBtn.style.cssText = `
                display:block; width:100%; background:transparent; color:#888;
                padding:10px; font-size:14px; border-radius:6px; cursor:pointer;
                border:1px solid #ddd;
            `;
            cancelBtn.textContent = 'Cancel';
            cancelBtn.onclick = () => dlgOverlay.remove();
            dlg.appendChild(cancelBtn);

            dlgOverlay.appendChild(dlg);
            document.body.appendChild(dlgOverlay);
        }

        // Initialize on load — activate default card and show landing page
        window.addEventListener('load', () => {

            // Activate the default card (2025 is already loaded via <script> tag)
            loadCard(null);

            // Set correct mute button label based on saved preference
            const muteBtn = document.getElementById('muteBtn');
            if (muteBtn) muteBtn.textContent = SoundEngine.muted ? '🔇 Unmute' : '🔊 Mute';

            // Register service worker for PWA offline support
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    // Check for updates whenever the page loads
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version available — show a subtle update banner
                                const banner = document.createElement('div');
                                banner.style.cssText = `
                                    position: fixed; bottom: 0; left: 0; right: 0;
                                    background: #2c5f2d; color: white;
                                    padding: 12px 16px; text-align: center;
                                    font-size: 14px; z-index: 9999;
                                    display: flex; justify-content: center; gap: 12px; align-items: center;
                                `;
                                banner.innerHTML = `
                                    <span>🀄 A new version is available!</span>
                                    <button onclick="window.location.reload()" style="
                                        background: white; color: #2c5f2d; border: none;
                                        padding: 6px 14px; border-radius: 4px;
                                        font-weight: 700; cursor: pointer;">
                                        Update now
                                    </button>
                                `;
                                document.body.appendChild(banner);
                            }
                        });
                    });
                }).catch(err => {
                    console.log('Service worker registration failed:', err);
                });
            }
        });
    </script>

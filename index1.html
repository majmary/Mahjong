        // Deal tiles
        function dealTiles() {
            // East rolls dice to determine break point
            const diceRoll = rollDice();
            gameState.diceRoll = diceRoll;
            
            // Break point is counted from the right side of East's wall (in stacks)
            // Each stack is 2 tiles
            const breakStacksFromRight = diceRoll;
            const breakTilesFromRight = breakStacksFromRight * 2;
            
            // Start dealing from this point
            let dealIndex = 0; // We'll deal from the pre-shuffled wall
            
            // Deal 3 rounds of 4 tiles each (12 tiles per player)
            for (let round = 0; round < 3; round++) {
                for (let player of gameState.players) {
                    for (let i = 0; i < 4; i++) {
                        player.tiles.push(gameState.wall[dealIndex]);
                        dealIndex++;
                    }
                }
            }
            
            // Deal 1 tile to each player (13 total)
            for (let player of gameState.players) {
                player.tiles.push(gameState.wall[dealIndex]);
                dealIndex++;
            }
            
            // East gets one more tile (14 total)
            const eastPlayer = gameState.players.find(p => p.position === 'E');
            eastPlayer.tiles.push(gameState.wall[dealIndex]);
            dealIndex++;
            
            // Track tiles dealt
            gameState.tilesDealt = dealIndex;
            
            // Update wall to show remaining tiles
            gameState.wall = gameState.wall.slice(dealIndex);
            
            gameState.phase = 'dealt';
            
            // Sort all players' hands
            gameState.players.forEach(player => {
                player.tiles = sortTiles([...player.tiles]);
            });
            
            updateDisplay();
        }

        // Start Charleston
        function startCharleston() {
            gameState.phase = 'charleston';
            gameState.charlestonPhase = 'right'; // First pass is to the right
            gameState.charlestonPassCount = 1;
            gameState.charlestonSelectedTiles = [];
            gameState.charlestonIncomingTiles.clear();
            
            updateDisplay();
        }

        // Bot tile selection - uses hand analyzer to make smart decisions
        function botSelectTilesToPass(player, count = 3) {
            try {
                return smartBotSelectTilesToPass(player, count);
            } catch (err) {
                // Fallback to random selection if analyzer fails
                console.error("Bot analyzer error, using random selection:", err);
                const selectableTiles = [];
                player.tiles.forEach((tile, idx) => {
                    if (tile !== 'J') {
                        selectableTiles.push(idx);
                    }
                });
                
                // Shuffle and take first 'count' tiles
                const shuffled = shuffle([...selectableTiles]);
                return shuffled.slice(0, Math.min(count, selectableTiles.length));
            }
        }

        // Get pass direction target
        function getPassTarget(fromPosition, passDirection) {
            const positions = ['E', 'S', 'W', 'N'];
            const fromIdx = positions.indexOf(fromPosition);
            
            if (passDirection === 'right') {
                // Right means clockwise: E->S, S->W, W->N, N->E
                return positions[(fromIdx + 1) % 4];
            } else if (passDirection === 'left') {
                // Left means counter-clockwise: E->N, N->W, W->S, S->E
                return positions[(fromIdx + 3) % 4];
            } else if (passDirection === 'across') {
                // Across means opposite: E->W, S->N, W->E, N->S
                return positions[(fromIdx + 2) % 4];
            }
            return null;
        }

        // Toggle tile selection for human player
        function toggleTileSelection(tileIndex) {
            const humanPlayer = gameState.players.find(p => p.isHuman);
            if (!humanPlayer) return;
            
            const tile = humanPlayer.tiles[tileIndex];
            
            // Can't select jokers during Charleston
            if (tile === 'J' && gameState.phase === 'charleston') return;

            SoundEngine.tileClick();
            
            const selectedIdx = gameState.charlestonSelectedTiles.indexOf(tileIndex);
            
            if (selectedIdx !== -1) {
                // Deselect
                gameState.charlestonSelectedTiles.splice(selectedIdx, 1);
            } else {
                // Select (max 3 for regular passes, will handle courtesy differently)
                const maxSelect = gameState.charlestonPhase === 'courtesy-pass' ? 
                    gameState.charlestonCourtesyCount : 3;
                    
                if (gameState.charlestonSelectedTiles.length < maxSelect) {
                    gameState.charlestonSelectedTiles.push(tileIndex);
                }
            }
            
            updateDisplay();
        }

        // Execute Charleston pass
        function executeCharlestonPass() {
            const humanPlayer = gameState.players.find(p => p.isHuman);
            
            // Determine if this is a flexible pass (last of each Charleston round)
            const isFlexiblePass = (gameState.charlestonPhase === 'left' || 
                                   gameState.charlestonPhase === 'optional-right');
            
            // Validate human player has selected correct number of tiles
            let requiredCount;
            if (isFlexiblePass) {
                // Flexible pass: 0-3 tiles allowed
                requiredCount = gameState.charlestonSelectedTiles.length;
                if (requiredCount > 3) {
                    alert('Please select 0-3 tiles for this pass.');
                    return;
                }
            } else if (gameState.charlestonPhase === 'courtesy-pass') {
                // Courtesy pass: 0-3 tiles allowed
                requiredCount = gameState.charlestonSelectedTiles.length;
                if (requiredCount > 3) {
                    alert('Please select 0-3 tiles for courtesy pass.');
                    return;
                }
                
                // If 0 tiles, skip courtesy pass and complete Charleston
                if (requiredCount === 0) {
                    startPlayingPhase();
                    return;
                }
            } else {
                // Regular passes: exactly 3 required
                requiredCount = 3;
                if (gameState.charlestonSelectedTiles.length !== requiredCount) {
                    alert(`Please select exactly ${requiredCount} tiles to pass.`);
                    return;
                }
            }
            
            // Get pass direction - courtesy is always across
            let passDirection;
            if (gameState.charlestonPhase === 'courtesy-pass') {
                passDirection = 'across';
            } else {
                passDirection = gameState.charlestonPhase.replace('optional-', '');
            }
            
            // Collect tiles from all players
            const tilesToPass = new Map(); // position -> tiles array
            const tileIndices = new Map(); // position -> indices array
            
            gameState.players.forEach(player => {
                if (player.isHuman) {
                    // Human player's selected tiles
                    const indices = [...gameState.charlestonSelectedTiles].sort((a, b) => b - a);
                    const tiles = indices.map(idx => player.tiles[idx]);
                    tilesToPass.set(player.position, tiles);
                    tileIndices.set(player.position, indices);
                } else {
                    // Bots decide how many tiles to pass
                    let countToPass;
                    if (isFlexiblePass) {
                        // Bot strategy for flexible pass: analyze and decide 0-3
                        countToPass = botDecideFlexiblePassCount(player);
                    } else if (gameState.charlestonPhase === 'courtesy-pass') {
                        // For courtesy pass, bot passes same number as human
                        countToPass = requiredCount;
                    } else {
                        // Regular passes: 3 tiles
                        countToPass = 3;
                    }
                    
                    const indices = botSelectTilesToPass(player, countToPass);
                    const tiles = indices.map(idx => player.tiles[idx]);
                    tilesToPass.set(player.position, tiles);
                    tileIndices.set(player.position, indices);
                }
            });
            
            // Remove tiles from hands (in reverse order to preserve indices)
            gameState.players.forEach(player => {
                const indices = tileIndices.get(player.position);
                indices.sort((a, b) => b - a); // Sort descending
                indices.forEach(idx => {
                    player.tiles.splice(idx, 1);
                });
            });
            
            // Distribute tiles to recipients
            gameState.charlestonIncomingTiles.clear();
            
            if (isFlexiblePass) {
                // FLEXIBLE PASS WITH SEQUENTIAL FLOW
                // Find player passing MOST tiles, start there, follow pass direction
                
                const positions = ['E', 'S', 'W', 'N'];
                
                // Find max tiles being passed
                const maxTilesPassed = Math.max(...positions.map(pos => tilesToPass.get(pos).length));
                
                // Get pass direction order
                let orderedPositions;
                if (passDirection === 'right') {
                    orderedPositions = ['E', 'S', 'W', 'N']; // E→S→W→N→E
                } else if (passDirection === 'left') {
                    orderedPositions = ['E', 'N', 'W', 'S']; // E→N→W→S→E
                } else { // across
                    orderedPositions = ['E', 'W', 'S', 'N']; // E→W, S→N
                }
                
                // Find first player in pass order who is passing max tiles
                const startIdx = orderedPositions.findIndex(pos => tilesToPass.get(pos).length === maxTilesPassed);
                
                // Reorder to start from that player
                const processOrder = [
                    ...orderedPositions.slice(startIdx),
                    ...orderedPositions.slice(0, startIdx)
                ];
                
                // Track what each player sends forward
                const tilesToSendForward = new Map();
                
                // Track what each player keeps
                const keptTiles = new Map();
                
                // Process each player in order
                processOrder.forEach((position, index) => {
                    const chosenFromHand = tilesToPass.get(position);
                    const tilesChosen = chosenFromHand.length;
                    
                    if (index === 0) {
                        // First player: sends what they chose (initiates the flow)
                        tilesToSendForward.set(position, chosenFromHand);
                        keptTiles.set(position, []); // Keeps nothing yet
                    } else {
                        // Get incoming from previous player in sequence
                        const sourcePosition = processOrder[index - 1];
                        const incomingTiles = tilesToSendForward.get(sourcePosition);
                        
                        if (!incomingTiles || incomingTiles.length === 0) {
                            tilesToSendForward.set(position, chosenFromHand);
                            keptTiles.set(position, []);
                        } else {
                            // Keep N from incoming (N = tiles chosen from hand)
                            const numToKeep = Math.min(tilesChosen, incomingTiles.length);
                            const shuffledIncoming = shuffle([...incomingTiles]);
                            const keepFromIncoming = shuffledIncoming.slice(0, numToKeep);
                            const forwardFromIncoming = shuffledIncoming.slice(numToKeep);
                            
                            // Send forward: chosen from hand + remaining incoming
                            const sendForward = [...chosenFromHand, ...forwardFromIncoming];
                            
                            tilesToSendForward.set(position, sendForward);
                            keptTiles.set(position, keepFromIncoming);
                        }
                    }
                });
                
                // The first player (who started the flow) receives from the last player
                const firstPlayer = processOrder[0];
                const lastPlayer = processOrder[processOrder.length - 1];
                const finalIncoming = tilesToSendForward.get(lastPlayer);
                const firstPlayerChosen = tilesToPass.get(firstPlayer).length;
                
                if (finalIncoming && finalIncoming.length > 0) {
                    const numToKeep = Math.min(firstPlayerChosen, finalIncoming.length);
                    const shuffledIncoming = shuffle([...finalIncoming]);
                    const keepFromIncoming = shuffledIncoming.slice(0, numToKeep);
                    
                    keptTiles.set(firstPlayer, keepFromIncoming);
                }
                
                // Distribute kept tiles to players and track for highlighting
                positions.forEach(position => {
                    const player = gameState.players.find(p => p.position === position);
                    const tilesToAdd = keptTiles.get(position) || [];
                    
                    const startIdx = player.tiles.length;
                    player.tiles.push(...tilesToAdd);
                    
                    // Track for highlighting
                    const tempIndices = [];
                    for (let i = 0; i < tilesToAdd.length; i++) {
                        tempIndices.push({ value: tilesToAdd[i], tempIdx: startIdx + i });
                    }
                    
                    player.tiles = sortTiles([...player.tiles]);
                    
                    // Find where new tiles ended up after sorting
                    const newIndices = [];
                    tempIndices.forEach(newTile => {
                        for (let i = 0; i < player.tiles.length; i++) {
                            if (player.tiles[i] === newTile.value && !newIndices.includes(i)) {
                                newIndices.push(i);
                                break;
                            }
                        }
                    });
                    
                    gameState.charlestonIncomingTiles.set(position, newIndices);
                });
            } else {
                // REGULAR PASS (no bypass)
                gameState.players.forEach(player => {
                    const targetPosition = getPassTarget(player.position, passDirection);
                    const targetPlayer = gameState.players.find(p => p.position === targetPosition);
                    const tilesToReceive = tilesToPass.get(player.position);
                    
                    // Track where new tiles start before adding
                    const startIdx = targetPlayer.tiles.length;
                    targetPlayer.tiles.push(...tilesToReceive);
                    
                    // Sort and track new tile positions
                    const tempIndices = [];
                    for (let i = 0; i < tilesToReceive.length; i++) {
                        tempIndices.push({ value: tilesToReceive[i], tempIdx: startIdx + i });
                    }
                    
                    targetPlayer.tiles = sortTiles([...targetPlayer.tiles]);
                    
                    // Find where new tiles ended up after sorting
                    const newIndices = [];
                    tempIndices.forEach(newTile => {
                        for (let i = 0; i < targetPlayer.tiles.length; i++) {
                            if (targetPlayer.tiles[i] === newTile.value && !newIndices.includes(i)) {
                                newIndices.push(i);
                                break;
                            }
                        }
                    });
                    
                    gameState.charlestonIncomingTiles.set(targetPosition, newIndices);
                });
            }
            
            // Clear selection
            gameState.charlestonSelectedTiles = [];
            
            // If this was the courtesy pass, save the human's new tile indices so they
            // stay highlighted after the phase transitions to 'playing'
            if (gameState.charlestonPhase === 'courtesy-pass') {
                const humanPlayer = gameState.players.find(p => p.isHuman);
                if (humanPlayer && gameState.charlestonIncomingTiles.has(humanPlayer.position)) {
                    gameState.courtesyPassIncomingTiles = new Set(
                        gameState.charlestonIncomingTiles.get(humanPlayer.position)
                    );
                }
            }
            
            // Advance to next phase
            advanceCharlestonPhase();
            
            updateDisplay();
        }
        
        // Helper: Get source position for a pass direction
        function getPassSource(toPosition, passDirection) {
            const positions = ['E', 'S', 'W', 'N'];
            const toIdx = positions.indexOf(toPosition);
            
            if (passDirection === 'right') {
                return positions[(toIdx + 3) % 4]; // From left
            } else if (passDirection === 'across') {
                return positions[(toIdx + 2) % 4]; // From across
            } else if (passDirection === 'left') {
                return positions[(toIdx + 1) % 4]; // From right
            }
            return toPosition;
        }
        
        // Bot decides how many tiles to pass on flexible passes
        function botDecideFlexiblePassCount(player) {
            // Strategy: analyze hand quality, adjusted by personality
            try {
                const evaluation = personalityEval(player, player.tiles, 3);
                
                if (!evaluation.bestMatch) {
                    return 3;
                }
                
                const tilesFilled = evaluation.bestMatch.tilesFilled;
                const p = player && player.personality ? player.personality : null;

                // Ian (gambler) and Martin (flex) are more aggressive — pass more to find better tiles
                if (p && p.pointsBasedScoring) {
                    // Ian: always willing to pass more, chasing big point hands
                    return tilesFilled >= 12 ? 1 : 3;
                }
                if (p && p.handLockMode === 'flex') {
                    // Martin/Rachel: pass more aggressively to maximize tile variety
                    return tilesFilled >= 12 ? 1 : 3;
                }
                // Katie: very conservative — she's already locked in mindset, protect what she has
                if (p && p.handLockMode === 'immediate') {
                    if (tilesFilled >= 10) return 0;
                    if (tilesFilled >= 8) return 1;
                    return 2;
                }

                // Default (Alyssa, Cathy, Dan, Mary): standard thresholds
                if (tilesFilled >= 12) {
                    return Math.floor(Math.random() * 2); // 0-1 tiles
                } else if (tilesFilled >= 10) {
                    return Math.floor(Math.random() * 3); // 0-2 tiles
                } else {
                    return 2 + Math.floor(Math.random() * 2); // 2-3 tiles
                }
            } catch (err) {
                console.error('Bot flexible pass decision error:', err);
                return 3;
            }
        }

        // Advance to next Charleston phase
        function advanceCharlestonPhase() {
            gameState.charlestonPassCount++;
            
            if (gameState.charlestonPhase === 'right') {
                gameState.charlestonPhase = 'across';
            } else if (gameState.charlestonPhase === 'across') {
                gameState.charlestonPhase = 'left';
            } else if (gameState.charlestonPhase === 'left') {
                gameState.charlestonPhase = 'optional-veto';
            } else if (gameState.charlestonPhase === 'optional-left') {
                gameState.charlestonPhase = 'optional-across';
            } else if (gameState.charlestonPhase === 'optional-across') {
                gameState.charlestonPhase = 'optional-right';
            } else if (gameState.charlestonPhase === 'optional-right') {
                // Skip negotiate, go straight to courtesy pass
                gameState.charlestonPhase = 'courtesy-pass';
            } else if (gameState.charlestonPhase === 'courtesy-pass') {
                // Charleston complete! Start playing phase
                startPlayingPhase();
                return; // Don't call updateDisplay, startPlayingPhase handles it
            }
        }

        // Handle optional Charleston veto
        function handleOptionalVeto(userConsents) {
            // For now, bots always consent
            const botsConsent = true;
            
            if (userConsents && botsConsent) {
                // Continue with optional Charleston
                gameState.charlestonPhase = 'optional-left';
            } else {
                // Skip to courtesy pass
                gameState.charlestonPhase = 'courtesy-pass';
            }
            updateDisplay();
        }

        // ========================================
        // PLAYING PHASE FUNCTIONS
        // ========================================
        
        // Start the playing phase after Charleston completes
        function startPlayingPhase() {
            gameState.phase = 'playing';
            gameState.charlestonPhase = 'complete';
            gameState.charlestonSelectedTiles = [];

            // Lock in any personality-based state (e.g. Katie's hand lock)
            initBotPersonalityState();
            
            // East starts and needs to discard (they have 14 tiles)
            const eastPlayer = gameState.players.find(p => p.position === 'E');
            gameState.currentTurn = eastPlayer;
            
            // Clear any highlighting
            gameState.newlyDrawnTileIndex = null;
            gameState.selectedTileIndex = null;
            
            updateDisplay();
            
            if (eastPlayer.isHuman) {
                updatePhaseIndicator('🎯 YOUR TURN - You have 14 tiles, discard one to start the game');
            } else {
                updatePhaseIndicator(`${eastPlayer.name} (East) has 14 tiles, discarding first tile...`);
            }
            
            // If East is a bot, auto-discard after a delay
            if (!eastPlayer.isHuman) {
                setTimeout(() => {
                    botTakeTurn(eastPlayer, true); // true = isFirstDiscard
                }, 1500);
            }
        }
        
        // Draw a tile from the wall
        function drawTile(player) {
            if (gameState.wall.length === 0) {
                gameDraw();
                return false;
            }
            
            const tile = gameState.wall.shift();
            player.tiles.push(tile);
            
            // Highlight the new tile if it's the human player
            if (player.isHuman) {
                gameState.newlyDrawnTileIndex = player.tiles.length - 1;
            }
            
            return true;
        }
        
        // Discard a tile
        function discardTile(player, tileIndex) {
            if (tileIndex < 0 || tileIndex >= player.tiles.length) {
                console.error('Invalid tile index for discard');
                return false;
            }
            
            const discardedTile = player.tiles.splice(tileIndex, 1)[0];
            
            // Update action tracking with what tile was discarded
            if (gameState.lastPlayerAction && gameState.lastPlayerAction.player === player.name) {
                // This player has a pending action (called tile or joker exchange)
                gameState.lastPlayerAction.discardedTile = discardedTile;
            } else {
                // Normal discard - no special action
                gameState.lastPlayerAction = {
                    type: 'normal',
                    player: player.name,
                    discardedTile: discardedTile
                };
            }
            
            // Show tile in center of table and open calling window
            gameState.lastDiscardedTile = discardedTile;
            gameState.tileBeingCalled = discardedTile;
            gameState.discarderPosition = player.position; // Track who discarded for priority
            
            // Clear selection and highlighting
            gameState.selectedTileIndex = null;
            gameState.newlyDrawnTileIndex = null;
            gameState.courtesyPassIncomingTiles.clear();
            
            // Open calling window for all tiles (even jokers - button will be disabled)
            gameState.callingWindowOpen = true;
            
            updateDisplay();
            
            // Determine timer duration based on who discarded
            // If human discarded: short timer (only bots can call, they don't need UI time)
            // If bot discarded: longer timer (human needs time to decide)
            const humanPlayer = gameState.players.find(p => p.isHuman);
            const timerDuration = (player === humanPlayer) ? 1500 : 15000; // 1.5s for bot to decide, 15s for human
            
            // After timer expires, close calling window and move to discard pool
            gameState.callingWindowTimer = setTimeout(() => {
                gameState.callingWindowOpen = false;
                gameState.discardPool.push(discardedTile);
                gameState.lastDiscardedTile = null;
                gameState.tileBeingCalled = null;
                gameState.lastPlayerAction = null; // Clear action tracking
                updateDisplay();
                
                // Move to next turn (only if no one called)
                if (!gameState.callDialogOpen) {
                    nextTurn();
                }
            }, timerDuration);
            
            return true;
        }
        
        // Check if any bots want to call the discarded tile (in priority order)
        // Returns the bot that wants to call, or null if none
        function checkBotsWantToCall(discardedTile, discarderPosition) {
            console.log(`🔍 Checking if bots want to call ${discardedTile} (discarded by position ${discarderPosition})`);
            
            // Check each bot player (in turn order from discarder)
            const positionOrder = ['E', 'S', 'W', 'N'];
            const currentIndex = positionOrder.indexOf(discarderPosition);
            
            for (let i = 1; i <= 3; i++) { // Check next 3 players in priority order
                const nextPlayerPosition = positionOrder[(currentIndex + i) % 4];
                const nextPlayer = gameState.players.find(p => p.position === nextPlayerPosition);
                
                if (!nextPlayer || nextPlayer.isHuman) {
                    console.log(`  ${nextPlayerPosition}: Human (skipped)`);
                    continue; // Skip human players
                }
                
                console.log(`  Evaluating ${nextPlayer.name} (${nextPlayer.position})...`);
                
                // Check if bot wants to call
                try {
                    // Collect all exposed tiles from all players for tile tracking
                    const exposedTiles = [];
                    gameState.players.forEach(p => {
                        if (p.exposedSets) {
                            p.exposedSets.forEach(set => {
                                exposedTiles.push(...set.tiles);
                            });
                        }
                    });

                    // Resolve this player's own locked groups so evaluation sees the full hand
                    const playerLockedGroups = (nextPlayer.exposedSets || [])
                        .map(resolveExposureToLockedTiles)
                        .filter(g => g !== null);
                    const fullHand = [...nextPlayer.tiles, ...playerLockedGroups.flat()];
                    
                    const decision = shouldBotCallTile(
                        fullHand,
                        discardedTile,
                        exposedTiles,
                        gameState.discardPool,
                        playerLockedGroups,
                        nextPlayer.name,
                        nextPlayer
                    );
                    
                    if (decision.shouldCall) {
                        console.log(`    ✅ ${nextPlayer.name} WANTS TO CALL!`);
                        console.log(`    Reason: ${decision.reason}`);
                        console.log(`    Priority: ${i} (1=next player, 2=across, 3=before discarder)`);
                        
                        return {
                            player: nextPlayer,
                            decision: decision,
                            priority: i
                        };
                    } else {
                        console.log(`    ❌ ${nextPlayer.name} passes (${decision.reason})`);
                    }
                } catch (err) {
                    console.error(`Error checking bot ${nextPlayer.name} call decision:`, err);
                }
            }
            
            console.log('  No bots want to call');
            return null; // No bots want to call
        }
        
        // Execute a bot's call (add tile to hand, create exposure, set turn)
        function executeBotCall(player, calledTile, tilesForExposure) {
            console.log(`Executing call for ${player.name}:`);
            console.log('  Called tile:', calledTile);
            console.log('  Tiles from hand to expose:', tilesForExposure);
            SoundEngine.botCall();
            
            // Find and remove the tiles from hand
            const exposedTiles = [];
            const tilesToRemove = [...tilesForExposure]; // Copy array
            
            // Remove each tile from hand (in reverse to avoid index issues)
            const indicesToRemove = [];
            tilesToRemove.forEach(tileToRemove => {
                const idx = player.tiles.findIndex((t, i) => 
                    t === tileToRemove && !indicesToRemove.includes(i)
                );
                if (idx !== -1) {
                    indicesToRemove.push(idx);
                }
            });
            
            // Sort indices in descending order and remove
            indicesToRemove.sort((a, b) => b - a);
            indicesToRemove.forEach(idx => {
                exposedTiles.push(player.tiles.splice(idx, 1)[0]);
            });
            
            // Add called tile
            exposedTiles.push(calledTile);
            
            // CHECK: Is this a mahjong call? (exposure < 3 tiles)
            // For mahjong calls, we don't create an exposure - just add tile to hand and check mahjong
            if (exposedTiles.length < 3) {
                console.log('  This is a MAHJONG CALL (exposure < 3 tiles)');
                console.log('  Adding called tile to hand instead of creating exposure');
                
                // Return tiles from tilesForExposure to hand
                exposedTiles.forEach(t => {
                    if (t !== calledTile) {
                        player.tiles.push(t);
                    }
                });
                
                // Add called tile to hand
                player.tiles.push(calledTile);
                
                console.log(`  ${player.name} now has ${player.tiles.length} tiles in hand`);
                
                // Close calling window
                gameState.callingWindowOpen = false;
                gameState.lastDiscardedTile = null;
                gameState.tileBeingCalled = null;
                const savedDiscarderPos = gameState.discarderPosition; // Save before clearing
                gameState.discarderPosition = null;
                
                // Clear timer
                if (gameState.callingWindowTimer) {
                    clearTimeout(gameState.callingWindowTimer);
                    gameState.callingWindowTimer = null;
                }
                
                // Caller becomes current turn
                gameState.currentTurn = player;
                
                updateDisplay();
                
                // Check if bot has mahjong
                const mahjongCheck = checkMahjong(player);
                if (mahjongCheck.isWinning) {
                    gameState.mahjongWonFromWall = false; // Won from called discard
                    gameState.discarderPosition = savedDiscarderPos; // Restore for scoring
                    gameWon(player, mahjongCheck.matchedPattern, mahjongCheck.bestMatch);
                } else {
                    // This shouldn't happen - bot thought it was mahjong but it's not
                    console.error('ERROR: Bot called for mahjong but does not have mahjong!');
                    console.error('  Reason:', mahjongCheck.reason);
                    // Continue with discard
                    setTimeout(() => {
                        botTakeTurn(player, false);
                    }, 2500);
                }
                
                return;
            }
            
            // SAFETY CHECK: Normal exposures must have at least 3 tiles
            if (exposedTiles.length < 3) {
                console.error(`ERROR: Invalid exposure size (${exposedTiles.length}). Exposures must be at least 3 tiles.`);
                console.error('  Tiles:', exposedTiles);
                // Return tiles to hand
                exposedTiles.forEach(t => {
                    if (t !== calledTile) {
                        player.tiles.push(t);
                    }
                });
                return; // Abort the call
            }
            
            // Arrange tiles: naturals first, then jokers (for display)
            const naturals = exposedTiles.filter(t => t !== 'J');
            const jokers = exposedTiles.filter(t => t === 'J');
            const arrangedTiles = [...naturals, ...jokers];
            
            // Create exposure
            if (!player.exposedSets) {
                player.exposedSets = [];
            }
            
            player.exposedSets.push({
                tiles: arrangedTiles,
                calledTile: calledTile
            });
            
            console.log(`  Exposure created:`, arrangedTiles);
            console.log(`  ${player.name} now has ${player.tiles.length} tiles in hand`);
            
            // Close calling window
            gameState.callingWindowOpen = false;
            gameState.lastDiscardedTile = null;
            gameState.tileBeingCalled = null;
            const savedDiscarderPos = gameState.discarderPosition; // Save before clearing
            gameState.discarderPosition = null;
            
            // Clear timer
            if (gameState.callingWindowTimer) {
                clearTimeout(gameState.callingWindowTimer);
                gameState.callingWindowTimer = null;
            }
            
            // Caller becomes current turn
            gameState.currentTurn = player;
            
            // Track that this player called a tile (for display purposes)
            gameState.lastPlayerAction = {
                type: 'called',
                player: player.name,
                calledTile: calledTile,
                discardedTile: null // Will be set when they discard
            };
            
            updateDisplay();
            
            // Check if bot has mahjong after calling
            const mahjongCheck = checkMahjong(player);
            if (mahjongCheck.isWinning) {
                gameState.mahjongWonFromWall = false; // Won from called discard
                gameState.discarderPosition = savedDiscarderPos; // Restore for scoring
                gameWon(player, mahjongCheck.matchedPattern, mahjongCheck.bestMatch);
                return;
            }
            
            // Bot needs to discard after calling - longer delay so announcement is visible
            setTimeout(() => {
                botTakeTurn(player, false);
            }, 2500);
        }
        
        // Move to next player's turn
        function nextTurn() {
            const positionOrder = ['E', 'S', 'W', 'N'];
            const currentIndex = positionOrder.indexOf(gameState.currentTurn.position);
            const nextIndex = (currentIndex + 1) % 4;
            const nextPosition = positionOrder[nextIndex];
            
            gameState.currentTurn = gameState.players.find(p => p.position === nextPosition);
            
            // Draw a tile for the next player
            drawTile(gameState.currentTurn);
            updateDisplay();
            
            // Update phase indicator
            if (gameState.currentTurn.isHuman) {
                updatePhaseIndicator(`🎯 YOUR TURN - Select a tile to discard`);
            } else {
                updatePhaseIndicator(`${gameState.currentTurn.name}'s turn - thinking...`);
            }
            
            // If it's a bot's turn, auto-play after delay
            if (!gameState.currentTurn.isHuman) {
                setTimeout(() => {
                    botTakeTurn(gameState.currentTurn, false);
                }, 1500); // 1.5 second delay for human to consider calling
            }
        }
        
        // Bot takes their turn
        function botTakeTurn(player, isFirstDiscard = false) {
            if (isFirstDiscard) {
                // East's first discard (already has 14 tiles)
                // Check for mahjong first
                const mahjongCheck = checkMahjong(player);
                if (mahjongCheck.isWinning) {
                    gameState.mahjongWonFromWall = true; // East starts with dealt tiles (treat as wall)
                    gameWon(player, mahjongCheck.matchedPattern, mahjongCheck.bestMatch);
                    return;
                }
                
                // Check for joker exchange
                botCheckJokerExchange(player);
                
                const tileToDiscard = botSelectDiscard(player);
                discardTile(player, tileToDiscard);
            } else {
                // Normal turn: already drew tile
                // Check for mahjong first
                const mahjongCheck = checkMahjong(player);
                if (mahjongCheck.isWinning) {
                    gameState.mahjongWonFromWall = true; // Won from wall draw
                    gameWon(player, mahjongCheck.matchedPattern, mahjongCheck.bestMatch);
                    return;
                }
                
                // Check for joker exchange
                botCheckJokerExchange(player);
                
                const tileToDiscard = botSelectDiscard(player);
                discardTile(player, tileToDiscard);
            }
        }
        
        // Bot AI: Select which tile to discard
        function botSelectDiscard(player) {
            // Use improved draw/discard intelligence
            try {
                const lockedGroups = (player.exposedSets || [])
                    .map(resolveExposureToLockedTiles)
                    .filter(g => g !== null);
                // Include locked tiles in the full hand so evaluation sees all 13 tiles
                const fullHand = [...player.tiles, ...lockedGroups.flat()];
                const tileToDiscard = decideDrawDiscardDiscard(fullHand, lockedGroups, player);
                // Only discard from in-hand tiles — exposed tiles are locked
                const discardIndex = player.tiles.indexOf(tileToDiscard);
                
                if (discardIndex !== -1) {
                    // Cathy: occasionally discards the wrong tile
                    const p = player.personality;
                    if (p && p.badDiscardRate && Math.random() < p.badDiscardRate) {
                        const nonJokerIndices = player.tiles
                            .map((t, i) => ({ t, i }))
                            .filter(({ t, i }) => t !== 'J' && i !== discardIndex)
                            .map(({ i }) => i);
                        if (nonJokerIndices.length > 0) {
                            const randomIdx = nonJokerIndices[Math.floor(Math.random() * nonJokerIndices.length)];
                            console.log(`${player.name} makes a discard mistake!`);
                            return randomIdx;
                        }
                    }
                    return discardIndex;
                }
            } catch (err) {
                console.error('Bot improved discard error:', err);
            }
            
            // Fallback: discard first tile
            return 0;
        }
        
        // Human player selects tile to discard
        function selectTileForDiscard(tileIndex) {
            if (gameState.phase !== 'playing') return;
            if (!gameState.currentTurn || !gameState.currentTurn.isHuman) return;
            
            SoundEngine.tileClick();
            gameState.selectedTileIndex = tileIndex;
            updateDisplay();
        }
        
        // Human player confirms discard
        function confirmDiscard() {
            if (gameState.selectedTileIndex === null) {
                alert('Please select a tile to discard');
                return;
            }
            
            discardTile(gameState.currentTurn, gameState.selectedTileIndex);
        }
        
        // Update phase indicator text
        function updatePhaseIndicator(text) {
            const indicator = document.getElementById('phaseIndicator');
            if (!indicator) return;
            // Only show the overlay during Charleston phases
            if (gameState.phase === 'charleston' && text) {
                indicator.innerHTML = text;
                indicator.style.display = 'block';
            } else {
                indicator.style.display = 'none';
            }
        }

        /**
         * Handle human player calling tile to declare mahjong
         */
        function handleCallForMahjong() {
            console.log('👤 Human attempting to call for mahjong');
            
            const humanPlayer = gameState.players.find(p => p.isHuman);
            const calledTile = gameState.lastDiscardedTile;
            
            // Temporarily add the tile to hand for mahjong check
            humanPlayer.tiles.push(calledTile);
            
            // Check if hand is actually mahjong
            const mahjongCheck = checkMahjong(humanPlayer);
            
            if (mahjongCheck.isWinning) {
                // Close calling window
                gameState.callingWindowOpen = false;
                if (gameState.callingWindowTimer) {
                    clearTimeout(gameState.callingWindowTimer);
                    gameState.callingWindowTimer = null;
                }
                
                gameState.lastDiscardedTile = null;
                gameState.tileBeingCalled = null;
                const savedDiscarderPos = gameState.discarderPosition; // Save before clearing
                gameState.discarderPosition = null;
                
                // Player wins from discard (not wall)
                gameState.mahjongWonFromWall = false;
                gameState.discarderPosition = savedDiscarderPos; // Restore for scoring
                // Player wins!
                gameWon(humanPlayer, mahjongCheck.matchedPattern, mahjongCheck.bestMatch);
            } else {
                // Not actually mahjong - remove the tile and show error
                humanPlayer.tiles.pop();

                // Keep calling window open so they can try Call or Pass instead
                updateDisplay();

        // Handle Call button - open dialog to select tiles for exposure
        function handleCall() {
            console.log('👤 Human wants to call');
            
            const discardedTile = gameState.lastDiscardedTile;
            const discarderPosition = gameState.discarderPosition;
            const humanPlayer = gameState.players.find(p => p.isHuman);
            
            // Calculate human's priority (distance in turn order from discarder)
            const positionOrder = ['E', 'S', 'W', 'N'];
            const discarderIndex = positionOrder.indexOf(discarderPosition);
            const humanIndex = positionOrder.indexOf(humanPlayer.position);
            const humanPriority = (humanIndex - discarderIndex + 4) % 4;
            
            console.log(`  Human priority: ${humanPriority} (1=next, 2=across, 3=previous)`);
            
            // Check if any bots want to call AND have higher priority (lower number = higher priority)
            if (discardedTile && discarderPosition) {
                const botCallResult = checkBotsWantToCall(discardedTile, discarderPosition);
                
                if (botCallResult && botCallResult.priority < humanPriority) {
                    console.log(`🤖 Bot ${botCallResult.player.name} has higher priority (${botCallResult.priority} vs ${humanPriority})!`);
                    console.log('   Bot takes the tile instead of human');
                    
                    // Bot has priority - execute bot's call
                    gameState.callingWindowOpen = false;
                    if (gameState.callingWindowTimer) {
                        clearTimeout(gameState.callingWindowTimer);
                        gameState.callingWindowTimer = null;
                    }
                    
                    executeBotCall(botCallResult.player, discardedTile, botCallResult.decision.tilesForExposure);
                    return;
                }
            }
            
            console.log('  Human has priority - opening call dialog');
            
            // Human has priority (or no bots want it) - proceed with human call
            gameState.callingWindowOpen = false;
            gameState.callDialogOpen = true;
            gameState.selectedTilesForExposure = [];
            
            // Clear the timer so it doesn't auto-advance
            if (gameState.callingWindowTimer) {
                clearTimeout(gameState.callingWindowTimer);
                gameState.callingWindowTimer = null;
            }
            
            updateDisplay();
        }

        function handlePass() {
            console.log('👤 Human passes on calling');
            
            // Close calling window
            gameState.callingWindowOpen = false;
            
            // Clear the timer
            if (gameState.callingWindowTimer) {
                clearTimeout(gameState.callingWindowTimer);
                gameState.callingWindowTimer = null;
            }
            
            // Check if any bots want to call
            const discardedTile = gameState.lastDiscardedTile;
            const discarderPosition = gameState.discarderPosition;
            
            if (discardedTile && discarderPosition) {
                const botCallResult = checkBotsWantToCall(discardedTile, discarderPosition);

        // Validate and confirm exposure
        function confirmExposure() {
            const humanPlayer = gameState.players.find(p => p.isHuman);
            const selectedIndices = gameState.selectedTilesForExposure;
            const calledTile = gameState.tileBeingCalled;
            
            // Remove any previous error messages
            const existingError = document.querySelector('.exposure-error');
            if (existingError) existingError.remove();
            
            // Must select at least 2 tiles (will be 3+ with called tile)
            if (selectedIndices.length < 2) {
                showExposureError('You must select at least 2 tiles from your hand to expose (3+ total with the called tile).');
                return;
            }
            
            // Get the selected tiles
            const selectedTiles = selectedIndices.map(idx => humanPlayer.tiles[idx]);
            
            // Validate: all tiles must be identical (or jokers)
            const nonJokerTiles = [...selectedTiles, calledTile].filter(t => t !== 'J');
            const uniqueNonJokers = [...new Set(nonJokerTiles)];
            
            if (uniqueNonJokers.length > 1) {
                showExposureError('All tiles in the exposure must be identical (jokers are allowed). You selected different tiles.');
                return;
            }
            
            if (uniqueNonJokers.length === 0) {
                showExposureError('You cannot expose only jokers.');
                return;
            }
            
            // Valid exposure! Remove tiles from hand and create exposure
            const exposedTiles = [];
            
            // Remove selected tiles from hand (in reverse order to maintain indices)
            selectedIndices.sort((a, b) => b - a);
            selectedIndices.forEach(idx => {
                exposedTiles.push(humanPlayer.tiles.splice(idx, 1)[0]);
            });
            
            // Add called tile
            exposedTiles.push(calledTile);
            
            // Arrange tiles: naturals, then jokers (for display)
            const naturals = exposedTiles.filter(t => t !== 'J');
            const jokers = exposedTiles.filter(t => t === 'J');
            const arrangedTiles = [];
            
            // Interleave: natural, natural, joker, natural, joker, etc.
            let naturalIdx = 0;
            let jokerIdx = 0;
            for (let i = 0; i < exposedTiles.length; i++) {
                if (naturalIdx < naturals.length && (jokerIdx >= jokers.length || i % 2 === 0)) {
                    arrangedTiles.push(naturals[naturalIdx++]);
                } else if (jokerIdx < jokers.length) {
                    arrangedTiles.push(jokers[jokerIdx++]);
                }
            }
            
            // Create exposure
            humanPlayer.exposedSets.push({
                tiles: arrangedTiles,
                calledTile: calledTile
            });
            
            // Close dialog and cleanup
            gameState.callDialogOpen = false;
            gameState.selectedTilesForExposure = [];
            gameState.lastDiscardedTile = null;
            gameState.tileBeingCalled = null;
            gameState.discarderPosition = null;
            
            // Remove the dialog overlay immediately
            const overlay = document.querySelector('.call-dialog-overlay');
            if (overlay) {
                overlay.remove();
            }
            
            // Caller becomes current turn
            gameState.currentTurn = humanPlayer;
            
            // Track that human player called a tile (for display purposes)
            gameState.lastPlayerAction = {
                type: 'called',
                player: humanPlayer.name,
                calledTile: calledTile,
                discardedTile: null // Will be set when they discard
            };
            
            updateDisplay();
            updatePhaseIndicator('🎯 YOUR TURN - You called a tile and exposed. Now select a tile to discard.');
        }

        // Sort player's tiles
        function sortTiles(tiles) {
            const order = {
                'F': 0,
                'B': 1, 'C': 2, 'D': 3,
                'GD': 4, 'RD': 5, 'WD': 6,
                'N': 7, 'E': 8, 'S': 9, 'W': 10,
                'J': 11
            };

            return tiles.sort((a, b) => {
                const getSuitOrder = (tile) => {
                    if (tile === 'F') return 0;
                    if (tile === 'J') return 11;
                    if (tile === 'GD') return 4;
                    if (tile === 'RD') return 5;
                    if (tile === 'WD') return 6;
                    if (['N', 'E', 'S', 'W'].includes(tile)) return order[tile];
                    
                    const suit = tile.slice(-1);
                    return order[suit];
                };

                const aOrder = getSuitOrder(a);
                const bOrder = getSuitOrder(b);
                
                if (aOrder !== bOrder) return aOrder - bOrder;
                
                // Within same suit, sort by number
                const aNum = parseInt(a);
                const bNum = parseInt(b);
                if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
                
                return 0;
            });
        }

        // Sort discard pool: flowers, suits (by number within each suit), dragons, winds, jokers
        function sortDiscardPool(tiles) {
            return [...tiles].sort((a, b) => {
                // Category order: F=0, Suits=1-3, Dragons=4, Winds=5, J=6
                const getCategory = (tile) => {
                    if (tile === 'F') return 0;
                    // Check for dragons FIRST before checking suit letters
                    if (['GD', 'RD', 'WD'].includes(tile)) return 4;
                    // Check for suited tiles (numbered tiles ending in B, C, or D)
                    if (tile.length === 2 && !isNaN(tile[0])) {
                        const suit = tile.slice(-1);
                        if (suit === 'B') return 1;
                        if (suit === 'C') return 2;
                        if (suit === 'D') return 3;
                    }
                    if (['N', 'E', 'S', 'W'].includes(tile)) return 5;
                    if (tile === 'J') return 6;
                    return 7;
                };
                
                const aCategory = getCategory(a);
                const bCategory = getCategory(b);
                
                if (aCategory !== bCategory) return aCategory - bCategory;
                
                // Within suited tiles, sort by number
                if (aCategory >= 1 && aCategory <= 3) {
                    const aNum = parseInt(a);
                    const bNum = parseInt(b);
                    return aNum - bNum;
                }
                
                // Within dragons: GD < RD < WD
                if (aCategory === 4) {
                    const dragonOrder = { 'GD': 0, 'RD': 1, 'WD': 2 };
                    return dragonOrder[a] - dragonOrder[b];
                }
                
                // Within winds: N < E < S < W
                if (aCategory === 5) {
                    const windOrder = { 'N': 0, 'E': 1, 'S': 2, 'W': 3 };
                    return windOrder[a] - windOrder[b];
                }
                
                return 0;
            });
        }

        // Get tile display info (matching Charleston training)
        function getTileDisplay(tile) {
            // Handle dragons FIRST
            if (tile === 'WD') return { number: 'O', label: 'White', color: '#BBDEFB', textColor: '#01579B' };
            if (tile === 'GD') return { number: 'G', label: 'Green', color: '#C8E6C9', textColor: '#1B5E20' };
            if (tile === 'RD') return { number: 'R', label: 'Red', color: '#FFCDD2', textColor: '#B71C1C' };
            // Handle winds
            if (tile === 'N') return { number: 'N', label: 'North', color: '#ECEFF1', textColor: '#37474F' };
            if (tile === 'E') return { number: 'E', label: 'East', color: '#ECEFF1', textColor: '#37474F' };
            if (tile === 'W') return { number: 'W', label: 'West', color: '#ECEFF1', textColor: '#37474F' };
            if (tile === 'S') return { number: 'S', label: 'South', color: '#ECEFF1', textColor: '#37474F' };
            // Handle bamboo (B)
            if (tile.length === 2 && tile[1] === 'B') {
                const num = tile.slice(0, -1);
                return { number: num, label: 'Bam', color: '#E8F5E9', textColor: '#1B5E20' };
            }
            // Handle dots (D) - after dragons
            if (tile.length === 2 && tile[1] === 'D') {
                const num = tile.slice(0, -1);
                return { number: num, label: 'Dot', color: '#E3F2FD', textColor: '#01579B' };
            }
            // Handle cracks (C)
            if (tile.length === 2 && tile[1] === 'C') {
                const num = tile.slice(0, -1);
                return { number: num, label: 'Crack', color: '#FFEBEE', textColor: '#B71C1C' };
            }
            // Handle flowers and jokers
            if (tile === 'F') return { number: 'F', label: 'Flower', color: '#F3E5F5', textColor: '#6A1B9A' };
            if (tile === 'J') return { number: 'J', label: 'Joker', color: '#FFFDE7', textColor: '#F57F17' };
            // Default
            return { number: tile, label: '', color: '#f5f5f5', textColor: '#333333' };
        }

        // Render tile element
        function renderTile(tile, isFaceDown = false, isDraggable = false, options = {}) {
            const { 
                onClick = null, 
                isSelected = false, 
                isNew = false,
                tileIndex = null,
                isJoker = false
            } = options;
            
            const div = document.createElement('div');
            div.className = 'tile';
            
            if (isFaceDown) {
                div.classList.add('tile-back');
                div.textContent = ''; // Empty for cleaner look
                return div;
            }

            const display = getTileDisplay(tile);
            div.style.backgroundColor = display.color;
            
            // Add tile type class for color styling
            if (tile.endsWith('D') && tile.length === 2) div.classList.add('tile-D');
            else if (tile.endsWith('B')) div.classList.add('tile-B');
            else if (tile.endsWith('C')) div.classList.add('tile-C');
            else if (tile === 'F') div.classList.add('tile-F');
            else if (tile === 'J') div.classList.add('tile-J');
            else if (['N', 'E', 'S', 'W'].includes(tile)) div.classList.add('tile-WIND');
            else if (tile === 'GD') div.classList.add('tile-GD');
            else if (tile === 'RD') div.classList.add('tile-RD');
            else if (tile === 'WD') div.classList.add('tile-WD');
            
            // Add selection/new classes
            if (isSelected) div.classList.add('selected');
            if (isNew) div.classList.add('new-tile');
            
            // Store tile index as data attribute
            if (tileIndex !== null) {
                div.setAttribute('data-tile-index', tileIndex);
            }
            
            // Create number div

            labelDiv.style.fontSize = '10px';
            labelDiv.style.marginTop = '2px';
            labelDiv.style.color = display.textColor;
            labelDiv.textContent = display.label;
            
            div.appendChild(numberDiv);
            div.appendChild(labelDiv);

            // Add click handler if provided (and not joker in Charleston)
            if (onClick && !(isJoker && gameState.phase === 'charleston')) {

                div.addEventListener('click', onClick);
            } else if (isJoker && gameState.phase === 'charleston') {
                div.style.cursor = 'not-allowed';
                div.style.opacity = '0.6';
            }

            if (isDraggable && gameState.phase !== 'charleston') {
                div.draggable = true;
                div.setAttribute('data-tile', tile);
                setupDragAndDrop(div);
            }

            return div;
        }

        // Drag and drop functionality
        let draggedElement = null;

        function setupDragAndDrop(element) {
            element.addEventListener('dragstart', (e) => {
                draggedElement = element;
                element.classList.add('dragging');
            });

            element.addEventListener('dragend', (e) => {
                element.classList.remove('dragging');
                draggedElement = null;
            });

            element.addEventListener('dragover', (e) => {
                e.preventDefault();
                const container = element.parentElement;
                const afterElement = getDragAfterElement(container, e.clientX);
                if (afterElement == null) {
                    container.appendChild(draggedElement);
                } else {
                    container.insertBefore(draggedElement, afterElement);
                }
            });
        }

        function getDragAfterElement(container, x) {
            const draggableElements = [...container.querySelectorAll('.tile:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = x - box.left - box.width / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // ── Shared helper: render all players' hands into a container ──
        // options.showWinnerBadge — show WIN/DRAW badges (game-over screen)
        // options.showCurrentTurn — show whose turn it is (mid-game peek)
        /**
         * Order the winner's tiles to match the winning hand pattern,
         * with jokers placed exactly where they were used.
         * matchedTiles already has 'J' where jokers substitute, real tile codes elsewhere.
         * Returns a flat array of 14 tile strings.
         */
        function orderTilesByWinningMatch(player, winningMatch) {
            const groups = winningMatch.result.groups;
            const ordered = [];
            groups.forEach(group => {
                (group.matchedTiles || []).forEach(t => {
                    if (t !== '?') ordered.push(t);
                });
            });
            return ordered;
        }

        function renderAllHandsIntoContainer(container, options = {}) {
            const humanPlayer = gameState.players.find(p => p.isHuman);
            if (!humanPlayer) return;

            const windOrder = ['E', 'S', 'W', 'N'];
            const humanIndex = windOrder.indexOf(humanPlayer.position);
            const displayOrder = [
                (humanIndex + 2) % 4,
                (humanIndex + 3) % 4,
                (humanIndex + 1) % 4,
                humanIndex
            ];

            displayOrder.forEach(windIdx => {
                const player = gameState.players.find(p => p.position === windOrder[windIdx]);
                if (!player) return;

                const playerContainer = document.createElement('div');
                playerContainer.className = 'player-hand-container';
                if (options.showWinnerBadge && player === gameState.winner) {
                    playerContainer.classList.add('is-winner');
                }
                if (options.showCurrentTurn && player === gameState.currentTurn) {
                    playerContainer.style.borderColor = 'var(--color-primary)';
                    playerContainer.style.borderWidth = '2px';
                }

                // ── Header line: name badge + hand description ──
                const headerLine = document.createElement('div');
                headerLine.className = 'won-header-line';

                const info = document.createElement('span');
                info.className = 'player-hand-info';
                info.innerHTML = `${player.name} <span class="wind-indicator">${player.position}</span>`;
                if (player === gameState.currentDealer) {
                    info.innerHTML += ' <span style="font-size:10px;opacity:0.7;" title="Dealer">🎲</span>';
                }
                if (options.showWinnerBadge && player === gameState.winner) {
                    info.innerHTML += ' <span class="wind-indicator" style="background:#4caf50;color:white;">WIN</span>';
                }
                if (options.showWinnerBadge && gameState.isDraw) {
                    info.innerHTML += ' <span class="wind-indicator" style="background:#888;color:white;">DRAW</span>';
                }
                if (options.showCurrentTurn && player === gameState.currentTurn) {
                    info.innerHTML += ' <span class="wind-indicator" style="background:var(--color-primary);color:white;">TURN</span>';
                }
                // Score badge
                const scoreVal = gameState.scores[player.position];
                info.innerHTML += ` <span style="font-size:10px;font-weight:700;color:var(--color-primary);">${scoreVal} pts</span>`;
                headerLine.appendChild(info);

                // Hand description
                const lockedGroups = (player.exposedSets || [])
                    .map(resolveExposureToLockedTiles)
                    .filter(g => g !== null);
                const allTiles = [...player.tiles, ...lockedGroups.flat()];
                const evaluation = evaluateBestMatch(allTiles, 1, lockedGroups);

                if (evaluation.bestMatch) {
                    const pattern = evaluation.bestMatch.pattern;
                    const descSpan = document.createElement('span');
                    descSpan.className = 'won-hand-desc';

                    const labelPart = document.createElement('strong');
                    labelPart.textContent = `${pattern.Section || ''} Hand ${pattern['hand number'] || ''}: `;
                    descSpan.appendChild(labelPart);

                    if (pattern.description && Array.isArray(pattern.description)) {
                        pattern.description.forEach(part => {
                            const s = document.createElement('span');
                            s.textContent = part.text;
                            if (part.color === 'red') s.style.cssText = 'color:#d32f2f;font-weight:700;';
                            else if (part.color === 'green') s.style.cssText = 'color:#2e7d32;font-weight:700;';
                            else if (part.color === 'navy' || part.color === 'blue') s.style.cssText = 'color:#0D47A1;font-weight:700;';
                            else if (part.bold) s.style.fontWeight = '700';
                            descSpan.appendChild(s);
                        });
                    } else {
                        descSpan.appendChild(document.createTextNode(pattern.description || pattern.code || ''));
                    }
                    headerLine.appendChild(descSpan);
                }

                playerContainer.appendChild(headerLine);

                // Tiles
                const tilesContainer = document.createElement('div');
                tilesContainer.className = 'hand-tiles';

                const isWinner = options.showWinnerBadge && player === gameState.winner;

                // Build the sorted tile list
                let sortedTiles;
                if (isWinner && gameState.winningMatch && gameState.winningMatch.result && gameState.winningMatch.result.groups) {
                    // Order tiles by winning pattern groups, jokers placed where used
                    sortedTiles = orderTilesByWinningMatch(player, gameState.winningMatch);
                } else {
                    const order = { 'F':0,'B':1,'C':2,'D':3,'GD':4,'RD':5,'WD':6,'N':7,'E':8,'S':9,'W':10,'J':11 };
                    const getSuitOrder = (tile) => {
                        if (tile === 'F') return 0; if (tile === 'J') return 11;
                        if (tile === 'GD') return 4; if (tile === 'RD') return 5; if (tile === 'WD') return 6;
                        if (['N','E','S','W'].includes(tile)) return order[tile];
                        return order[tile.slice(-1)];
                    };
                    sortedTiles = [...player.tiles].sort((a, b) => {
                        const diff = getSuitOrder(a) - getSuitOrder(b);
                        if (diff !== 0) return diff;
                        return (parseInt(a) || 0) - (parseInt(b) || 0);
                    });
                }

                // For winner with pattern ordering, all tiles (including exposed) are in sortedTiles already.
                // For others, show exposed sets first with a separator, then hand tiles.
                if (isWinner && gameState.winningMatch && gameState.winningMatch.result && gameState.winningMatch.result.groups) {
                    sortedTiles.forEach(tile => {
                        tilesContainer.appendChild(renderTile(tile, false, false, { isJoker: tile === 'J' }));
                    });
                } else {
                    // Exposed sets first
                    if (player.exposedSets && player.exposedSets.length > 0) {
                        player.exposedSets.forEach(exposure => {
                            exposure.tiles.forEach(tile => {
                                tilesContainer.appendChild(renderTile(tile, false, false, { isJoker: tile === 'J' }));
                            });
                            const sep = document.createElement('div');
                            sep.style.cssText = 'width:2px;height:32px;background:#ccc;margin:0 2px;flex-shrink:0;';
                            tilesContainer.appendChild(sep);
                        });
                    }
                    // Hand tiles
                    sortedTiles.forEach(tile => {
                        tilesContainer.appendChild(renderTile(tile, false, false, { isJoker: tile === 'J' }));
                    });
                }

                playerContainer.appendChild(tilesContainer);
                container.appendChild(playerContainer);
            });
        }

            if (d.jokerFree)   breakdownHTML += ` &times; 2 <span style="color:#888;">(joker-free)</span>`;

            if (d.wonFromWall || d.jokerFree) {
                const effectivePerPlayer = d.normalOwed;
                breakdownHTML += ` = <strong style="color:#2c5f2d;">${effectivePerPlayer} pts</strong>`;

            if (d.wonFromWall) {

                amtSpan.style.color = color;
                amtSpan.style.fontWeight = '700';
                amtSpan.textContent = delta > 0 ? `+${delta}` : `${delta}`;
                row.appendChild(nameSpan);
                row.appendChild(amtSpan);
                table.appendChild(row);

            // ── Button ──
            const btn = document.createElement('button');
            btn.textContent = 'See All Hands →';
            btn.style.cssText = `margin-top:22px; background:#2c5f2d; color:white;
                padding:11px 28px; font-size:15px; border-radius:6px;
                cursor:pointer; border:none; width:100%;`;

            const advance = () => {
                clearTimeout(autoTimer);
                gameState.showPaymentSummary = false;
                overlay.remove();
                // Show the game-won hands layout
                const gameLayoutDiv = document.querySelector('.game-layout');
                let wonContainer = document.getElementById('gameWonContainer');
                if (!wonContainer) {
                    wonContainer = document.createElement('div');
                    wonContainer.id = 'gameWonContainer';
                    wonContainer.className = 'game-won-layout';
                    gameLayoutDiv.parentElement.insertBefore(wonContainer, gameLayoutDiv.nextSibling);

            btn.onclick = advance;
            card.appendChild(btn);
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            // Auto-advance after 6 seconds
            const autoTimer = setTimeout(advance, 6000);
        }

        function hideHandPeek() {
            gameState.handPeekOpen = false;

            const peekContainer = document.getElementById('handPeekContainer');
            if (peekContainer) peekContainer.style.display = 'none';

            const gameLayoutDiv = document.querySelector('.game-layout');

        // ── Portrait bot strip (shown in portrait orientation on narrow screens) ──
        function updatePortraitBotStrip() {
            const strip = document.getElementById('portraitBotStrip');
            if (!strip) return;

            // Only populate if we're in portrait mode (strip is visible)
            if (getComputedStyle(strip).display === 'none') return;

            strip.innerHTML = '';

            const humanPlayer = gameState.players.find(p => p.isHuman);
            if (!humanPlayer) return;

            // Get the three non-human players in a stable left-to-right order:
            // west (left of human), north (across), east (right of human)
            const windOrder = ['E', 'S', 'W', 'N'];
            const humanIndex = windOrder.indexOf(humanPlayer.position);

            const screenSlots = ['west', 'north', 'east']; // left → center → right in strip
            // relative positions from human: 3=left(west), 2=across(north), 1=right(east)
            const relativeOffsets = [3, 2, 1];

            relativeOffsets.forEach((offset, slotIdx) => {
                const wind = windOrder[(humanIndex + offset) % 4];
                const player = gameState.players.find(p => p.position === wind);
                if (!player) return;

                const card = document.createElement('div');
                card.className = 'portrait-bot-card';
                if (gameState.phase === 'playing' && gameState.currentTurn === player) {
                    card.classList.add('is-turn');
                }

                // Header: name + wind badge
                const header = document.createElement('div');
                header.className = 'portrait-bot-header';
                const dealerIcon = player === gameState.currentDealer ? ' 🎲' : '';
                header.innerHTML = `${player.name} <span class="wind-indicator">${player.position}</span>${dealerIcon}`;
                card.appendChild(header);

                // Exposure tiles (mini)
                const exposuresDiv = document.createElement('div');
                exposuresDiv.className = 'portrait-bot-exposures';

                if (gameState.phase === 'playing' && player.exposedSets && player.exposedSets.length > 0) {
                    player.exposedSets.forEach((exposure, setIdx) => {
                        if (setIdx > 0) {
                            const sep = document.createElement('div');
                            sep.style.cssText = 'width:1px;height:14px;background:var(--color-border);margin:0 1px;flex-shrink:0;';
                            exposuresDiv.appendChild(sep);
                        }
                        exposure.tiles.forEach(tile => {
                            const tileEl = renderTile(tile, false, false, { isJoker: tile === 'J' });
                            tileEl.style.cssText = 'width:16px;height:21px;margin:0;border-radius:2px;flex-shrink:0;';
                            const numDiv = tileEl.querySelector('.tile-number');
                            const lblDiv = tileEl.querySelector('.tile-label');
                            if (numDiv) numDiv.style.fontSize = '9px';
                            if (lblDiv) lblDiv.style.display = 'none';
                            exposuresDiv.appendChild(tileEl);
                        });
                    });
                } else {
                    const empty = document.createElement('span');
                    empty.className = 'portrait-bot-empty';
                    empty.textContent = 'no exposures';
                    exposuresDiv.appendChild(empty);
                }

                card.appendChild(exposuresDiv);

                // Click → open modal with full-size exposures
                card.addEventListener('click', () => openPortraitExposureModal(player));

                strip.appendChild(card);
            });
        }

        function openPortraitExposureModal(player) {
            const modal = document.getElementById('portraitExposureModal');
            const title = document.getElementById('portraitExposureModalTitle');
            const setsDiv = document.getElementById('portraitExposureModalSets');

            title.textContent = `${player.name} (${player.position}) — Exposures`;
            setsDiv.innerHTML = '';

            if (!player.exposedSets || player.exposedSets.length === 0) {
                setsDiv.innerHTML = '<p style="color:var(--color-text-muted);font-size:13px;margin:0;">No exposures yet.</p>';
            } else {
                player.exposedSets.forEach(exposure => {
                    const setRow = document.createElement('div');
                    setRow.className = 'portrait-modal-set';
                    exposure.tiles.forEach(tile => {
                        const tileEl = renderTile(tile, false, false, { isJoker: tile === 'J' });
                        setRow.appendChild(tileEl);
                    });
                    setsDiv.appendChild(setRow);
                });
            }

            modal.classList.add('open');
        }

        function closePortraitExposureModal(e) {
            if (e && e.target !== document.getElementById('portraitExposureModal') &&
                e.target !== document.getElementById('portraitExposureModalClose')) return;
            document.getElementById('portraitExposureModal').classList.remove('open');
        }

        function updateDisplay() {
            // Always refresh the top info bar
            updateTopInfoBar();

            // If game is over, use special won layout
            if (gameState.gameOver) {
                displayGameWonLayout();
                return;
            }
            
            // Clear all hand areas
            ['handSouth', 'handNorth', 'handEast', 'handWest'].forEach(id => {

                const humanIndex = windOrder.indexOf(humanWind);
                const playerIndex = windOrder.indexOf(actualWind);
                
                // Calculate relative position (how many seats clockwise from human)
                let relativePos = (playerIndex - humanIndex + 4) % 4;
                
                // Map to screen positions: 0=bottom, 1=right, 2=top, 3=left
                const screenPositions = ['handSouth', 'handEast', 'handNorth', 'handWest'];
                return screenPositions[relativePos];

                            'F': 0,

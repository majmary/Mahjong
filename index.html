        // Drag and drop functionality
        let draggedElement = null;

        function setupDragAndDrop(element) {
            element.addEventListener('dragstart', (e) => {
                draggedElement = element;
                element.classList.add('dragging');
            });

            element.addEventListener('dragend', (e) => {
                element.classList.remove('dragging');
                draggedElement = null;
            });

            element.addEventListener('dragover', (e) => {
                e.preventDefault();
                const container = element.parentElement;
                const afterElement = getDragAfterElement(container, e.clientX);
                if (afterElement == null) {
                    container.appendChild(draggedElement);
                } else {
                    container.insertBefore(draggedElement, afterElement);
                }
            });
        }

        function getDragAfterElement(container, x) {
            const draggableElements = [...container.querySelectorAll('.tile:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = x - box.left - box.width / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // ── Shared helper: render all players' hands into a container ──
        // options.showWinnerBadge — show WIN/DRAW badges (game-over screen)
        // options.showCurrentTurn — show whose turn it is (mid-game peek)
        function renderAllHandsIntoContainer(container, options = {}) {
            const humanPlayer = gameState.players.find(p => p.isHuman);
            if (!humanPlayer) return;

            const windOrder = ['E', 'S', 'W', 'N'];
            const humanIndex = windOrder.indexOf(humanPlayer.position);
            const displayOrder = [
                (humanIndex + 2) % 4,
                (humanIndex + 3) % 4,
                (humanIndex + 1) % 4,
                humanIndex
            ];

            displayOrder.forEach(windIdx => {
                const player = gameState.players.find(p => p.position === windOrder[windIdx]);
                if (!player) return;

                const playerContainer = document.createElement('div');
                playerContainer.className = 'player-hand-container';
                if (options.showWinnerBadge && player === gameState.winner) {
                    playerContainer.classList.add('is-winner');
                }
                if (options.showCurrentTurn && player === gameState.currentTurn) {
                    playerContainer.style.borderColor = 'var(--color-primary)';
                    playerContainer.style.borderWidth = '2px';
                }

                // ── Header line: name badge + hand description ──
                const headerLine = document.createElement('div');
                headerLine.className = 'won-header-line';

                const info = document.createElement('span');
                info.className = 'player-hand-info';
                info.innerHTML = `${player.name} <span class="wind-indicator">${player.position}</span>`;
                if (player === gameState.currentDealer) {
                    info.innerHTML += ' <span style="font-size:10px;opacity:0.7;" title="Dealer">🎲</span>';
                }
                if (options.showWinnerBadge && player === gameState.winner) {
                    info.innerHTML += ' <span class="wind-indicator" style="background:#4caf50;color:white;">WIN</span>';
                }
                if (options.showWinnerBadge && gameState.isDraw) {
                    info.innerHTML += ' <span class="wind-indicator" style="background:#888;color:white;">DRAW</span>';
                }
                if (options.showCurrentTurn && player === gameState.currentTurn) {
                    info.innerHTML += ' <span class="wind-indicator" style="background:var(--color-primary);color:white;">TURN</span>';
                }
                headerLine.appendChild(info);

                // Hand description
                const allTiles = [...player.tiles];
                if (player.exposedSets) player.exposedSets.forEach(set => allTiles.push(...set.tiles));
                const evaluation = evaluateBestMatch(allTiles, 1);

                if (evaluation.bestMatch) {
                    const pattern = evaluation.bestMatch.pattern;
                    const descSpan = document.createElement('span');
                    descSpan.className = 'won-hand-desc';

                    const labelPart = document.createElement('strong');
                    labelPart.textContent = `${pattern.Section || ''} Hand ${pattern['hand number'] || ''}: `;
                    descSpan.appendChild(labelPart);

                    if (pattern.description && Array.isArray(pattern.description)) {
                        pattern.description.forEach(part => {
                            const s = document.createElement('span');
                            s.textContent = part.text;
                            if (part.color === 'red') s.style.cssText = 'color:#d32f2f;font-weight:700;';
                            else if (part.color === 'green') s.style.cssText = 'color:#2e7d32;font-weight:700;';
                            else if (part.color === 'navy' || part.color === 'blue') s.style.cssText = 'color:#0D47A1;font-weight:700;';
                            else if (part.bold) s.style.fontWeight = '700';
                            descSpan.appendChild(s);
                        });
                    } else {
                        descSpan.appendChild(document.createTextNode(pattern.description || pattern.code || ''));
                    }
                    headerLine.appendChild(descSpan);
                }

                playerContainer.appendChild(headerLine);

                // Tiles
                const tilesContainer = document.createElement('div');
                tilesContainer.className = 'hand-tiles';

                const order = { 'F':0,'B':1,'C':2,'D':3,'GD':4,'RD':5,'WD':6,'N':7,'E':8,'S':9,'W':10,'J':11 };
                const getSuitOrder = (tile) => {
                    if (tile === 'F') return 0; if (tile === 'J') return 11;
                    if (tile === 'GD') return 4; if (tile === 'RD') return 5; if (tile === 'WD') return 6;
                    if (['N','E','S','W'].includes(tile)) return order[tile];
                    return order[tile.slice(-1)];
                };
                const sortedTiles = [...player.tiles].sort((a, b) => {
                    const diff = getSuitOrder(a) - getSuitOrder(b);
                    if (diff !== 0) return diff;
                    return (parseInt(a) || 0) - (parseInt(b) || 0);
                });

                // Exposed sets first
                if (player.exposedSets && player.exposedSets.length > 0) {
                    player.exposedSets.forEach(exposure => {
                        exposure.tiles.forEach(tile => {
                            tilesContainer.appendChild(renderTile(tile, false, false, { isJoker: tile === 'J' }));
                        });
                        const sep = document.createElement('div');
                        sep.style.cssText = 'width:2px;height:32px;background:#ccc;margin:0 2px;flex-shrink:0;';
                        tilesContainer.appendChild(sep);
                    });
                }

                // Hand tiles — human shown face-up, bots always face-up in this view
                const isFaceDown = false;
                sortedTiles.forEach(tile => {
                    tilesContainer.appendChild(renderTile(tile, isFaceDown, false, { isJoker: tile === 'J' }));
                });

                playerContainer.appendChild(tilesContainer);
                container.appendChild(playerContainer);
            });
        }

        // Display game won layout - all hands horizontal and stacked
        function displayGameWonLayout() {
            ['handSouth', 'handNorth', 'handEast', 'handWest'].forEach(id => {
                document.getElementById(id).innerHTML = '';
            });

            const gameLayoutDiv = document.querySelector('.game-layout');
            if (gameLayoutDiv) gameLayoutDiv.style.display = 'none';

            let wonContainer = document.getElementById('gameWonContainer');
            if (!wonContainer) {
                wonContainer = document.createElement('div');
                wonContainer.id = 'gameWonContainer';
                wonContainer.className = 'game-won-layout';
                gameLayoutDiv.parentElement.insertBefore(wonContainer, gameLayoutDiv.nextSibling);
            }
            wonContainer.innerHTML = '';
            wonContainer.style.display = 'flex';

            // Play Again button at the top of the end screen
            const playAgainBtn = document.createElement('button');
            playAgainBtn.textContent = '🎲 Play Again?';
            playAgainBtn.style.cssText = `
                display: block;
                width: 100%;
                padding: 14px;
                font-size: 18px;
                font-weight: 700;
                background: var(--color-primary);
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                margin-bottom: 10px;
                box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            `;
            playAgainBtn.onclick = playAgain;
            wonContainer.appendChild(playAgainBtn);

            renderAllHandsIntoContainer(wonContainer, { showWinnerBadge: true });
        }

        function playAgain() {
            // Request fullscreen directly from this tap gesture (most reliable on mobile)
            const el = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (el.requestFullscreen) {
                    el.requestFullscreen().catch(() => {});
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                }
            }
            startNewGame();
        }

        // Show mid-game hand peek overlay
        function showHandPeek() {
            document.getElementById('cornerMenuDropdown').classList.remove('open');
            if (gameState.players.length === 0) return;

            // Pause bot timers by setting a flag
            gameState.handPeekOpen = true;

            const gameLayoutDiv = document.querySelector('.game-layout');
            if (gameLayoutDiv) gameLayoutDiv.style.display = 'none';
            document.getElementById('bottomBar').style.display = 'none';

            let peekContainer = document.getElementById('handPeekContainer');
            if (!peekContainer) {
                peekContainer = document.createElement('div');
                peekContainer.id = 'handPeekContainer';
                peekContainer.style.cssText = 'display:flex;flex-direction:column;gap:0;max-width:95vw;margin:8px auto;';
                gameLayoutDiv.parentElement.insertBefore(peekContainer, gameLayoutDiv.nextSibling);
            }
            peekContainer.innerHTML = '';
            peekContainer.style.display = 'flex';

            // Return to Game button
            const returnBtn = document.createElement('button');
            returnBtn.textContent = '← Return to Game';
            returnBtn.style.cssText = 'margin:0 0 8px 0;align-self:flex-start;';
            returnBtn.onclick = hideHandPeek;
            peekContainer.appendChild(returnBtn);

            // Hands container
            const handsDiv = document.createElement('div');
            handsDiv.className = 'game-won-layout';
            handsDiv.style.cssText = 'margin:0;padding:0;';
            peekContainer.appendChild(handsDiv);

            renderAllHandsIntoContainer(handsDiv, { showCurrentTurn: true });
        }

        function hideHandPeek() {
            gameState.handPeekOpen = false;

            const peekContainer = document.getElementById('handPeekContainer');
            if (peekContainer) peekContainer.style.display = 'none';

            const gameLayoutDiv = document.querySelector('.game-layout');
            if (gameLayoutDiv) gameLayoutDiv.style.display = '';
            document.getElementById('bottomBar').style.display = '';

            updateDisplay();
        }

        function updateDisplay() {
            // If game is over, use special won layout
            if (gameState.gameOver) {
                displayGameWonLayout();
                return;
            }
            
            // Clear all hand areas
            ['handSouth', 'handNorth', 'handEast', 'handWest'].forEach(id => {
                document.getElementById(id).innerHTML = '';
            });

            // Find human player
            const humanPlayer = gameState.players.find(p => p.isHuman);
            
            // Map actual wind positions to screen positions based on where human sits
            const getScreenPosition = (actualWind) => {
                if (!humanPlayer) return actualWind;
                
                const humanWind = humanPlayer.position;
                const windOrder = ['E', 'S', 'W', 'N']; // clockwise order
                const humanIndex = windOrder.indexOf(humanWind);
                const playerIndex = windOrder.indexOf(actualWind);
                
                // Calculate relative position (how many seats clockwise from human)
                let relativePos = (playerIndex - humanIndex + 4) % 4;
                
                // Map to screen positions: 0=bottom, 1=right, 2=top, 3=left
                const screenPositions = ['handSouth', 'handEast', 'handNorth', 'handWest'];
                return screenPositions[relativePos];
            };

            // Render each player in their screen position
            gameState.players.forEach(player => {
                const screenPos = getScreenPosition(player.position);
                const container = document.getElementById(screenPos);
                
                // Create hand area wrapper
                const handArea = document.createElement('div');
                handArea.className = 'player-hand-area';
                
                // Display exposed sets FIRST (if any) during playing phase - above player name, closer to table
                if (gameState.phase === 'playing' && player.exposedSets.length > 0) {
                    const exposuresContainer = document.createElement('div');
                    exposuresContainer.className = 'exposure-display';
                    exposuresContainer.style.marginBottom = '4px';
                    
                    player.exposedSets.forEach((exposure, exposureIdx) => {
                        exposure.tiles.forEach((tile, tileIdx) => {
                            const tileEl = renderTile(tile, false, false, {
                                isJoker: tile === 'J'
                            });
                            // Small exposure tiles — don't skew layout
                            tileEl.style.width = '20px';
                            tileEl.style.height = '26px';
                            tileEl.style.margin = '0';
                            tileEl.style.borderRadius = '2px';
                            const numDiv = tileEl.querySelector('.tile-number');
                            const lblDiv = tileEl.querySelector('.tile-label');
                            if (numDiv) numDiv.style.fontSize = '12px';
                            if (lblDiv) lblDiv.style.display = 'none';
                            exposuresContainer.appendChild(tileEl);
                        });
                        
                        // Add separator between exposures
                        const separator = document.createElement('div');
                        separator.style.cssText = 'width: 1px; height: 20px; background: var(--color-border); margin: 0 2px; flex-shrink:0;';
                        exposuresContainer.appendChild(separator);
                    });
                    
                    handArea.appendChild(exposuresContainer);
                }
                
                // Player info
                const info = document.createElement('div');
                info.className = 'player-hand-info';
                
                // Highlight if it's this player's turn during playing phase
                if (gameState.phase === 'playing' && gameState.currentTurn === player) {
                    info.style.boxShadow = '0 0 10px rgba(44, 95, 45, 0.5)';
                    info.style.borderColor = 'var(--color-primary)';
                }
                
                info.innerHTML = `${player.name} <span class="wind-indicator">${player.position}</span>`;
                if (player === gameState.currentDealer) {
                    info.innerHTML += ' <span style="font-size:11px;opacity:0.7;" title="Dealer">🎲</span>';
                }
                handArea.appendChild(info);
                
                // Tiles
                const tilesContainer = document.createElement('div');
                tilesContainer.className = 'hand-tiles';
                
                if (player.tiles.length > 0) {
                    // For human players, sort tiles but keep track of original indices
                    let tilesToShow = player.tiles;
                    let tileIndices = player.tiles.map((_, i) => i); // Original indices
                    
                    // For non-human left/right players, show only 7 tiles
                    const isLeftRight = screenPos === 'handEast' || screenPos === 'handWest';
                    if (!player.isHuman && isLeftRight && tilesToShow.length > 7) {
                        tilesToShow = tilesToShow.slice(0, 7);
                        tileIndices = tileIndices.slice(0, 7);
                    }
                    
                    if (player.isHuman) {
                        // Create array of {tile, originalIndex} objects
                        const tilesWithIndices = player.tiles.map((tile, idx) => ({ tile, originalIndex: idx }));
                        
                        // Sort by tile value
                        const order = {
                            'F': 0,
                            'B': 1, 'C': 2, 'D': 3,
                            'GD': 4, 'RD': 5, 'WD': 6,
                            'N': 7, 'E': 8, 'S': 9, 'W': 10,
                            'J': 11
                        };
                        
                        tilesWithIndices.sort((a, b) => {
                            const getSuitOrder = (tile) => {
                                if (tile === 'F') return 0;
                                if (tile === 'J') return 11;
                                if (tile === 'GD') return 4;
                                if (tile === 'RD') return 5;
                                if (tile === 'WD') return 6;
                                if (['N', 'E', 'S', 'W'].includes(tile)) return order[tile];
                                const suit = tile.slice(-1);
                                return order[suit];
                            };
                            
                            const aOrder = getSuitOrder(a.tile);
                            const bOrder = getSuitOrder(b.tile);
                            if (aOrder !== bOrder) return aOrder - bOrder;
                            
                            const aNum = parseInt(a.tile);
                            const bNum = parseInt(b.tile);
                            if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
                            
                            return 0;
                        });
                        
                        // Extract sorted tiles and their original indices
                        tilesToShow = tilesWithIndices.map(t => t.tile);
                        tileIndices = tilesWithIndices.map(t => t.originalIndex);
                    }
                    
                    tilesToShow.forEach((tile, displayIdx) => {
                        const originalIdx = tileIndices[displayIdx]; // Index in original unsorted array
                        
                        // Charleston selection logic
                        const isCharlestonSelected = player.isHuman && 
                            gameState.phase === 'charleston' &&
                            gameState.charlestonSelectedTiles.includes(originalIdx);
                        
                        const isCharlestonNew = gameState.phase === 'charleston' &&
                            gameState.charlestonIncomingTiles.has(player.position) &&
                            gameState.charlestonIncomingTiles.get(player.position).includes(originalIdx);
                        
                        // Playing phase selection logic
                        const isPlayingSelected = player.isHuman &&
                            gameState.phase === 'playing' &&
                            gameState.selectedTileIndex === originalIdx;
                        
                        const isPlayingNew = player.isHuman &&
                            gameState.phase === 'playing' &&
                            gameState.newlyDrawnTileIndex === originalIdx;
                        
                        const isSelected = isCharlestonSelected || isPlayingSelected;
                        const isNew = isCharlestonNew || isPlayingNew;
                        
                        // Click handler - use original index
                        let onClick = null;
                        if (player.isHuman && gameState.phase === 'charleston') {
                            onClick = () => toggleTileSelection(originalIdx);
                        } else if (player.isHuman && gameState.phase === 'playing' && 
                                   gameState.currentTurn === player) {
                            onClick = () => selectTileForDiscard(originalIdx);
                        }
                        
                        const tileEl = renderTile(tile, !player.isHuman && !gameState.gameOver, player.isHuman, {
                            onClick,
                            isSelected,
                            isNew,
                            tileIndex: originalIdx,
                            isJoker: tile === 'J'
                        });
                        tilesContainer.appendChild(tileEl);
                    });
                }
                
                // Add Charleston controls for human player
                if (player.isHuman && gameState.phase === 'charleston') {
                    const charlestonControls = document.createElement('div');
                    charlestonControls.className = 'charleston-controls';
                    
                    // Pass direction indicator
                    const passDirection = gameState.charlestonPhase.replace('optional-', '');
                    let directionText = '';
                    let directionEmoji = '';
                    let charlestonLabel = '';
                    
                    // Determine if we're in first or second charleston
                    const isOptional = gameState.charlestonPhase.startsWith('optional-');
                    if (isOptional && gameState.charlestonPhase !== 'optional-veto') {
                        charlestonLabel = 'Second Charleston: ';
                    } else if (['right', 'across', 'left'].includes(gameState.charlestonPhase)) {
                        charlestonLabel = 'First Charleston: ';
                    }
                    
                    if (passDirection === 'right') {
                        directionText = 'Pass Right';
                        directionEmoji = '→';
                        // Check if this is optional-right (flexible pass)
                        if (gameState.charlestonPhase === 'optional-right') {
                            directionText += ' (Select 0-3 tiles)';
                        }
                    } else if (passDirection === 'left') {
                        directionText = 'Pass Left (Select 0-3 tiles)';
                        directionEmoji = '←';
                    } else if (passDirection === 'across') {
                        directionText = 'Pass Across';
                        directionEmoji = '↕';
                    } else if (gameState.charlestonPhase === 'optional-veto') {
                        directionText = 'Continue to Second Charleston?';
                        directionEmoji = '?';
                        charlestonLabel = '';
                    } else if (gameState.charlestonPhase === 'courtesy-pass') {
                        directionText = 'Courtesy Pass (Across) - Select 0-3 tiles';
                        directionEmoji = '↕';
                    }
                    
                    if (directionText && gameState.charlestonPhase !== 'complete') {
                        // Show direction text on the table overlay instead of below tiles
                        updatePhaseIndicator(`${charlestonLabel}${directionEmoji} ${directionText}`);
                    }
                    
                    // Pass button
                    if (gameState.charlestonPhase === 'optional-veto') {
                        const btnContainer = document.createElement('div');
                        btnContainer.style.display = 'flex';
                        btnContainer.style.gap = '10px';
                        
                        const consentBtn = document.createElement('button');
                        consentBtn.textContent = 'Continue';
                        consentBtn.onclick = () => handleOptionalVeto(true);
                        btnContainer.appendChild(consentBtn);
                        
                        const vetoBtn = document.createElement('button');
                        vetoBtn.textContent = 'Veto';
                        vetoBtn.style.background = 'var(--color-warning)';
                        vetoBtn.onclick = () => handleOptionalVeto(false);
                        btnContainer.appendChild(vetoBtn);
                        
                        charlestonControls.appendChild(btnContainer);
                    } else if (gameState.charlestonPhase !== 'complete') {
                        const passBtn = document.createElement('button');
                        
                        const isFlexiblePass = (gameState.charlestonPhase === 'left' || 
                                               gameState.charlestonPhase === 'optional-right');
                        
                        if (isFlexiblePass || gameState.charlestonPhase === 'courtesy-pass') {
                            // Flexible/Courtesy pass: 0-3 tiles allowed
                            const selectedCount = gameState.charlestonSelectedTiles.length;
                            if (selectedCount === 0) {
                                if (gameState.charlestonPhase === 'courtesy-pass') {
                                    passBtn.textContent = 'Skip Courtesy Pass';
                                } else {
                                    passBtn.textContent = 'Pass 0 Tiles (Keep All)';
                                }
                            } else {
                                passBtn.textContent = `Pass ${selectedCount} tile${selectedCount > 1 ? 's' : ''}`;
                            }
                            passBtn.disabled = selectedCount > 3;
                        } else {
                            // Regular passes: exactly 3 required
                            const selectedCount = gameState.charlestonSelectedTiles.length;
                            passBtn.textContent = `Pass ${selectedCount}/3 Selected`;
                            passBtn.disabled = selectedCount !== 3;
                        }
                        
                        passBtn.onclick = executeCharlestonPass;
                        charlestonControls.appendChild(passBtn);
                    }
                    
                    handArea.appendChild(charlestonControls);
                }
                
                // (Playing controls are now handled by the persistent bottom bar)
                
                const isNorthSouth = screenPos === 'handNorth' || screenPos === 'handSouth';
                if (isNorthSouth) {
                    // Build a row: [name badge | exposures (if any) | tiles]
                    const tileRow = document.createElement('div');
                    tileRow.style.cssText = 'display:flex;flex-direction:row;align-items:center;gap:4px;flex-wrap:nowrap;max-width:100%;overflow:hidden;';
                    tileRow.appendChild(info); // moves info out of handArea into the row
                    // Move exposuresContainer into the row if it exists
                    const existingExposures = handArea.querySelector('.exposure-display');
                    if (existingExposures) {
                        tileRow.appendChild(existingExposures);
                    }
                    tileRow.appendChild(tilesContainer);
                    handArea.insertBefore(tileRow, handArea.firstChild); // row goes above controls
                } else {
                    // East/West: CSS handles side-by-side via flex-row on .player-hand-area
                    handArea.appendChild(tilesContainer);
                }
                container.appendChild(handArea);
            });

            // Update table center (discard pool and last discarded tile)
            const tableCenter = document.getElementById('tableCenter');
            tableCenter.innerHTML = '';
            
            if (gameState.phase === 'playing') {
                // Show discard pool - takes most of the center space with small tiles
                if (gameState.discardPool.length > 0) {
                    const poolContainer = document.createElement('div');
                    poolContainer.style.cssText = `
                        position: absolute;
                        top: 3px;
                        left: 3px;
                        right: 3px;
                        bottom: 3px;
                        overflow: auto;
                        display: flex;
                        flex-wrap: wrap;
                        gap: 3px;
                        padding: 8px;
                        background: rgba(255,255,255,0.6);
                        border-radius: 6px;
                        border: 1px solid var(--color-border);
                        align-content: flex-start;
                    `;
                    
                    const sortedPool = sortDiscardPool(gameState.discardPool);
                    sortedPool.forEach(tile => {
                        const tileEl = renderTile(tile, false, false, {
                            isJoker: tile === 'J'
                        });
                        tileEl.style.width = '18px';
                        tileEl.style.height = '24px';
                        tileEl.style.margin = '0';
                        tileEl.style.borderRadius = '2px';
                        
                        // Reduce font size for number and label specifically
                        const numberDiv = tileEl.querySelector('.tile-number');
                        const labelDiv = tileEl.querySelector('.tile-label');
                        if (numberDiv) numberDiv.style.fontSize = '11px';
                        if (labelDiv) labelDiv.style.display = 'none';
                        
                        poolContainer.appendChild(tileEl);
                    });
                    
                    tableCenter.appendChild(poolContainer);
                }
                
                // Show empty state only if no pool
                if (gameState.discardPool.length === 0 && !gameState.lastDiscardedTile) {
                    const emptyText = document.createElement('div');
                    emptyText.textContent = 'Discard Pool';
                    emptyText.style.color = 'var(--color-text-muted)';
                    tableCenter.appendChild(emptyText);
                }
            }

            // Show call dialog if open
            if (gameState.callDialogOpen) {
                // Remove any existing dialog overlay first
                const existingOverlay = document.querySelector('.call-dialog-overlay');
                if (existingOverlay) {
                    existingOverlay.remove();
                }
                
                const humanPlayer = gameState.players.find(p => p.isHuman);
                
                // Create overlay
                const overlay = document.createElement('div');
                overlay.className = 'call-dialog-overlay';
                
                // Create dialog
                const dialog = document.createElement('div');
                dialog.className = 'call-dialog';
                
                // Title
                const title = document.createElement('h2');
                title.textContent = `Call Tile: ${gameState.tileBeingCalled}`;
                dialog.appendChild(title);
                
                // Instructions
                const instructions = document.createElement('div');
                instructions.className = 'call-dialog-instructions';
                instructions.textContent = 'Select at least 2 tiles from your hand to expose with the called tile. All tiles must be identical (jokers allowed).';
                dialog.appendChild(instructions);
                
                // Show the called tile
                const calledTileContainer = document.createElement('div');
                calledTileContainer.style.cssText = 'margin-bottom: 12px;';
                const calledLabel = document.createElement('div');
                calledLabel.style.cssText = 'font-weight: 600; margin-bottom: 6px; font-size: 14px;';
                calledLabel.textContent = 'Called Tile:';
                calledTileContainer.appendChild(calledLabel);
                const calledTileEl = renderTile(gameState.tileBeingCalled, false, false, {
                    isJoker: gameState.tileBeingCalled === 'J'
                });
                calledTileEl.style.margin = '0';
                calledTileContainer.appendChild(calledTileEl);
                dialog.appendChild(calledTileContainer);
                
                // Selected tiles for exposure
                if (gameState.selectedTilesForExposure.length > 0) {
                    const selectedLabel = document.createElement('div');
                    selectedLabel.style.cssText = 'font-weight: 600; margin-bottom: 6px; font-size: 14px;';
                    selectedLabel.textContent = `Selected (${gameState.selectedTilesForExposure.length}):`;
                    dialog.appendChild(selectedLabel);
                    
                    const selectedContainer = document.createElement('div');
                    selectedContainer.className = 'exposure-display';
                    gameState.selectedTilesForExposure.forEach(idx => {
                        const tileEl = renderTile(humanPlayer.tiles[idx], false, false, {
                            isJoker: humanPlayer.tiles[idx] === 'J'
                        });
                        tileEl.style.margin = '0';
                        selectedContainer.appendChild(tileEl);
                    });
                    dialog.appendChild(selectedContainer);
                }
                
                // Your hand
                const handLabel = document.createElement('div');
                handLabel.style.cssText = 'font-weight: 600; margin-bottom: 6px; font-size: 14px; margin-top: 12px;';
                handLabel.textContent = 'Your Hand (click to select):';
                dialog.appendChild(handLabel);
                
                const tilesContainer = document.createElement('div');
                tilesContainer.className = 'call-dialog-tiles';
                
                // Sort tiles for display
                const tilesWithIndices = humanPlayer.tiles.map((tile, idx) => ({ tile, originalIndex: idx }));
                const order = {
                    'F': 0,
                    'B': 1, 'C': 2, 'D': 3,
                    'GD': 4, 'RD': 5, 'WD': 6,
                    'N': 7, 'E': 8, 'S': 9, 'W': 10,
                    'J': 11
                };
                
                tilesWithIndices.sort((a, b) => {
                    const getSuitOrder = (tile) => {
                        if (tile === 'F') return 0;
                        if (tile === 'J') return 11;
                        if (tile === 'GD') return 4;
                        if (tile === 'RD') return 5;
                        if (tile === 'WD') return 6;
                        if (['N', 'E', 'S', 'W'].includes(tile)) return order[tile];
                        const suit = tile.slice(-1);
                        return order[suit];
                    };
                    
                    const aOrder = getSuitOrder(a.tile);
                    const bOrder = getSuitOrder(b.tile);
                    if (aOrder !== bOrder) return aOrder - bOrder;
                    
                    const aNum = parseInt(a.tile);
                    const bNum = parseInt(b.tile);
                    if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
                    
                    return 0;
                });
                
                tilesWithIndices.forEach(({ tile, originalIndex }) => {
                    const isSelected = gameState.selectedTilesForExposure.includes(originalIndex);
                    const tileEl = renderTile(tile, false, true, {
                        onClick: () => toggleTileForExposure(originalIndex),
                        isSelected: isSelected,
                        isJoker: tile === 'J'
                    });
                    tilesContainer.appendChild(tileEl);
                });
                
                dialog.appendChild(tilesContainer);
                
                // Buttons
                const buttonsContainer = document.createElement('div');
                buttonsContainer.className = 'call-dialog-buttons';
                
                const cancelBtn = document.createElement('button');
                cancelBtn.textContent = 'Cancel';
                cancelBtn.style.background = '#999';
                cancelBtn.onclick = cancelCall;
                buttonsContainer.appendChild(cancelBtn);
                
                const exposeBtn = document.createElement('button');
                exposeBtn.textContent = 'Expose';
                exposeBtn.disabled = gameState.selectedTilesForExposure.length < 2;
                exposeBtn.onclick = confirmExposure;
                buttonsContainer.appendChild(exposeBtn);
                
                dialog.appendChild(buttonsContainer);
                
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);
            }
            
            // Show mahjong check result dialog if open
            if (gameState.mahjongDialogOpen && gameState.mahjongCheckResult) {
                // Remove any existing mahjong dialog first
                const existingMahjongOverlay = document.querySelectorAll('.call-dialog-overlay');

        // Update wall display
        // ── Bottom bar — always present during gameplay, content depends on state ──
        function updateBottomBar() {
            const bar = document.getElementById('bottomBar');
            if (!bar) return;
            bar.innerHTML = '';

            // Only show during playing phase
            if (gameState.phase !== 'playing') {
                bar.classList.remove('active');
                return;
            }
            bar.classList.add('active');

            const humanPlayer = gameState.players.find(p => p.isHuman);

            // ── State 0: Bot just called a tile — show announcement during 2500ms window ──
            const action = gameState.lastPlayerAction;
            const botJustCalled = action &&
                action.type === 'called' &&
                action.discardedTile === null && // hasn't discarded yet
                gameState.players.find(p => p.name === action.player && !p.isHuman);

            if (botJustCalled) {
                bar.style.borderTopColor = '#f57f17';
                bar.style.background = 'rgba(255, 248, 225, 0.97)';

                const icon = document.createElement('span');
                icon.textContent = '🎯';
                icon.style.fontSize = '16px';
                bar.appendChild(icon);

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.style.color = '#e65100';
                label.style.fontWeight = '700';

                const cd = getTileDisplay(action.calledTile);
                const calledDesc = cd.number ? `${cd.number} ${cd.label}` : cd.label;
                label.textContent = `${action.player} called the ${calledDesc}!`;
                bar.appendChild(label);

                // Show the exposure tiles from that player
                const caller = gameState.players.find(p => p.name === action.player);
                if (caller && caller.exposedSets && caller.exposedSets.length > 0) {
                    const lastExposure = caller.exposedSets[caller.exposedSets.length - 1];
                    const expWrap = document.createElement('div');
                    expWrap.style.cssText = 'display:flex;gap:3px;align-items:center;flex-shrink:0;';
                    lastExposure.tiles.forEach(tile => {
                        const tileEl = renderTile(tile, false, false, { isJoker: tile === 'J' });
                        tileEl.style.width = '26px';
                        tileEl.style.height = '34px';
                        tileEl.style.margin = '0';
                        const numDiv = tileEl.querySelector('.tile-number');
                        const lblDiv = tileEl.querySelector('.tile-label');
                        if (numDiv) numDiv.style.fontSize = '14px';
                        if (lblDiv) lblDiv.style.fontSize = '7px';
                        expWrap.appendChild(tileEl);
                    });
                    bar.appendChild(expWrap);
                }

                return; // Don't show other states while bot announcement is up
            }

            // Reset bar styling for other states
            bar.style.borderTopColor = '';
            bar.style.background = '';

            // ── State 1: Discard notification (a tile is on the table to call/pass) ──
            if (gameState.callingWindowOpen && gameState.lastDiscardedTile) {
                const isOwnDiscard = (gameState.currentTurn === humanPlayer);
                const isJoker = (gameState.lastDiscardedTile === 'J');
                const canCall = !isOwnDiscard && !isJoker;

                // Describe the action
                let labelText = 'Tile Discarded';
                if (gameState.lastPlayerAction && gameState.lastPlayerAction.discardedTile === gameState.lastDiscardedTile) {
                    const action = gameState.lastPlayerAction;
                    const dd = getTileDisplay(action.discardedTile);
                    const discardedDesc = dd.number ? `${dd.number} ${dd.label}` : dd.label;
                    if (action.type === 'called') {
                        const cd = getTileDisplay(action.calledTile);
                        const calledDesc = cd.number ? `${cd.number} ${cd.label}` : cd.label;
                        labelText = `${action.player} called ${calledDesc}, discarded ${discardedDesc}`;
                    } else if (action.type === 'joker_exchange') {
                        const jd = getTileDisplay(action.jokerTile);
                        const jokerDesc = jd.number ? `${jd.number} ${jd.label}` : jd.label;
                        labelText = `${action.player} claimed joker with ${jokerDesc}, discarded ${discardedDesc}`;
                    } else {
                        labelText = `${action.player} discarded ${discardedDesc}`;
                    }
                }

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = labelText;
                bar.appendChild(label);

                // The discarded tile
                const tileWrap = document.createElement('div');
                tileWrap.className = 'bar-tile';
                const tileEl = renderTile(gameState.lastDiscardedTile, false, false, { isJoker });
                tileEl.style.margin = '0';
                tileWrap.appendChild(tileEl);
                bar.appendChild(tileWrap);

                // Pass button
                const passBtn = document.createElement('button');
                passBtn.textContent = 'Pass';
                passBtn.style.background = 'var(--color-text-secondary)';
                passBtn.onclick = handlePass;
                bar.appendChild(passBtn);

                // Call button
                const callBtn = document.createElement('button');
                callBtn.textContent = 'Call';
                callBtn.style.background = 'var(--color-success)';
                callBtn.disabled = !canCall;
                if (!canCall) { callBtn.style.opacity = '0.4'; callBtn.style.cursor = 'not-allowed'; }
                callBtn.onclick = handleCall;
                bar.appendChild(callBtn);

                // Declare Mahjong button
                const mjBtn = document.createElement('button');
                mjBtn.textContent = 'Declare Mahjong';
                mjBtn.style.background = '#4caf50';
                mjBtn.disabled = isOwnDiscard || isJoker;
                if (isOwnDiscard || isJoker) { mjBtn.style.opacity = '0.4'; mjBtn.style.cursor = 'not-allowed'; }
                mjBtn.onclick = handleCallForMahjong;
                bar.appendChild(mjBtn);

            // ── State 2: Human player's turn — show action buttons ──
            } else if (gameState.currentTurn === humanPlayer && !gameState.callDialogOpen) {
                const discardBtn = document.createElement('button');
                discardBtn.textContent = gameState.selectedTileIndex !== null
                    ? 'Discard Selected' : 'Select a tile to discard';
                discardBtn.disabled = gameState.selectedTileIndex === null;
                discardBtn.onclick = confirmDiscard;
                bar.appendChild(discardBtn);

                const jokerBtn = document.createElement('button');
                jokerBtn.textContent = 'Exchange Joker';
                jokerBtn.style.background = '#ff9800';
                jokerBtn.onclick = attemptJokerExchangeWithSelectedTile;
                bar.appendChild(jokerBtn);

                const mjBtn = document.createElement('button');
                mjBtn.textContent = 'Declare Mahjong';
                mjBtn.style.background = '#4caf50';
                mjBtn.onclick = openMahjongDialog;
                bar.appendChild(mjBtn);

            // ── State 3: Bot's turn — idle label ──
            } else if (!gameState.callDialogOpen) {
                const idle = document.createElement('div');
                idle.className = 'bar-idle';
                const whose = gameState.currentTurn ? `${gameState.currentTurn.name}'s turn…` : 'Waiting…';
                idle.textContent = whose;
                bar.appendChild(idle);
            }
        }

        function updateWalls() {
            // Find human player to determine wall mapping
            const humanPlayer = gameState.players.find(p => p.isHuman);
            if (!humanPlayer) return;
            
            // Map wall positions to screen
            const getWallScreenPosition = (actualWind) => {
                const humanWind = humanPlayer.position;
                const windOrder = ['E', 'S', 'W', 'N'];
                const humanIndex = windOrder.indexOf(humanWind);
                const wallIndex = windOrder.indexOf(actualWind);
                
                let relativePos = (wallIndex - humanIndex + 4) % 4;
                const wallPositions = ['wallSouth', 'wallEast', 'wallNorth', 'wallWest'];
                return wallPositions[relativePos];
            };
            
            // Clear all walls first
            ['wallSouth', 'wallNorth', 'wallEast', 'wallWest'].forEach(wallId => {
                document.getElementById(wallId).innerHTML = '';
            });
            
            if (gameState.phase === 'playing') {
                // During playing phase: show stacks based on remaining wall tiles
                // Drawing order: North → West → South → East
                const tilesRemaining = gameState.wall.length;
                const stacksRemaining = Math.ceil(tilesRemaining / 2);
                
                // Distribute stacks across walls in drawing order
                const stacksPerWall = {
                    'N': Math.min(19, stacksRemaining),
                    'W': Math.min(19, Math.max(0, stacksRemaining - 19)),
                    'S': Math.min(19, Math.max(0, stacksRemaining - 38)),
                    'E': Math.max(0, stacksRemaining - 57)
                };
                
                // Render each wall
                ['E', 'S', 'W', 'N'].forEach(wind => {
                    const screenWallId = getWallScreenPosition(wind);
                    const wall = document.getElementById(screenWallId);
                    const stacksToShow = stacksPerWall[wind];
                    
                    for (let i = 0; i < 19; i++) {
                        const stack = document.createElement('div');
                        stack.className = 'wall-stack';
                        
                        // Mark as empty if beyond the number of stacks to show
                        if (i >= stacksToShow) {
                            stack.classList.add('empty');
                        }
                        
                        wall.appendChild(stack);
                    }
                });
                
            } else if (gameState.phase === 'dealt' || gameState.phase === 'charleston') {
                // During dealing/charleston: show walls as before (based on dealing)
                const tilesDealt = gameState.tilesDealt || 0;
                const stacksDealt = Math.ceil(tilesDealt / 2);
                const diceRoll = gameState.diceRoll || 0;
                
                const eastScreenWall = getWallScreenPosition('E');
                const northScreenWall = getWallScreenPosition('N');
                
                // East's wall: diceRoll stacks remain (toward corner with North)
                const eastStacksRemaining = diceRoll;
                const eastStacksAvailable = 19 - eastStacksRemaining;
                const eastStacksDealt = Math.min(eastStacksAvailable, stacksDealt);
                
                // North's wall: gets dealt after East's wall depleted
                const northStacksDealt = Math.max(0, stacksDealt - eastStacksDealt);
                
                // Render each wall based on SCREEN position
                ['wallSouth', 'wallNorth', 'wallEast', 'wallWest'].forEach((screenWallId) => {
                    const wall = document.getElementById(screenWallId);
                    
                    for (let i = 0; i < 19; i++) {
                        const stack = document.createElement('div');
                        stack.className = 'wall-stack';
                        
                        if (screenWallId === eastScreenWall) {
                            // East's wall: DEALT (empty) stacks toward the corner with North
                            let showEmptyAtEnd = false;
                            
                            if (screenWallId === 'wallSouth' && northScreenWall === 'wallWest') showEmptyAtEnd = false;
                            else if (screenWallId === 'wallSouth' && northScreenWall === 'wallEast') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallNorth' && northScreenWall === 'wallWest') showEmptyAtEnd = false;
                            else if (screenWallId === 'wallNorth' && northScreenWall === 'wallEast') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallEast' && northScreenWall === 'wallNorth') showEmptyAtEnd = false;
                            else if (screenWallId === 'wallEast' && northScreenWall === 'wallSouth') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallWest' && northScreenWall === 'wallNorth') showEmptyAtEnd = true;
                            else if (screenWallId === 'wallWest' && northScreenWall === 'wallSouth') showEmptyAtEnd = false;
                            
                            if (showEmptyAtEnd) {
                                if (i >= (19 - eastStacksDealt)) {
                                    stack.classList.add('empty');
                                }
                            } else {
                                if (i < eastStacksDealt) {
                                    stack.classList.add('empty');
                                }
                            }
                            
                        } else if (screenWallId === northScreenWall) {
                            // North's wall: DEALT (empty) stacks toward the corner with East
                            let showEmptyAtStart = false;
                            
                            if (screenWallId === 'wallSouth' && eastScreenWall === 'wallWest') showEmptyAtStart = true;
                            else if (screenWallId === 'wallSouth' && eastScreenWall === 'wallEast') showEmptyAtStart = false;
                            else if (screenWallId === 'wallNorth' && eastScreenWall === 'wallWest') showEmptyAtStart = true;
                            else if (screenWallId === 'wallNorth' && eastScreenWall === 'wallEast') showEmptyAtStart = false;
                            else if (screenWallId === 'wallEast' && eastScreenWall === 'wallNorth') showEmptyAtStart = true;
                            else if (screenWallId === 'wallEast' && eastScreenWall === 'wallSouth') showEmptyAtStart = false;
                            else if (screenWallId === 'wallWest' && eastScreenWall === 'wallNorth') showEmptyAtStart = false;
                            else if (screenWallId === 'wallWest' && eastScreenWall === 'wallSouth') showEmptyAtStart = true;
                            
                            if (showEmptyAtStart) {
                                if (i < northStacksDealt) {
                                    stack.classList.add('empty');
                                }
                            } else {
                                if (i >= (19 - northStacksDealt)) {
                                    stack.classList.add('empty');
                                }
                            }
                        }
                        
                        wall.appendChild(stack);
                    }
                });
            } else {
                // Before dealing: show all walls full
                ['wallSouth', 'wallNorth', 'wallEast', 'wallWest'].forEach(wallId => {
                    const wall = document.getElementById(wallId);
                    for (let i = 0; i < 19; i++) {
                        const stack = document.createElement('div');
                        stack.className = 'wall-stack';
                        wall.appendChild(stack);
                    }
                });
            }
        }

        // Update debug info
        function updateDebugInfo() {
            const debug = document.getElementById('debugInfo');
            let info = `Phase: ${gameState.phase}\n`;
            if (gameState.phase === 'charleston') {
                info += `Charleston Phase: ${gameState.charlestonPhase}\n`;
                info += `Charleston Pass: ${gameState.charlestonPassCount}\n`;
            }
            info += `Tiles remaining in wall: ${gameState.wall.length}\n`;
            info += `Tiles dealt: ${gameState.tilesDealt}\n`;
            info += `Dice roll: ${gameState.diceRoll} (${gameState.diceRoll} stacks remain on right of East's wall)\n\n`;
            
            gameState.players.forEach(player => {
                info += `${player.name} (${player.position}): ${player.tiles.length} tiles\n`;
            });
            
            if (gameState.phase === 'dealt' || gameState.phase === 'charleston' || gameState.phase === 'playing') {
                const stacksDealt = Math.ceil(gameState.tilesDealt / 2);
                const eastStacksDealt = Math.min(19 - gameState.diceRoll, stacksDealt);
                const northStacksDealt = Math.max(0, stacksDealt - eastStacksDealt);
                info += `\nWall status:\n`;
                info += `East: ${eastStacksDealt} stacks dealt (top of display), ${gameState.diceRoll} stacks remain (bottom/corner)\n`;
                info += `North: ${northStacksDealt} stacks dealt (right of display), ${19 - northStacksDealt} stacks remain (left/corner)\n`;
                info += `South: Full (19 stacks)\n`;
                info += `West: Full (19 stacks)\n`;
            }
            
            debug.textContent = info;
        }

        function toggleBotAnalysis() {

            const toggle = document.getElementById('botAnalysisToggle');

                content.classList.remove('collapsed');
                toggle.textContent = '▲';
            } else {
                content.classList.add('collapsed');

        // Update bot analysis display
        function updateBotAnalysis() {
            const content = document.getElementById('botAnalysisContent');
            
            // Only show during Charleston
            if (gameState.phase !== 'charleston') {
                content.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">Bot analysis is only available during Charleston phase.</p>';
                return;
            }
            
            content.innerHTML = '';
            
            // Analyze each bot player
            gameState.players.forEach(player => {
                if (player.isHuman) return; // Skip human player
                
                const section = document.createElement('div');
                section.className = 'bot-player-section';
                
                // Player name
                const nameDiv = document.createElement('div');
                nameDiv.className = 'bot-player-name';
                nameDiv.textContent = `${player.name} (${player.position})`;
                section.appendChild(nameDiv);
                
                // Check if this is a flexible pass and show tile count decision
                const isFlexiblePass = (gameState.charlestonPhase === 'left' || 
                                       gameState.charlestonPhase === 'optional-right');
                
                // Hand display
                const handDiv = document.createElement('div');
                handDiv.className = 'bot-hand-display';
                
                // Get tiles bot is planning to pass
                let passingIndices = [];
                let countToPass = 3; // default
                try {
                    if (gameState.charlestonPhase !== 'complete') {
                        if (isFlexiblePass) {
                            // Use same decision logic as actual pass
                            countToPass = botDecideFlexiblePassCount(player);
                        } else if (gameState.charlestonPhase === 'courtesy-pass') {
                            // Courtesy pass - would match human's count, but we don't know yet
                            // Show what they'd pass if passing 3
                            countToPass = 3;
                        } else {
                            // Regular passes: 3 tiles
                            countToPass = 3;
                        }
                        
                        passingIndices = smartBotSelectTilesToPass(player, countToPass);
                    }
                } catch (err) {
                    console.error('Error getting bot passing tiles:', err);
                }
                
                // Add note about flexible pass decision
                if (isFlexiblePass && gameState.charlestonPhase !== 'complete') {
                    const flexNote = document.createElement('div');
                    flexNote.style.fontSize = '12px';
                    flexNote.style.fontStyle = 'italic';
                    flexNote.style.color = '#666';
                    flexNote.style.marginBottom = '8px';
                    flexNote.textContent = `Planning to pass ${countToPass} tile${countToPass !== 1 ? 's' : ''} (flexible pass)`;
                    section.appendChild(flexNote);
                }
                
                // Render tiles
                player.tiles.forEach((tile, idx) => {
                    const tileDiv = document.createElement('div');
                    tileDiv.className = 'bot-tile';
                    
                    if (passingIndices.includes(idx)) {
                        tileDiv.classList.add('passing');
                        tileDiv.title = 'Bot will pass this tile';
                    }
                    
                    const display = getTileDisplay(tile);
                    tileDiv.style.backgroundColor = display.color;
                    tileDiv.style.color = display.textColor;
                    
                    const numberSpan = document.createElement('div');
                    numberSpan.className = 'bot-tile-number';
                    numberSpan.textContent = display.number;
                    tileDiv.appendChild(numberSpan);
                    
                    const labelSpan = document.createElement('div');
                    labelSpan.className = 'bot-tile-label';
                    labelSpan.textContent = display.label;
                    tileDiv.appendChild(labelSpan);
                    
                    handDiv.appendChild(tileDiv);
                });
                
                section.appendChild(handDiv);
                
                // Top hands analysis
                try {
                    const evaluation = evaluateBestMatch(player.tiles, 3);
                    
                    if (evaluation.topMatches && evaluation.topMatches.length > 0) {
                        const topHandsDiv = document.createElement('div');
                        topHandsDiv.className = 'bot-top-hands';
                        
                        const topHandsTitle = document.createElement('div');
                        topHandsTitle.style.fontWeight = '600';
                        topHandsTitle.style.marginBottom = '8px';
                        topHandsTitle.textContent = '🎯 Top Hands:';
                        topHandsDiv.appendChild(topHandsTitle);
                        
                        evaluation.topMatches.forEach((match, idx) => {
                            const matchDiv = document.createElement('div');
                            matchDiv.className = `bot-hand-match rank-${idx + 1}`;
                            
                            const scoreBadge = document.createElement('span');
                            scoreBadge.className = 'bot-hand-score';
                            scoreBadge.textContent = `${Math.round(match.score)} pts`;
                            
                            const handName = document.createElement('span');
                            handName.className = 'bot-hand-name';
                            const section = match.pattern.Section || '';
                            const handNum = match.pattern['hand number'] || 'Unknown';
                            handName.textContent = ` - ${section}: Hand ${handNum}`;
                            
                            const status = document.createElement('span');
                            status.className = 'bot-hand-status';
                            status.textContent = ` (${match.tilesFilled}/14 tiles, ${match.tilesNeeded} needed)`;
                            if (match.pattern.status === 'closed') {
                                status.textContent += ' [CLOSED]';
                            }
                            
                            matchDiv.appendChild(scoreBadge);
                            matchDiv.appendChild(handName);
                            matchDiv.appendChild(status);
                            
                            topHandsDiv.appendChild(matchDiv);
                        });
                        
                        section.appendChild(topHandsDiv);
                    } else {
                        const noHandsDiv = document.createElement('div');
                        noHandsDiv.style.fontStyle = 'italic';
                        noHandsDiv.style.color = '#999';
                        noHandsDiv.textContent = 'No viable hands detected';
                        section.appendChild(noHandsDiv);
                    }
                } catch (err) {
                    console.error('Error evaluating bot hand:', err);
                    const errorDiv = document.createElement('div');
                    errorDiv.style.color = '#e74c3c';
                    errorDiv.textContent = 'Error analyzing hand';
                    section.appendChild(errorDiv);
                }
                
                content.appendChild(section);
            });
        }

        // ── View switching ──
        function launchGame() {
            // Request fullscreen on the user tap (required by browsers)
            const el = document.documentElement;
            if (el.requestFullscreen) {
                el.requestFullscreen().catch(() => {}); // silently ignore if denied
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen(); // Safari fallback
            }

            document.getElementById('landingView').style.display = 'none';
            document.getElementById('gameView').style.display = 'flex';
            startNewGame();
        }

        function toggleCornerMenu() {
            const dropdown = document.getElementById('cornerMenuDropdown');
            dropdown.classList.toggle('open');
        }

        // Close menu if clicking outside it
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('cornerMenu');
            if (menu && !menu.contains(e.target)) {
                document.getElementById('cornerMenuDropdown').classList.remove('open');
            }
        });

        function confirmNewGame() {
            document.getElementById('cornerMenuDropdown').classList.remove('open');
            // If game is already over, no need to confirm — just restart
            // If mid-game, ask for confirmation
            if (gameState.phase !== 'setup' && !gameState.gameOver) {
                if (!confirm('Start a new game? Current game will be lost.')) return;
            }
            // Re-request fullscreen if it was exited
            const el = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (el.requestFullscreen) {
                    el.requestFullscreen().catch(() => {});
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                }
            }
            startNewGame();
        }

        // Initialize on load — just show landing page
        window.addEventListener('load', () => {
            // Nothing to init — landing page is shown by default

            // Register service worker for PWA offline support
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    // Check for updates whenever the page loads
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version available — show a subtle update banner
                                const banner = document.createElement('div');
                                banner.style.cssText = `
                                    position: fixed; bottom: 0; left: 0; right: 0;
                                    background: #2c5f2d; color: white;
                                    padding: 12px 16px; text-align: center;
                                    font-size: 14px; z-index: 9999;
                                    display: flex; justify-content: center; gap: 12px; align-items: center;
                                `;
                                banner.innerHTML = `
                                    <span>🀄 A new version is available!</span>
                                    <button onclick="window.location.reload()" style="
                                        background: white; color: #2c5f2d; border: none;
                                        padding: 6px 14px; border-radius: 4px;
                                        font-weight: 700; cursor: pointer;">
                                        Update now
                                    </button>
                                `;
                                document.body.appendChild(banner);
                            }
                        });
                    });
                }).catch(err => {
                    console.log('Service worker registration failed:', err);
                });
            }
        });
    </script>
</body>
</html>

        // ========================================
        // PATTERN ANALYZER FUNCTIONS
        // ========================================
        
        const SUITS = ['B', 'C', 'D'];
        const DRAGON_MAP = { 'B': 'GD', 'C': 'RD', 'D': 'WD' };
        const JOKER = 'J';
        
        // Helper: Check if all elements in array are identical
        function allIdentical(arr) {
            return arr.every(v => v === arr[0]);
        }
        
        // Helper: Clone a Set-based map
        function cloneKValueSets(kValueSets) {
            const copy = {};
            for (const k in kValueSets) {
                copy[k] = new Set(kValueSets[k] ? Array.from(kValueSets[k]) : []);
            }
            return copy;
        }
        
        // Parse a hand pattern string into groups
        function parsePattern(pattern) {
            const tokens = pattern.trim().split(/\s+/).filter(s => s.length > 0);
            return tokens.map((seq, idx) => {
                const m = seq.match(/^(?:\[(\w+)\])?([xvymqr0-9NEWSFDJkK]+)(?:-([0-9]+)?([a-z])?)?(?:\(\+?(-?\d+)\))?$/i);
                if (!m) return null;
                
                const name = m[1] || null;  // Bracket name like "K1"
                const tiles = m[2].toUpperCase().split('');
                const numVar = m[3] || null;
                const suitVar = m[4] ? m[4].toUpperCase() : null;
                const offset = m[5] ? parseInt(m[5], 10) : 0;
                
                // Assign priority based on difficulty
                let priority = 4;
                if (tiles.includes('K')) priority = 1;  // K sequences hardest
                else if (tiles.length === 2) priority = 1;  // Pairs are hard
                else if (!allIdentical(tiles)) priority = 2;  // Non-identical groups (NEWS, 2025)
                else if (tiles.includes('R')) priority = 3;  // R groups
                else if (tiles.length === 1) priority = 3;  // Singles
                else if (allIdentical(tiles) && tiles.includes('Q')) priority = 3;  // Q groups
                
                return { 
                    raw: seq, 
                    tiles, 
                    numVar, 
                    suitVar, 
                    offset, 
                    priority, 
                    matchedTiles: [], 
                    idx, 
                    kName: name 
                };
            }).filter(g => g);
        }
        
        // Get candidate tiles from pool for a specific tile character
        function candidatesForTile(tile, pool, localNumMap, localSuitMap, localKLengthMap, localRMap, group) {
            const currentSuitVar = group.suitVar;
            const lockedSuits = Object.entries(localSuitMap)
                .filter(([varName, suit]) => varName !== currentSuitVar && suit)
                .map(([_, suit]) => suit);
            
            // Handle honor tiles
            if ('NEWSF'.includes(tile)) return pool.filter(p => p === tile);
            if (tile === '0') return pool.filter(p => 'WD' === p);
            
            // Handle dragons
            if (tile === 'D') {
                const sv = group.suitVar ? localSuitMap[group.suitVar] : null;
                if (sv) return pool.filter(p => p === DRAGON_MAP[sv]);
                return pool.filter(p => {
                    if (!Object.values(DRAGON_MAP).includes(p)) return false;
                    const [suitKey] = Object.entries(DRAGON_MAP).find(([k, v]) => v === p);
                    return !lockedSuits.includes(suitKey);
                });
            }
            
            // Handle wildcard and special number tiles
            if (['X', 'V', 'Y', 'M', 'Q', 'R'].includes(tile)) {
                let possibleNums = ['1', '2', '3', '4', '5', '6', '7', '8', '9'];
                if (tile === 'V') possibleNums = ['2', '4', '6', '8'];
                if (tile === 'Y') possibleNums = ['1', '3', '5', '7', '9'];
                if (tile === 'M') possibleNums = ['3', '6', '9'];
                
                let baseNum = null;
                if (tile === 'Q') {
                    // Q references last number of K sequence
                    if (group.kName && localNumMap[group.kName] && localKLengthMap[group.kName] !== undefined) {
                        const start = parseInt(localNumMap[group.kName], 10);
                        const klen = localKLengthMap[group.kName];
                        baseNum = start + klen;
                        if (group.offset) baseNum += group.offset;
                    } else return [];
                } else if (tile === 'R') {
                    // R references random number from K sequence
                    if (group.kName && localRMap && localRMap[group.kName] !== undefined) {
                        baseNum = localRMap[group.kName] + group.offset;
                    } else return [];
                } else {
                    // Regular wildcard
                    baseNum = group.numVar && localNumMap[group.numVar] ? parseInt(localNumMap[group.numVar]) + group.offset : null;
                }
                
                if (baseNum !== null) {
                    if (baseNum >= 1 && baseNum <= 9 && possibleNums.includes(String(baseNum))) {
                        possibleNums = [String(baseNum)];
                    } else return [];
                }
                
                // Match suited tiles
                const sv = group.suitVar ? localSuitMap[group.suitVar] : null;
                if (sv) {
                    return pool.filter(p => {
                        if (p.length !== 2 || p[1] !== sv) return false;
                        return possibleNums.includes(p[0]);
                    });
                } else {
                    return pool.filter(p => {
                        if (p.length !== 2) return false;
                        if (lockedSuits.includes(p[1])) return false;
                        return possibleNums.includes(p[0]);
                    });
                }
            }
            
            // Handle literal number tiles
            if (/^\d$/.test(tile)) {
                const num = tile;
                const sv = group.suitVar ? localSuitMap[group.suitVar] : null;
                if (sv) {
                    return pool.filter(p => p === num + sv);
                } else {
                    return pool.filter(p => {
                        if (p.length !== 2 || p[0] !== num) return false;
                        return !lockedSuits.includes(p[1]);
                    });
                }
            }
            
            return [];
        }
        
        // Fill a single group with tiles from the hand pool
        function fillGroup(group, handPool, numVarMap, suitVarMap, kLengthMap, rVarMap, kValueSets) {
            const results = [];

            // Helper to identify suits ALREADY locked by *other* suit variables.
            const currentSuitVar = group.suitVar;
            const lockedSuits = Object.entries(suitVarMap)
                .filter(([varName, suit]) => varName !== currentSuitVar && suit)
                .map(([_, suit]) => suit);

            if (group.tiles.includes('K')) {
                const L = group.tiles.filter(t => t === 'K').length;
                const possibleSuits = group.suitVar && suitVarMap[group.suitVar] ? [suitVarMap[group.suitVar]] : SUITS;

                possibleSuits.forEach(suit => {
                    // Critical check: Skip this suit if it's locked by another variable
                    if (group.suitVar && !suitVarMap[group.suitVar] && lockedSuits.includes(suit)) {
                        return; 
                    }

                    for (let start = 1; start <= 10 - L; start++) {
                        const matched = [];
                        const usedIndices = new Set();
                        let presentCount = 0;
                        for (let off = 0; off < L; off++) {
                            const num = String(start + off);
                            const idx = handPool.findIndex((t, i) => !usedIndices.has(i) && t === num + suit);
                            if (idx >= 0) { matched.push(handPool[idx]); usedIndices.add(idx); presentCount++; }
                            else matched.push('?');
                        }

                        if (presentCount >= Math.ceil(L / 2)) {
                            const newGroup = { ...group, matchedTiles: matched };
                            const newPool = handPool.filter((_, i) => !usedIndices.has(i));
                            const newNumMap = { ...numVarMap };
                            if (group.kName && !newNumMap[group.kName]) newNumMap[group.kName] = String(start);
                            const newSuitMap = { ...suitVarMap };
                            if (group.suitVar && !newSuitMap[group.suitVar] && matched.some(t => t !== '?')) newSuitMap[group.suitVar] = suit;
                            const newKLenMap = { ...kLengthMap };
                            if (group.kName && newKLenMap[group.kName] === undefined) newKLenMap[group.kName] = L;

                            const newKValueSets = cloneKValueSets(kValueSets);
                            if (group.kName && !newKValueSets[group.kName]) newKValueSets[group.kName] = new Set();
                            matched.forEach(t => {
                                if (t !== '?') newKValueSets[group.kName].add(parseInt(t[0], 10));
                            });

                            results.push({
                                group: newGroup,
                                handPool: newPool,
                                numVarMap: newNumMap,
                                suitVarMap: newSuitMap,
                                kLengthMap: newKLenMap,
                                rVarMap: { ...rVarMap },
                                kValueSets: newKValueSets
                            });
                        }
                    }
                });

            } else {
                // recursive assignment for non-K groups
                function assignTile(i, matchedSoFar, poolSoFar, localNumMap, localSuitMap, localKLenMap, localRMap, localKValueSets) {
                    if (i >= group.tiles.length) {
                        results.push({
                            group: { ...group, matchedTiles: [...matchedSoFar] },
                            handPool: poolSoFar,
                            numVarMap: localNumMap,
                            suitVarMap: localSuitMap,
                            kLengthMap: localKLenMap,
                            rVarMap: localRMap,
                            kValueSets: localKValueSets
                        });
                        return;
                    }

                    const tile = group.tiles[i];

                    // Special handling for R when we need to pick from K values
                    if (tile === 'R' && group.kName && (!localRMap || localRMap[group.kName] === undefined)) {
                        const kValues = localKValueSets && localKValueSets[group.kName] ? localKValueSets[group.kName] : null;
                        if (!kValues || kValues.size === 0) {
                            // No known K values -> can't resolve R now; put '?'
                            assignTile(i + 1, [...matchedSoFar, '?'], poolSoFar, { ...localNumMap }, { ...localSuitMap }, { ...localKLenMap }, { ...localRMap }, cloneKValueSets(localKValueSets));
                            return;
                        }

                        // iterate each numeric value found in the referenced K set
                        Array.from(kValues).forEach(val => {
                            const chosenNum = val;
                            const newRMap = { ...localRMap }; newRMap[group.kName] = chosenNum;
                            const cands = candidatesForTile('R', poolSoFar, localNumMap, localSuitMap, localKLenMap, newRMap, group);

                            if (cands.length === 0) {
                                assignTile(i + 1, [...matchedSoFar, '?'], poolSoFar, { ...localNumMap }, { ...localSuitMap }, { ...localKLenMap }, newRMap, cloneKValueSets(localKValueSets));
                            } else {
                                for (let j = 0; j < poolSoFar.length; j++) {
                                    const cand = poolSoFar[j];
                                    if (!cands.includes(cand)) continue;
                                    const newPool = poolSoFar.slice(); newPool.splice(j, 1);
                                    const newNumMap = { ...localNumMap }, newSuitMap = { ...localSuitMap };
                                    if (group.suitVar && !newSuitMap[group.suitVar]) newSuitMap[group.suitVar] = cand[1];
                                    assignTile(i + 1, [...matchedSoFar, cand], newPool, newNumMap, newSuitMap, localKLenMap, newRMap, cloneKValueSets(localKValueSets));
                                }
                            }
                        });

                        return;
                    }

                    // Normal candidate resolution
                    const cands = candidatesForTile(tile, poolSoFar, localNumMap, localSuitMap, localKLenMap, localRMap, group);
                    if (cands.length === 0) {
                        assignTile(i + 1, [...matchedSoFar, '?'], poolSoFar, { ...localNumMap }, { ...localSuitMap }, { ...localKLenMap }, { ...localRMap }, cloneKValueSets(localKValueSets));
                        return;
                    }

                    for (let j = 0; j < poolSoFar.length; j++) {
                        const cand = poolSoFar[j];
                        if (!cands.includes(cand)) continue;
                        const newPool = poolSoFar.slice(); newPool.splice(j, 1);
                        const newNumMap = { ...localNumMap }, newSuitMap = { ...localSuitMap }, newRMap = { ...localRMap };
                        const newKValueSets2 = cloneKValueSets(localKValueSets);

                        // preserve variable assignment behavior exactly as before
                        if (['X', 'V', 'Y', 'M'].includes(tile)) {
                            if (group.numVar && !newNumMap[group.numVar]) newNumMap[group.numVar] = String(parseInt(cand[0]) - group.offset);
                            if (group.suitVar && !newSuitMap[group.suitVar]) newSuitMap[group.suitVar] = cand[1];
                        } else if (tile === 'R') {
                            if (group.suitVar && !newSuitMap[group.suitVar]) newSuitMap[group.suitVar] = cand[1];
                        } else if (tile === 'Q') { // Q must assign suit
                            if (group.suitVar && !newSuitMap[group.suitVar]) newSuitMap[group.suitVar] = cand[1];
                        } else if (!isNaN(parseInt(tile))) {
                            if (group.suitVar && !newSuitMap[group.suitVar]) newSuitMap[group.suitVar] = cand[1];
                        } else if (tile === 'D') {
                            if (group.suitVar && !newSuitMap[group.suitVar]) newSuitMap[group.suitVar] = Object.entries(DRAGON_MAP).find(([k, v]) => v === cand)[0];
                        }

                        assignTile(i + 1, [...matchedSoFar, cand], newPool, newNumMap, newSuitMap, localKLenMap, newRMap, newKValueSets2);
                    }
                }

                // initial call: clone incoming kValueSets so branch copies are safe
                assignTile(0, [], handPool, { ...numVarMap }, { ...suitVarMap }, { ...kLengthMap }, { ...rVarMap }, cloneKValueSets(kValueSets));
            }

            return results;
        }
        
        // Evaluate how well a hand matches a pattern
        function evaluatePattern(hand, pattern) {
            const groups = parsePattern(pattern);
            const kLenCheck = {};
            groups.forEach(g => {
                if (g.kName && g.tiles.includes('K')) {
                    const L = g.tiles.filter(t => t === 'K').length;
                    if (kLenCheck[g.kName] === undefined) kLenCheck[g.kName] = L;
                    else if (kLenCheck[g.kName] !== L) throw new Error('Invalid pattern: K groups sharing the same name must have the same length.');
                }
            });

            let states = [{ handPool: [...hand], numVarMap: {}, suitVarMap: {}, kLengthMap: kLenCheck, rVarMap: {}, kValueSets: {}, groups: groups.map(g => ({ ...g })) }];
            const priorities = [1, 2, 3, 4];

            priorities.forEach(priority => {
                const newStates = [];
                states.forEach(state => {
                    const pGroups = state.groups.filter(g => g.priority === priority);
                    // Sort groups by tile count (descending) to prioritize larger groups
                    pGroups.sort((a, b) => b.tiles.length - a.tiles.length);
                    if (pGroups.length === 0) { newStates.push(state); return; }

                    let partialStates = [{ handPool: state.handPool, numVarMap: { ...state.numVarMap }, suitVarMap: { ...state.suitVarMap }, kLengthMap: { ...state.kLengthMap }, rVarMap: { ...state.rVarMap }, kValueSets: { ...state.kValueSets }, groups: [] }];
                    pGroups.forEach(g => {
                        const temp = [];
                        partialStates.forEach(ps => {
                            const fills = fillGroup(g, ps.handPool, ps.numVarMap, ps.suitVarMap, ps.kLengthMap, ps.rVarMap, ps.kValueSets);
                            fills.forEach(f => {
                                temp.push({ handPool: f.handPool, numVarMap: f.numVarMap, suitVarMap: f.suitVarMap, kLengthMap: f.kLengthMap, rVarMap: f.rVarMap, kValueSets: f.kValueSets, groups: [...ps.groups, f.group] });
                            });
                        });
                        if (temp.length === 0) {
                            partialStates = partialStates.map(ps => ({ ...ps, groups: [...ps.groups, { ...g, matchedTiles: Array(g.tiles.length).fill('?') }] }));
                            return;
                        }
                        // For Priority 4, keep ALL possible fills to explore all combinations
                        // For other priorities, keep only the best fills for this group
                        if (priority === 4) {
                            partialStates = temp;
                        } else {
                            const maxFilled = Math.max(...temp.map(t => t.groups[t.groups.length - 1].matchedTiles.filter(x => x !== '?').length));
                            partialStates = temp.filter(t => t.groups[t.groups.length - 1].matchedTiles.filter(x => x !== '?').length === maxFilled);
                        }
                    });
                    partialStates.forEach(ps => {
                        const otherGroups = state.groups.filter(g => g.priority !== priority);
                        newStates.push({ handPool: ps.handPool, numVarMap: ps.numVarMap, suitVarMap: ps.suitVarMap, kLengthMap: ps.kLengthMap, rVarMap: ps.rVarMap, kValueSets: ps.kValueSets, groups: [...ps.groups, ...otherGroups] });
                    });
                });
                states = newStates;
            });

            states.forEach(s => {
                s.totalFilled = s.groups.reduce((acc, g) => acc + g.matchedTiles.filter(t => t !== '?').length, 0);
                // Calculate MISSING counts by priority for better comparison
                // Missing = total tiles in that priority level - filled tiles
                s.p1Missing = s.groups.filter(g => g.priority === 1).reduce((acc, g) => acc + g.matchedTiles.filter(t => t === '?').length, 0);
                s.p2Missing = s.groups.filter(g => g.priority === 2).reduce((acc, g) => acc + g.matchedTiles.filter(t => t === '?').length, 0);
                s.p3Missing = s.groups.filter(g => g.priority === 3).reduce((acc, g) => acc + g.matchedTiles.filter(t => t === '?').length, 0);
                s.p4Missing = s.groups.filter(g => g.priority === 4).reduce((acc, g) => acc + g.matchedTiles.filter(t => t === '?').length, 0);
                
                // Also keep filled counts for backward compatibility
                s.p1Filled = s.groups.filter(g => g.priority === 1).reduce((acc, g) => acc + g.matchedTiles.filter(t => t !== '?').length, 0);
                s.p2Filled = s.groups.filter(g => g.priority === 2).reduce((acc, g) => acc + g.matchedTiles.filter(t => t !== '?').length, 0);
                s.p3Filled = s.groups.filter(g => g.priority === 3).reduce((acc, g) => acc + g.matchedTiles.filter(t => t !== '?').length, 0);
                s.p4Filled = s.groups.filter(g => g.priority === 4).reduce((acc, g) => acc + g.matchedTiles.filter(t => t !== '?').length, 0);
            });
            // Sort by LEAST missing at each priority level (ascending order)
            // This favors patterns that are closest to complete at each priority
            states.sort((a, b) => {
                if (a.p1Missing !== b.p1Missing) return a.p1Missing - b.p1Missing;
                if (a.p2Missing !== b.p2Missing) return a.p2Missing - b.p2Missing;
                if (a.p3Missing !== b.p3Missing) return a.p3Missing - b.p3Missing;
                if (a.p4Missing !== b.p4Missing) return a.p4Missing - b.p4Missing;
                return b.totalFilled - a.totalFilled; // Tiebreaker: most filled overall
            });

            const uniqueHands = [];
            const seen = new Set();
            states.forEach(s => {
                const key = JSON.stringify({ groups: s.groups.map(g => g.matchedTiles), handPool: s.handPool });
                if (!seen.has(key)) { seen.add(key); uniqueHands.push(s); }
            });

            return uniqueHands.map(s => ({
                groups: s.groups,
                handPool: s.handPool,
                numVarMap: s.numVarMap,
                suitVarMap: s.suitVarMap,
                kLengthMap: s.kLengthMap,
                rVarMap: s.rVarMap,
                jokersRemaining: s.handPool.filter(t => t === JOKER).length,
                totalFilled: s.totalFilled,
                p1Filled: s.p1Filled,
                p2Filled: s.p2Filled,
                p3Filled: s.p3Filled,
                p4Filled: s.p4Filled,
                p1Missing: s.p1Missing,
                p2Missing: s.p2Missing,
                p3Missing: s.p3Missing,
                p4Missing: s.p4Missing
            }));
        }
        
        // Use jokers intelligently to fill missing tiles (Priority 4 first, then 3, 2, 1)
        function useJokersForScoring(result, jokersAvailable) {
            if (!jokersAvailable || jokersAvailable === 0) return result;
            
            let jokersUsed = 0;
            const enhancedGroups = result.groups.map(g => ({ ...g, matchedTiles: [...g.matchedTiles] }));
            
            // Priority order: fill Priority 4 (easiest) first
            for (let priority = 4; priority >= 1 && jokersUsed < jokersAvailable; priority--) {
                for (const group of enhancedGroups) {
                    if (group.priority !== priority) continue;
                    
                    // Can only use jokers for groups of 3+ identical tiles
                    const canUseJokers = (priority === 4 || priority === 3) && allIdentical(group.tiles) && group.tiles.length >= 3;
                    
                    if (canUseJokers) {
                        for (let i = 0; i < group.matchedTiles.length && jokersUsed < jokersAvailable; i++) {
                            if (group.matchedTiles[i] === '?') {
                                group.matchedTiles[i] = 'J';
                                jokersUsed++;
                            }
                        }
                    }
                }
            }
            
            // Recalculate statistics
            const totalFilled = enhancedGroups.reduce((sum, g) => sum + g.matchedTiles.filter(t => t !== '?').length, 0);
            const p1Missing = enhancedGroups.filter(g => g.priority === 1).reduce((sum, g) => sum + g.matchedTiles.filter(t => t === '?').length, 0);
            const p2Missing = enhancedGroups.filter(g => g.priority === 2).reduce((sum, g) => sum + g.matchedTiles.filter(t => t === '?').length, 0);
            const p3Missing = enhancedGroups.filter(g => g.priority === 3).reduce((sum, g) => sum + g.matchedTiles.filter(t => t === '?').length, 0);
            const p4Missing = enhancedGroups.filter(g => g.priority === 4).reduce((sum, g) => sum + g.matchedTiles.filter(t => t === '?').length, 0);
            
            return {
                groups: enhancedGroups,
                handPool: result.handPool.filter(t => t !== JOKER).concat(Array(jokersAvailable - jokersUsed).fill(JOKER)),
                jokersRemaining: jokersAvailable - jokersUsed,
                jokersUsed: jokersUsed,
                totalFilled: totalFilled,
                p1Missing: p1Missing,
                p2Missing: p2Missing,
                p3Missing: p3Missing,
                p4Missing: p4Missing
            };
        }
        
        // Evaluate all hands and find best matches
        function evaluateBestMatch(hand, topN = 5, lockedGroups = []) {
            const allMatches = [];
            const jokersInHand = hand.filter(t => t === 'J').length;
            
            CARD_2025.forEach(handDef => {
                try {
                    // Skip "quints" section if no jokers (quints require 5 of a kind)
                    if (handDef.Section.toLowerCase() === 'quints' && jokersInHand === 0) {
                        return;
                    }
                    
                    const rawResults = evaluatePattern(hand, handDef.code);
                    const results = filterFillsForLockedGroups(rawResults, lockedGroups);
                    if (!results || results.length === 0) return; // no fill compatible with locked groups

                    let result = results[0];
                    
                    // Use jokers to enhance the result
                    if (jokersInHand > 0) {
                        result = useJokersForScoring(result, jokersInHand);
                    }
                    
                    // Calculate score using priority-based formula
                    const score = (result.totalFilled * 10) - 
                                 (result.p1Missing * 5 + 
                                  result.p2Missing * 5 + 
                                  result.p3Missing * 1 + 
                                  result.p4Missing * 1 +
                                  (result.singleMissing || 0) * 4); // singles: -1 from p3 + -4 extra = -5 total
                    
                    // Apply closed hand PENALTY (harder to complete, can't call tiles)
                    // Closed hands can only call for mahjong, making them very inflexible
                    const finalScore = handDef.status === 'closed' ? score * 0.7 : score;
                    
                    const tilesNeeded = 14 - result.totalFilled;
                    
                    allMatches.push({
                        score: finalScore,
                        pattern: handDef,
                        result: result,
                        tilesNeeded: tilesNeeded,
                        tilesFilled: result.totalFilled,
                        jokersUsed: result.jokersUsed || 0
                    });
                } catch (err) {
                    // Skip problematic patterns
                    console.error(`Error evaluating pattern ${handDef.code}:`, err);
                }
            });
            
            // Sort by score descending and return top N
            allMatches.sort((a, b) => b.score - a.score);
            const topMatches = allMatches.slice(0, topN);
            
            // Calculate flexibility score (sum of top 3)
            const flexibilityScore = topMatches.slice(0, 3).reduce((sum, match) => sum + match.score, 0);
            
            return {
                topMatches: topMatches,
                flexibilityScore: flexibilityScore,
                bestMatch: topMatches[0] || null
            };
        }

        // ========================================
        // IMPROVED BOT INTELLIGENCE
        // Charleston, Draw/Discard, and Calling Logic
        // ========================================
        
        function decideCharlestonDiscard(hand, numToDiscard = 3, player = null) {
            // CRITICAL: Remove all jokers from consideration - they can NEVER be discarded
            const handWithoutJokers = hand.filter(t => t !== 'J');
            
            if (handWithoutJokers.length < numToDiscard) {
                throw new Error('Cannot discard - not enough non-joker tiles!');
            }
            
            // Get top 5 matches to base decision on (personality-aware)
            const evaluation = personalityEval(player, hand, 5);
            
            if (!evaluation.topMatches || evaluation.topMatches.length === 0) {
                // No good matches - just discard random non-joker tiles
                return handWithoutJokers.slice(0, numToDiscard);
            }
            
            // STRATEGY: Protect tiles used in the #1 (best) hand
            // But only protect the EXACT COUNT needed, not all tiles of that type
            const bestMatch = evaluation.topMatches[0];
            const protectedTileCounts = new Map(); // tile -> count needed
            
            // Count how many of each tile the best match actually uses
            if (bestMatch.result && bestMatch.result.groups) {
                bestMatch.result.groups.forEach(group => {
                    group.matchedTiles.forEach(tile => {
                        if (tile !== '?' && tile !== 'J') {
                            protectedTileCounts.set(tile, (protectedTileCounts.get(tile) || 0) + 1);
                        }
                    });
                });
            }
            
            // Separate tiles into protected and non-protected based on COUNT
            const protected = [];
            const nonProtected = [];
            const handCounts = new Map();
            
            // Count what we have
            handWithoutJokers.forEach(tile => {
                handCounts.set(tile, (handCounts.get(tile) || 0) + 1);
            });
            
            // Allocate tiles: protect exact count needed, rest are non-protected
            handWithoutJokers.forEach(tile => {
                const neededCount = protectedTileCounts.get(tile) || 0;
                const currentProtectedCount = protected.filter(t => t === tile).length;
                
                if (currentProtectedCount < neededCount) {
                    protected.push(tile);
                } else {
                    nonProtected.push(tile);
                }
            });
            
            // Calculate value of each tile based on ALL top matches
            const tileValues = calculateTileValues(hand, evaluation.topMatches);
            
            // KEY DECISION POINT:
            // Can we discard without breaking the priority hand?
            if (nonProtected.length >= numToDiscard) {
                // YES - Commit to priority hand, only discard from non-protected tiles
                const tileInfo = nonProtected.map(tile => ({
                    tile,
                    value: tileValues.get(tile) || 0,
                    count: handWithoutJokers.filter(t => t === tile).length
                }));
                
                tileInfo.sort((a, b) => {
                    if (a.value !== b.value) return a.value - b.value;
                    return b.count - a.count;
                });
                
                return pickTilesToDiscard(tileInfo, numToDiscard, handWithoutJokers);
                
            } else {
                // NO - Must break priority hand, so treat ALL top 5 hands equally
                // Recalculate which tiles to protect based on ALL top hands, not just #1
                const allHandsProtectedCounts = new Map();
                
                evaluation.topMatches.forEach(match => {
                    if (match.result && match.result.groups) {
                        match.result.groups.forEach(group => {
                            group.matchedTiles.forEach(tile => {
                                if (tile !== '?' && tile !== 'J') {
                                    const current = allHandsProtectedCounts.get(tile) || 0;
                                    allHandsProtectedCounts.set(tile, Math.max(current, 1));
                                }
                            });
                        });
                    }
                });
                
                // Use equal-weight scoring across all top hands
                const tileInfo = handWithoutJokers.map(tile => ({
                    tile,
                    value: tileValues.get(tile) || 0,
                    count: handWithoutJokers.filter(t => t === tile).length,
                    usedInAnyTopHand: allHandsProtectedCounts.has(tile)
                }));
                
                // Sort: prioritize keeping tiles used in any top hand, then by value
                tileInfo.sort((a, b) => {
                    // Prefer keeping tiles used in top hands
                    if (a.usedInAnyTopHand && !b.usedInAnyTopHand) return 1;
                    if (!a.usedInAnyTopHand && b.usedInAnyTopHand) return -1;
                    // Then by value
                    if (a.value !== b.value) return a.value - b.value;
                    return b.count - a.count;
                });
                
                return pickTilesToDiscard(tileInfo, numToDiscard, handWithoutJokers);
            }
        }
        
        // Helper function to pick tiles to discard from sorted tileInfo
        function pickTilesToDiscard(tileInfo, numToDiscard, handWithoutJokers) {
            const toDiscard = [];
            const tileCounts = new Map();
            handWithoutJokers.forEach(t => tileCounts.set(t, (tileCounts.get(t) || 0) + 1));
            
            for (let i = 0; i < tileInfo.length && toDiscard.length < numToDiscard; i++) {
                const tile = tileInfo[i].tile;
                const alreadyDiscarded = toDiscard.filter(t => t === tile).length;
                const totalAvailable = tileCounts.get(tile);
                
                if (alreadyDiscarded < totalAvailable) {
                    toDiscard.push(tile);
                }
            }
            
            return toDiscard;
        }
        
        // Get detailed reasoning for Charleston discard decision
        function explainCharlestonDiscard(hand, toDiscard) {
            const evaluation = evaluateBestMatch(hand, 5);
            const tileValues = calculateTileValues(hand, evaluation.topMatches);
            
            // Count tiles needed for best match
            const bestMatch = evaluation.topMatches[0];
            const protectedTileCounts = new Map();
            
            if (bestMatch && bestMatch.result && bestMatch.result.groups) {
                bestMatch.result.groups.forEach(group => {
                    group.matchedTiles.forEach(tile => {
                        if (tile !== '?' && tile !== 'J') {
                            protectedTileCounts.set(tile, (protectedTileCounts.get(tile) || 0) + 1);
                        }
                    });
                });
            }
            
            // Calculate non-protected tiles (extras beyond what best hand needs)
            const handWithoutJokers = hand.filter(t => t !== 'J');
            const handCounts = new Map();
            handWithoutJokers.forEach(t => handCounts.set(t, (handCounts.get(t) || 0) + 1));
            
            let nonProtectedCount = 0;
            handCounts.forEach((count, tile) => {
                const needed = protectedTileCounts.get(tile) || 0;
                if (count > needed) {
                    nonProtectedCount += (count - needed);
                }
            });
            
            // Determine strategy mode
            const strategyMode = nonProtectedCount >= 3 ? 'PRIORITY' : 'ALL_HANDS';
            
            const explanation = {
                topMatches: evaluation.topMatches.map(m => ({
                    section: m.pattern.Section,
                    handNum: m.pattern['hand number'],
                    score: Math.round(m.score),
                    fillVariant: m.fillVariant,
                    totalFills: m.totalFillsForPattern
                })),
                bestMatchPattern: bestMatch ? `${bestMatch.pattern.Section} - Hand ${bestMatch.pattern['hand number']}` : 'None',
                strategyMode: strategyMode,
                strategyExplanation: strategyMode === 'PRIORITY' 
                    ? `Enough non-priority tiles to discard - committing to best hand`
                    : `Must break best hand - treating all top ${evaluation.topMatches.length} hands equally`,
                tileAnalysis: [],
                discardedTiles: toDiscard,
                reasoning: []
            };
            
            // Analyze each tile
            const uniqueTiles = [...new Set(hand)];
            const jokers = uniqueTiles.filter(t => t === 'J');
            const nonJokers = uniqueTiles.filter(t => t !== 'J');
            
            // Add jokers (always kept)
            jokers.forEach(tile => {
                const count = hand.filter(t => t === tile).length;
                explanation.tileAnalysis.push({
                    tile,
                    value: 999999,
                    count,
                    neededByBest: 0,
                    excess: 0,
                    isDiscarded: false,
                    discardCount: 0,
                    status: 'KEEP (JOKER)',
                    isJoker: true,
                    isProtected: false
                });
            });
            
            // Analyze non-joker tiles
            nonJokers.forEach(tile => {
                const value = tileValues.get(tile) || 0;
                const count = hand.filter(t => t === tile).length;
                const neededByBest = protectedTileCounts.get(tile) || 0;
                const excess = Math.max(0, count - neededByBest);
                const isDiscarded = toDiscard.includes(tile);
                const discardCount = toDiscard.filter(t => t === tile).length;
                
                let isProtected = false;
                if (strategyMode === 'PRIORITY') {
                    // In priority mode, only the exact count needed is protected
                    isProtected = neededByBest > 0 && discardCount < (count - neededByBest);
                }
                
                let status;
                if (isDiscarded && excess > 0 && discardCount <= excess) {
                    status = `DISCARD ${discardCount}/${count} (extras)`;
                } else if (isDiscarded && isProtected) {
                    status = `DISCARD ${discardCount}/${count} ⚠️ (Breaking best hand!)`;
                } else if (isDiscarded) {
                    status = `DISCARD ${discardCount}/${count}`;
                } else if (neededByBest > 0 && strategyMode === 'PRIORITY') {
                    status = `KEEP (Best Hand: ${neededByBest}/${count})`;
                } else {
                    status = 'KEEP';
                }
                
                explanation.tileAnalysis.push({
                    tile,
                    value: Math.round(value),
                    count,
                    neededByBest,
                    excess,
                    isDiscarded,
                    discardCount,
                    status,
                    isJoker: false,
                    isProtected
                });
            });
            
            // Sort: jokers first, then by whether needed by best hand (in priority mode), then by value
            explanation.tileAnalysis.sort((a, b) => {
                if (a.isJoker && !b.isJoker) return -1;
                if (!a.isJoker && b.isJoker) return 1;
                if (strategyMode === 'PRIORITY') {
                    if (a.neededByBest > 0 && b.neededByBest === 0) return -1;
                    if (a.neededByBest === 0 && b.neededByBest > 0) return 1;
                }
                return a.value - b.value;
            });
            
            return explanation;
        }

        // ========================================
        // HELPER FUNCTIONS FOR DISPLAY
        // ========================================
        
        function displayHand(tiles, label = "Hand") {
            let html = `<div class="hand-display"><strong>${label}:</strong> `;
            tiles.forEach(tile => {
                const isJoker = tile === 'J';
                html += `<span class="tile ${isJoker ? 'joker' : ''}">${tile}</span>`;
            });
            html += ` (${tiles.length} tiles)</div>`;
            return html;
        }
        
        function sortTiles(tiles) {
            const order = {
                'F': 0,
                'B': 1, 'C': 2, 'D': 3,
                'GD': 4, 'RD': 5, 'WD': 6,
                'N': 7, 'E': 8, 'S': 9, 'W': 10,
                'J': 11
            };

            return tiles.sort((a, b) => {
                const getSuitOrder = (tile) => {
                    if (tile === 'F') return 0;
                    if (tile === 'J') return 11;
                    if (tile === 'GD') return 4;
                    if (tile === 'RD') return 5;
                    if (tile === 'WD') return 6;
                    if (['N', 'E', 'S', 'W'].includes(tile)) return order[tile];
                    const suit = tile.slice(-1);
                    return order[suit];
                };

                const aOrder = getSuitOrder(a);
                const bOrder = getSuitOrder(b);
                
                if (aOrder !== bOrder) return aOrder - bOrder;
                
                const aNum = parseInt(a);
                const bNum = parseInt(b);
                if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
                
                return 0;
            });
        }
        
        // Explain how a score was calculated
        function explainScore(match) {

            const baseScore = result.totalFilled * 10;

            const p2Penalty = result.p2Missing * 5;
            const p3Penalty = result.p3Missing * 1;
            const p4Penalty = result.p4Missing * 1;
            const singlePenalty = (result.singleMissing || 0) * 4;
            const totalPenalty = p1Penalty + p2Penalty + p3Penalty + p4Penalty + singlePenalty;
            const rawScore = baseScore - totalPenalty;
            
            // REMOVED: Closed hand bonus (will revisit for bot personalities)
            // const closedBonus = pattern.status === 'closed' ? rawScore * 0.3 : 0;
            // const finalScore = pattern.status === 'closed' ? rawScore * 1.3 : rawScore;
            const closedBonus = 0;
            const finalScore = rawScore;
            
            return {
                totalFilled: result.totalFilled,
                baseScore: baseScore,
                p1Missing: result.p1Missing,
                p1Penalty: p1Penalty,
                p2Missing: result.p2Missing,
                p2Penalty: p2Penalty,
                p3Missing: result.p3Missing,
                p3Penalty: p3Penalty,
                p4Missing: result.p4Missing,
                p4Penalty: p4Penalty,
                totalPenalty: totalPenalty,
                rawScore: rawScore,
                handStatus: pattern.status,
                closedBonus: closedBonus,
                closedBonusDisabled: true,
                finalScore: Math.round(finalScore),
                jokersUsed: match.jokersUsed || 0
            };
        }

        // ========================================
        // DRAW/DISCARD PHASE DECISION FUNCTION
        // ========================================
        
        /**
         * Decide which tile to discard during draw/discard phase
         * Unlike Charleston, jokers CAN be discarded here
         * Returns the tile value to discard (e.g., 'J', '2B', 'N')
         * 
         * Uses PRIORITY vs ALL_HANDS strategy:
         * - PRIORITY: Strong best match - protect tiles needed for it
         * - ALL_HANDS: Weak best match - maximize flexibility across all top 5
         */
        function decideDrawDiscardDiscard(hand, lockedGroups = [], player = null) {
            if (hand.length < 1) {
                throw new Error(`Empty hand passed to decideDrawDiscardDiscard`);
            }

            // Joker handling
            const jokerCount = hand.filter(t => t === 'J').length;

            // Step 1: pick the best target hand pattern (personality-aware)
            const evaluation = personalityEval(player, hand, 5, lockedGroups);
            const bestMatch = evaluation.bestMatch;
            const jokerValue = calculateJokerValue(hand, evaluation, jokerCount);

            // Martin / Rachel flex mode: while wall is deep, discard to maximize hand coverage
            const p = player && player.personality ? player.personality : null;
            const wallCount = gameState.wall.length;
            if (p && p.handLockMode === 'flex' && wallCount > p.flexLockThreshold) {
                const flexEval = personalityEval(player, hand, 15, lockedGroups);
                if (flexEval.topMatches && flexEval.topMatches.length > 0) {
                    return decideFlexibilityDiscard(hand, flexEval.topMatches);
                }
            }

            // Step 2: if no useful target, fall back to cross-hand scoring
            if (!bestMatch || !bestMatch.result || !bestMatch.result.groups) {
                const tileValues = calculateTileValues(hand, evaluation.topMatches);
                const tileCounts = new Map();
                hand.forEach(t => tileCounts.set(t, (tileCounts.get(t) || 0) + 1));
                let lowestValue = Infinity, tileToDiscard = hand[0];
                tileCounts.forEach((count, tile) => {
                    const value = tile === 'J' ? jokerValue : (tileValues.get(tile) || 0) - (count > 1 ? 0.5 : 0);
                    if (value < lowestValue) { lowestValue = value; tileToDiscard = tile; }
                });
                return tileToDiscard;
            }

            // Step 3: get ALL fills for the best pattern, filtered for locked groups
            const allFills = filterFillsForLockedGroups(
                evaluatePattern(hand, bestMatch.pattern.code), lockedGroups);

            // Step 4: score each fill the same way evaluateBestMatch does
            const scoredFills = allFills.map(fill => {
                const enhanced = jokerCount > 0 ? useJokersForScoring(fill, jokerCount) : fill;
                const score = (enhanced.totalFilled * 10)
                    - (enhanced.p1Missing * 5 + enhanced.p2Missing * 5
                       + enhanced.p3Missing * 1 + enhanced.p4Missing * 1
                       + (enhanced.singleMissing || 0) * 4);
                return { fill: enhanced, score: Math.max(0, score) };
            }).sort((a, b) => b.score - a.score);

            // Step 5: for each tile type, calculate:
            //   - maxUsed: the most copies any fill uses of this tile
            //   - weightedScore: sum of fill scores for fills that use at least one copy
            const tileMaxUsed    = new Map();  // tile → max copies used in any single fill
            const tileWeightedScore = new Map(); // tile → sum of scores of fills that use it

            hand.forEach(t => {
                if (!tileMaxUsed.has(t)) { tileMaxUsed.set(t, 0); tileWeightedScore.set(t, 0); }
            });

            scoredFills.forEach(({ fill, score }) => {
                // Count how many copies of each tile this fill uses
                const usedInFill = new Map();
                fill.groups.forEach(group => {
                    group.matchedTiles.forEach(t => {
                        if (t !== '?' && t !== 'J') {
                            usedInFill.set(t, (usedInFill.get(t) || 0) + 1);
                        }
                    });
                });
                usedInFill.forEach((used, tile) => {
                    tileMaxUsed.set(tile, Math.max(tileMaxUsed.get(tile) || 0, used));
                    tileWeightedScore.set(tile, (tileWeightedScore.get(tile) || 0) + score);
                });
            });

            // Step 5b: score tiles against all backup hands that tie the top hand on tilesFilled.
            // topMatches[1] anchors at 40%; lower-scoring hands scale proportionally by ratio.
            const backupTileMaxUsed       = new Map();
            const backupTileWeightedScore = new Map();
            hand.forEach(t => {
                if (!backupTileMaxUsed.has(t)) { backupTileMaxUsed.set(t, 0); backupTileWeightedScore.set(t, 0); }
            });

            const anchorMatch = evaluation.topMatches && evaluation.topMatches[1];
            if (anchorMatch) {
                const anchorScore    = anchorMatch.score || 1; // avoid /0
                const topFilled      = bestMatch.tilesFilled;

                evaluation.topMatches.slice(1).forEach(backupMatch => {
                    if (backupMatch.tilesFilled < topFilled) return; // doesn't tie the top hand

                    const weight = 0.4 * (backupMatch.score / anchorScore);

                    const backupFills = filterFillsForLockedGroups(
                        evaluatePattern(hand, backupMatch.pattern.code), lockedGroups);
                    const backupScoredFills = backupFills.map(fill => {
                        const enhanced = jokerCount > 0 ? useJokersForScoring(fill, jokerCount) : fill;
                        const score = (enhanced.totalFilled * 10)
                            - (enhanced.p1Missing * 5 + enhanced.p2Missing * 5
                               + enhanced.p3Missing * 1 + enhanced.p4Missing * 1
                               + (enhanced.singleMissing || 0) * 4);
                        return { fill: enhanced, score: Math.max(0, score) };
                    }).sort((a, b) => b.score - a.score);

                    backupScoredFills.forEach(({ fill, score }) => {
                        const usedInFill = new Map();
                        fill.groups.forEach(group => {
                            group.matchedTiles.forEach(t => {
                                if (t !== '?' && t !== 'J') {
                                    usedInFill.set(t, (usedInFill.get(t) || 0) + 1);
                                }
                            });
                        });
                        usedInFill.forEach((used, tile) => {
                            backupTileMaxUsed.set(tile, Math.max(backupTileMaxUsed.get(tile) || 0, used));
                            backupTileWeightedScore.set(tile,
                                (backupTileWeightedScore.get(tile) || 0) + score * weight);
                        });
                    });
                });
            }

            // Step 6: score every tile in hand and pick the lowest
            // Primary hand value + 40% of backup hand value
            const tileCounts = new Map();
            hand.forEach(t => tileCounts.set(t, (tileCounts.get(t) || 0) + 1));

            let lowestValue = Infinity;
            let tileToDiscard = hand[0];

            tileCounts.forEach((count, tile) => {
                if (tile === 'J') {
                    // Jokers handled by calculateJokerValue
                    if (jokerValue < lowestValue) { lowestValue = jokerValue; tileToDiscard = tile; }
                    return;
                }

                const maxUsed   = tileMaxUsed.get(tile) || 0;
                const wScore    = tileWeightedScore.get(tile) || 0;
                const excess    = count - maxUsed; // copies beyond what any fill needs

                let primaryValue;
                if (maxUsed === 0) {
                    // Tile is useless to ALL fills — discard first
                    primaryValue = 0;
                } else if (excess > 0 && count > 1) {
                    primaryValue = (wScore * maxUsed + wScore * 0.1 * excess) / count;
                } else {
                    primaryValue = wScore;
                }

                // Backup hand contribution (40%)
                const bMaxUsed = backupTileMaxUsed.get(tile) || 0;
                const bWScore  = backupTileWeightedScore.get(tile) || 0;
                const bExcess  = count - bMaxUsed;
                let backupValue;
                if (bMaxUsed === 0) {
                    backupValue = 0;
                } else if (bExcess > 0 && count > 1) {
                    backupValue = (bWScore * bMaxUsed + bWScore * 0.1 * bExcess) / count;
                } else {
                    backupValue = bWScore;
                }

                const value = primaryValue + 0.4 * backupValue;

                if (value < lowestValue) { lowestValue = value; tileToDiscard = tile; }
            });

            return tileToDiscard;
        }
        
        /**
         * Analyze scarcity of tiles needed across all groups
         * Returns array of {tile, needed, available, requiresJoker} sorted by scarcity
         */
        function analyzeTileScarcity(groups, hand, exposedTiles, discardedTiles) {
            const tileNeeds = new Map();
            
            // Collect what tiles are needed across all groups
            groups.forEach(group => {
                const matchedTiles = group.matchedTiles || [];
                matchedTiles.forEach(tile => {
                    if (tile === '?') {
                        // Figure out what tile type this could be
                        // For now, we'll track by the group's pattern
                        // This is simplified - in reality we'd need to check candidatesForTile
                        return;
                    }
                    
                    if (tile !== 'J' && tile !== '?') {
                        const needed = tileNeeds.get(tile) || 0;
                        tileNeeds.set(tile, needed + 1);
                    }
                });
                
                // Also check for missing tiles of types we already have
                const groupTiles = group.tiles || [];
                const tilesPresent = matchedTiles.filter(t => t !== '?' && t !== 'J');
                
                // Count unique tile types we need more of
                tilesPresent.forEach(tile => {
                    const inGroup = matchedTiles.filter(t => t === tile).length;
                    const shouldBe = groupTiles.length; // Simplified
                    if (inGroup < shouldBe) {
                        const current = tileNeeds.get(tile) || 0;
                        tileNeeds.set(tile, Math.max(current, shouldBe - inGroup));
                    }
                });
            });
            
            // Calculate availability for each needed tile
            const scarcityList = [];
            tileNeeds.forEach((needed, tile) => {
                const availability = calculateTileAvailability(tile, hand, exposedTiles, discardedTiles);
                const requiresJoker = needed > availability.available;
                
                scarcityList.push({
                    tile,
                    needed,
                    available: availability.available,
                    requiresJoker
                });
            });
            
            // Sort by availability (0 = most scarce first)
            scarcityList.sort((a, b) => a.available - b.available);
            
            return scarcityList;
        }
        
        /**
         * Calculate joker penalty based on strategic value.
         * A penalty is only applied when the bot is targeting a hand with quint groups
         * (5-of-a-kind), since each quint MUST have at least one joker.
         * Non-quint groups don't strictly need jokers, so no penalty applies there.
         */
        function calculateJokerPenalty(
            callingTile,
            usingJokerInCall,
            jokersInHand,
            groups,
            hand,
            exposedTiles,
            discardedTiles
        ) {
            if (!usingJokerInCall) {
                return 0; // No joker used, no penalty
            }

            // Find quint groups that still need a joker (haven't been completed yet)
            const quintGroupsNeedingJoker = groups.filter(g =>
                (g.tiles || []).length === 5 &&
                allIdentical(g.tiles || []) &&
                (g.matchedTiles || []).filter(t => t === '?').length > 0
            );

            // No quints in this hand — jokers are freely usable, no penalty
            if (quintGroupsNeedingJoker.length === 0) {
                return 0;
            }

            // Bot is targeting a quint hand.
            // Check if this call is itself completing part of a quint group.
            const isQuintCall = quintGroupsNeedingJoker.some(g =>
                (g.matchedTiles || []).some(t => t === callingTile)
            );

            if (isQuintCall) {
                return 0; // Using joker directly for a quint — that's the right move
            }

            // Non-quint call while on a quint hand.
            // Penalise only if using this joker would leave us short for the quints.
            const jokersAfterCall = jokersInHand - 1;
            const quintsStillNeedingJoker = quintGroupsNeedingJoker.length;

            if (jokersAfterCall < quintsStillNeedingJoker) {
                // Each joker we're short costs us heavily — we can't complete the quint hand
                const shortage = quintsStillNeedingJoker - jokersAfterCall;
                return shortage * 60; // 60 per quint we'd be unable to complete
            }

            return 0; // Enough jokers remain to cover all quints — no penalty
        }
        
        /**
         * Create a version of the match result with jokers removed from groups
         * This shows the TRUE tile needs without joker assistance
         * Returns: modified match result with jokers unassigned
         */
        function createJokerFreeView(matchResult) {
            if (!matchResult || !matchResult.groups) return matchResult;
            
            const jokerFreeGroups = matchResult.groups.map(group => {
                const matchedTiles = group.matchedTiles || [];
                
                // Replace jokers with '?' to show true needs
                const jokerFreeTiles = matchedTiles.map(tile => tile === 'J' ? '?' : tile);
                
                return {
                    ...group,
                    matchedTiles: jokerFreeTiles
                };
            });
            
            return {
                ...matchResult,
                groups: jokerFreeGroups
            };
        }
        
        /**
         * Calculate the strategic value of keeping a joker
         * 
         * SIMPLE RULE: Keep jokers unless the hand literally cannot use them.
         * Once discarded, they cannot be reclaimed.
         * 
         * Jokers can ONLY be used in groups with 3+ repeated identical tiles
         * (Q, R, X, Y, V, M, D groups, and patterns like 3333-a, WWWW)
         */
        function calculateJokerValue(hand, evaluation, jokerCount) {
            if (jokerCount === 0) return 0;
            
            const bestMatch = evaluation.bestMatch;
            if (!bestMatch || !bestMatch.result || !bestMatch.result.groups) {
                // No good matches - keep joker for flexibility
                return 300;
            }
            
            // Check if ANY group in the best match can use jokers AND needs tiles
            let canUseJoker = false;
            
            bestMatch.result.groups.forEach(group => {
                const matchedTiles = group.matchedTiles || [];
                // Treat jokers as unfilled — they're still in hand and haven't been "spent"
                const filledCount = matchedTiles.filter(t => t !== '?' && t !== 'J').length;
                const totalCount = matchedTiles.length;
                const emptySlots = totalCount - filledCount;
                
                if (emptySlots === 0) return; // Group is complete, skip
                
                const tiles = group.tiles || [];
                
                // Can use jokers if: 3+ identical tiles (QQQ, FFFF, 3333, etc.)
                const isJokerable = (totalCount >= 3) && (
                    allIdentical(tiles) || 
                    (tiles.length >= 3 && tiles.every(t => /[0-9]/.test(t)) && allIdentical(tiles))
                );
                
                if (isJokerable) {
                    canUseJoker = true;
                }
            });
            
            if (canUseJoker) {
                // Hand can use jokers - KEEP THEM
                return 500; // Very high value
            } else {
                // Hand cannot use jokers at all - safe to discard
                return 5; // Very low value
            }
        }
